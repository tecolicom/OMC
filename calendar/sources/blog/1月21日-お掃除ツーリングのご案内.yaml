title: 1月21日 お掃除ツーリングのご案内
published: '2024-01-13'
body: 2024年もよろしくお願い致します。新年1回目の活動は、飯能市道路美化活動団体として整備を行っている里山道で、お掃除ツーリングを行います。里山道をツーリングしながら、ゴミ拾いや落ち枝拾い、残されている消火用ポリタンクの回収等を行います。みなさまのご参加をお待ちしております。■集合日時:1月21日(日)8:30■集合場所:あいわ広場(お車の駐車が可能です)あいわ広場に集合し、ミーティング後にMTBで作業箇所に向かいます。【注意事項】●各自で水分補給やおやつの準備をお願いします。●前日17時の気象庁発表による埼玉県南部の天気予報で、当日6時~12時の降水確率が50%以上の場合は作業を中止といたします。
