title: 1月15日 里山整備活動の報告
published: '2023-01-16'
body: |-
  1月15日は日高市で清掃美化団体として登録している市道の整備を行いました。

  参加者9名のうち、5名を割り当てた清掃班は、簡易舗装の上に堆積した杉の葉を除去しました。ここはとても急坂ですが、郵便局のオートバイが通行する市道でもあります。安全性の向上につながる作業となりました。

  残りの4名は当初、水切りの造成予定でしたが、地権者に立ち会っていただき、行政の考える排水対策などの話を伺いました。その結果、かなり大規模な作業が見込まれ、OMCとしての作業を断念。代わりに、こちらも落ちた石や枝を除去するなどの整備作業となりました。
  このように、OMCでは地元住民との関わりを大切にしながら作業を進めています。

  次回の活動予定は2月5日（日）の名栗じてんしゃ広場定期整備です。皆様のご参加、お待ちしています。
