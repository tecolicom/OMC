title: １２月活動日
published: '2017-12-09'
body: |-
  今年最後の活動日は17日(日)。
  名栗のじてんしゃ広場の造成&年忘れライドをおこないます。
  じてんしゃ広場は、今月から第二期工事が始まって、現在ミニジャンプレーンを製作中。
  集合日時・集合場所
  12月17日、9時00分 名栗ふれあい公園内じてんしゃ広場。
  お車は小殿公衆トイレ先(上流側)の未舗装駐車場または飯能市役所名栗庁舎駐車場にお停めください。
  (*公衆トイレ手前の舗装駐車場は公園関連施設ではないので、駐車はご遠慮ください。)
  作って乗っておしゃべりしながら今年一年を振り返りましょう。
  皆さんのご参加、お待ちしておりまーす。
