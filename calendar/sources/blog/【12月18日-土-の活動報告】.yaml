title: 【12月18日(土) の活動報告】
published: '2021-12-21'
body: |-
  朝方には水たまりに氷が張るような寒さの中、今回の活動には12名の会員が集まり、飯能市・道路整備活動団体として管理させていただいている里山道の整備を、2班に分かれて行いました。

  ひとつめの班は、里山道から雨で流出した土砂の除去と水切りの整備を行ないました。

  もうひとつの班は崩れかけた里山道の補修と倒木の撤去、水切りの整備を行いました。

  前日の雨で水が溜まっている部分もありましたが、水切りの整備後には溜まっていた水がチョロチョロと流れ出し、水たまりがなくなっていった時は嬉しかったですね。会員の皆さんも整備の効果を実感できたのではないでしょうか。

  山側から流れ込む沢があるため、道幅いっぱいがぬかるみになっている区間には歩行できる幅の側道を設置しました。

  作業終了後には都合の合う仲間で声を掛け合ってライドにGO!

  また今回は奥武蔵マウンテンバイク友の会の活動を知り、里山整備活動を体験してみたいとのことで未入会の3名の方にご参加いただきました。我々の活動に共感していただけましたらご入会いただけたらと思います。

  私たち奥武蔵マウンテンバイク友の会の世話人は里山道のMTBライドを楽しむことの中に、里山整備が出来る喜びを感じています。
  この地域でMTBライドを楽しまれている多くの方に里山整備の楽しさを知ってもらえたらイイなと思っています。興味を持っていただけたらまずは一度ご体験ください。随時参加者を受け付けております。

  お問い合わせはこちらまで⇓
  https://okumusashimtb.wixsite.com/omcweb/inquiry
  年末の慌ただしい時期の貴重な休日のお時間を、奥武蔵マウンテンバイク友の会の活動にご協力いただきありがとうございました。
  多くの方が会員になっていてくれて、その中の都合の良い方が参加してくれることで作業が行えています。
  会員のみなさま、時折で構いませんので都合の合う日がありましたらご協力いただけたらと思います。

  次回の三浦半島マウンテンバイククラブ活動見学会にもぜひご参加ください。よろしくお願いします。
