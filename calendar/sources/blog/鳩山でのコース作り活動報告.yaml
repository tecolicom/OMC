title: 鳩山でのコース作り活動報告
published: '2020-12-21'
body: |-
  本日の活動は鳩山町で地主さんの御厚意で貸していただいている土地での里山とMTB向けのトレイルの整備でした。

  参加してくれたのは総勢25名。

  すでに3回目の活動ですが、未だ下草の刈払いとその処分が終わらず、里山保全の大変さを実感しています。

  コースは荒れてしまったために階段状に整備する町道を自転車が迂回するための径と兼用するルートが形作られ始めました。伐根など重労働がある為、ゆっくりではありますが前進しています。

  走れる場所になるまではまだまだ作業が続きます。会員の皆様も走りたくてウズウズしてることでしょう。そのためにも今しばらく作業の御協力をよろしくお願いいたします。
