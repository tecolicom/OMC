title: 奥武蔵マウンテンバイク友の会の3月の活動報告
published: '2020-03-16'
body: |-
  先月に引き続き山中に設置された消火用ポリタンクの撤去作業の第2弾。前回は活動地域全域を見回って設置個所と個数の把握を行いました。
  その数215個。

  第2弾となる今回は18名の仲間が集まって3つの班に分かれて作業にあたりました。ポリタンを集める班、軽トラでの運搬班、回収物処理班の3班です。半分ちょっとの116個を回収することが出来ました。作業当日は絶好のMTB日和と言いたいほどの澄んだ青空の晴天でしたね。でも残念ながら前日はまとまった量の雨が降ったため、路面へのダメージを考慮して走行を控えるからが多かったようです。そのためか作業中にすれ違うマウンテンバイクライダーがとても少なかったです。

  雨の日の翌日は路面が柔らかいためMTBで走行することで路面にダメージを与えかねません。この地域を訪れる多くのマウンテンバイクライダーの皆さんも同じ考えでいる事を知ることが出来て嬉しかったです。

  われわれも舗装路とジープロードのみをMTBで移動をしました。




  現地までの移動はジープロードはMTBで走行していき・・・ジープロードの終点にバイクをデポしてのその先へは徒歩で進んでいきます。この日の作
