title: 4/20子ども自転車教室開催
published: '2025-04-29'
body: |-
  4月20日は名栗で子ども自転車教室を開催しました。

  集まった子どもは10名。自転車の点検や入念な準備運動を行ったのち、年齢や経験に合わせて3つのグループに分けました。

  最年少グループは、自転車の走行に慣れるべく、公園全体を楽しくツーリング。でこぼこ道の上を走る面白さを体感できたのではないでしょうか？

  ある程度の経験があるグループは、実際にパンプトラックを走行。OMC会員からの指導を受け、よりスムーズに走れるようになったことでしょう。

  何度も子ども自転車教室に参加しているベテラングループは、パンプトラックでペダルを漕がずに加速するコツを伝授。後半は、一本橋やランプを組み合わせたコースの攻略を楽しみました。子ども同士でコース設定を工夫し、ゲーム感覚で楽しめたようです。

  次回の子ども自転車教室は11月中旬を予定しています。開催をお楽しみに！
