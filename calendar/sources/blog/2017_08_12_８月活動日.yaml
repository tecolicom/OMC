title: ８月活動日
published: '2017-08-12'
body: |-
  雨降り多くて、まるで梅雨に戻ったような８月です。
  ８月の活動日は２０日（日）。

  いつもの里山道周辺の草刈りや整備作業を行います。

  泥に汚れてもかまわない服装、軍手などと、お持ちの方は鎌や手鋸などをご用意ください。

  集合時間／集合場所
  ８時００分　飯能市役所駐車場（集合後、阿須運動公園に移動）
  ８時３０分　飯能市阿須運動公園駐車場

  前日の１７時時点の気象庁の天気予報で、埼玉県南部の２０日午前中の降水確率が５０％以上だった場合は活動日を延期します。延期の日取りにつきましては、追ってお知らせいたします。

  雨続きの今日この頃、里山の傷みも気になりますね。
  活動日の好天を祈りつつ、皆さまのご参加、お待ちしておりまーす。
