title: 6/1名栗定期作業の報告
published: '2025-06-04'
body: |-
  天候に恵まれない週末が続く中、幸い好天に恵まれ、初夏になり繁ってしまった広場内の刈払いを行いました。パンプトラックに関しては痛みもほとんど見受けられなかったため今回は手を付けませんでした。

  10名の会員が参加。充足な人員と、子供達もしっかり手伝ってもらえたので広場内はほぼ刈払いできました。加えて、公園に下りる階段周辺の刈払いも行い、気分よく公園内に入れるようになっています。作業に参加された会員の皆様ありがとうございました。

  広場までの道の周り等、十分にできなかった所もあり、次回の作業でも刈払いが必要です。

  引き続き皆様のご協力よろしくお願いします。
