title: 【10月１８日(日)里山整備作業の報告】
published: '2020-10-22'
body: |-
  今回の活動には11名で2班に分かれて作業を行いました。

  里山整備班(計7名)は、里山道から雨で流出した土砂の除去を行ないました

  過去の活動で設置した4箇所の水切りは、土砂が堆積して本来の機能が損なわれていたため、雨水の流れ道を塞いでいた土砂を取り除き、雨水が里山道ではなく山の斜面へと流れるようにしました。

  このように定期的に水切りを整備することで、麓への土砂の流出をなるべく防ぐことができます。作業に参加された会員のみなさん、ご協力ありがとうございました。

  もう一つの班は以前に岩沢運動公園で「子供じてんしゃ教室」を行っていた際に使用していた木製のセクションの分かい作業を行いました。

  ここ3年ほどは教室の開催が名栗のじてんしゃ広場になったので、使われないままになっていたため解体することにいたしました。

  次回の活動は11月1日(日)の日高市での活動になります。

  今年度から日高市の道路美化活動団体に登録し活動を行うことになりました。

  コロナ禍の影響で延期にしておりましたが今回がその1回目となります。

  ぜひ日高市での道路美化活動にもご協力いただけたらと思います。
