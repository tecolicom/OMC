title: ３月２７日 子供じてんしゃ教室の報告について
published: '2022-03-29'
body: |-
  まん延防止措置も解除され、前日の雨の影響も少なく春らしい過ごしやすい気候のなか、一年ぶりに子供じてんしゃ教室を開催することができました。未就学児から小学生高学年まで11名のお子さまに参加いただきました。小学生班は、じてんしゃ広場の走行体験があることから、コースの安全な使い方を紹介し、よりスムーズな走り方を目指しました。
  パンプトラックでは、コーナーの走り方で速度を維持できるかどうかが分かれるため、速度をなるべく落とさないライン取りを伝授。また、肘と膝を大きく動かして、ペダルに頼らない自転車の走らせ方も教えました。
  コースを一通り走った後は、子供たちに人気のコースで、ペダルを漕がずにどこまで進めるかを競うミニゲームを実施。回を重ねるごとにコツを掴み、中には何周もぐるぐる回っていた子もいました。オフロード未経験班は、まず凸凹みちに慣れて楽しんでもらうことから、徐々にペダルを止めて走ってみることにもチャレンジ。
  パンプトラックを使って段階を踏みながらの練習や、園内ツーリングを楽しんでもらいました。
  みんな楽しみながら上達できたと思います。今回まん延防止措置の解除の見込みが立たなかったため、公
