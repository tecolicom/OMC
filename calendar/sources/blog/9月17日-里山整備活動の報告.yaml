title: 9月17日 里山整備活動の報告
published: '2023-09-22'
body: |-
  猛暑の影響で活動中止が続いていましたが、今回は予想最高気温34度でギリギリセーフ!16名の会員が集まり、久しぶりに里山整備活動を行うことができました。加治・美杉台まちづくり推進委員会の方々にも集合場所のあいわ広場に来ていただき、看板補修についてのアドバイスをいただきました。
  また、「いつもご協力ありがとう!」とのことでスポーツドリンクの差し入れもいただきました。当日も暑かったので、とても助かりました。ありがとうございました。倒木処理班、排水路清掃班、看板補修班に分かれ、それぞれの作業場所に向かいました。倒木処理班は、里山道に倒れて通行の妨げになっていた倒木を3か所で撤去しました。
  ここのところ倒木も多く発生していますが、立ち枯れた樹木の枝が折れて落下する事案が増えています。
  強風の日には落下してくる枝にご注意ください。排水路清掃班は、里山道に設置された雨水排水路に堆積した土砂や落ち葉の清掃を行いました。民家が隣接しており、土砂流出の防止と適切な雨水排水が大切です。そのために今後も定期的なメンテナンスを実施してまいります。看板補修班は、MTBで里山道を走りながら、設置されている看板の薄く
