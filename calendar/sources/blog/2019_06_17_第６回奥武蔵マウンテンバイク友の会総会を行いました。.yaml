title: 第６回奥武蔵マウンテンバイク友の会総会を行いました。
published: '2019-06-17'
body: |-
  6月16日、第6回奥武蔵マウンテンバイク友の会総会を行いました。

  貴重な梅雨の晴れ間に、20名を超える会員の皆さまにお集まりいただき、無事総会を終えることができました。ありがとうございました。

  総会後のディスカッションにおいても、入会体験会や他団体との交流に関する提案や、里山における様々な問題への対策などについて、ご意見を多数いただき大変有意義なものとなりました。

  いただいたご意見は、世話人会にて検討し今後の会の運営に生かして参りたいと思います。

  2019年度も引き続き奥武蔵マウンテンバイク友の会にご理解、ご協力いただきますようよろしくお願い申し上げます。
  奥武蔵マウンテンバイク友の会　世話人一同
