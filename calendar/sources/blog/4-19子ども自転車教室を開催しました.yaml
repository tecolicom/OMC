title: 4/19子ども自転車教室を開催しました
published: '2026-04-27'
body: |-
  4月19日は名栗自転車広場で子どもじてんしゃ教室を行いました。集まった子どもは8人でした。準備運動をした後、パンプトラックを走り、準備運動は完了。今回は年齢やスキルに合わせて3グループに分け、パンプトラックや周辺の広場を楽しく走り回りました。土の上でのライドを楽しめたのではないでしょうか?

  また、普段は我が子を見守るパパママもマイバイク持参でお越しになっていたことから、新たな試みとして保護者クラスも設定。1時間ほどみっちりと、ウィリーの練習を行いました。子どもたち以上にスキル習得に熱中し、休憩も忘れて練習に励んでいた姿が印象的でした。盛大に芝生の上を転げ回っているパパたち、筋肉痛は大丈夫でしたでしょうか? 次回の子ども教室は秋頃を予定しています。お楽しみに!

  次回、5/17に飯能市民清掃デーに合わせて活動を行います。詳細は後日告知します。ご参加、お待ちしています。
