title: 【６月２１日（日）里山整備のお知らせ】
published: '2020-06-13'
body: "飯能市・道路整備活動団体として管理させていただいている里山にて草刈りや水切りの整備を行います。\n軍手などご持参の上、汚れても構わない服装でお集まりください。\
  \ (持ち運び可能なノコギリ、スコップ等、ご自分で使用する道具があればお持ち込みください)\n集合時間/集合場所\n令和2年6月21日(日)\n8時00分 飯能市役所駐車場(8:10~あいわ広場にMTBで移動します)\n\
  8時30分 あいわ広場駐車場(お車の駐車可能です)\nあいわ広場に集合し、ミーティング後、MTBで作業箇所に向かいます。 各自で水分補給やおやつの準備をお願いします。\
  \  前日午後5時の気象庁の埼玉県南部の天気予報で、降水確率が50%以上だった場合は中止いたします。 皆様ご協力をお願いします_(._.)_\n※阿須公園駐車場が現在、復旧工事中のため集合場所を「あいわ広場」といたします。\
  \ \n     地図は下記になります。"
