title: 6月5日 名栗じてんしゃ広場の整備報告
published: '2022-06-06'
body: |-
  6月5日(日)は、名栗じてんしゃ広場(パンプトラック)の活動日。偶数月の第一日曜日を活動日としていますが、前回の4月は雨で中止でした。そのため、梅雨と夏を前に、今日が作業をする最後のチャンス。やや蒸し暑かったですが、会員7名で路面の補修と草刈りを行いました。

  次回のじてんしゃ広場の作業予定日は8月7日(日)。高温や雨で中止となる可能性もありますが、隣の川で涼みながら作業を行えます。ぜひご参加ください。
