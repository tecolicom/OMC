title: 2016年、秋の子どもマウンテンバイク教室
published: '2016-10-30'
body: |-
  １０月１６日、秋の青空に恵まれた日曜日、子どもマウンテンバイク教室を行いました。
   今回も大勢の元気な子どもたちとご家族が集まってくれました。
  スクール開始前の集合写真、何度も参加してくれてる子も初めての子も、みんなワクワク良い笑顔。

  飯能市内の土の広場に並んだ、いろいろな特設セクション。

  土手の斜面にチャレンジしたり。
  初めてのことに挑戦して、おっかなびっくり、ちょこっと失敗したりして、そして上手く行ったときの満足。

  そんな子どもたちの笑顔に触発されて、お父さんたちや先生役のみなさんも、ついつい並んでウキウキトレイン。
  僕たちも、子どもたちの満足のお裾分けをもらって、幸せな秋の日でした。

  ご参加いただいたご家族、サポートくださいました会員の皆様、ありがとうございました。
  次回の子どもマウンテンバイク教室は、来年春を予定しております。

  どうぞ、お楽しみに。
