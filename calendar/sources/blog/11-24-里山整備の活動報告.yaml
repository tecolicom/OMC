title: 11/24 里山整備の活動報告
published: '2024-11-25'
body: |-
  11月24日(日)は飯能市の市民清掃デーでした。
  市内の各自治会が周辺地域の清掃活動を行いますが、奥武蔵マウンテンバイク友の会も阿須と岩渕の自治会の清掃活動に参加させていただいています。

  9名集まった会員を2班に分かれてそれぞれの自治会の皆さんとの作業にあたりました。

  阿須自治会では草刈活動を行い、岩渕自治会では水切りの清掃、落枝、倒木、かかり木の撤去を行いました。各自治会よりおみやげをいただき解散。

  背丈ほどに伸びた雑草の撤去を行いました

  絡まるツタとの格闘中

  自治会長さんと共に記念撮影

  水切りに土砂が堆積していました

  倒木の撤去も数本行いました

  その後、場所を移動して、ここ数か月の間、ぬかるみ地帯となっている場所の整備として水切りの設置を行いました。

  まずは水路を掘りました

  丸太で水路を補強します

  渡れるように丸太を並べます

  ひとまず完成しました

  ご参加いただいた皆さん、お疲れ様でした!
  次回の活動は12/1(日)の名栗ふれあい公園 じてんしゃ広場の整備作業になります。
  多くの皆さんのご協力をお待ちしています_(._.)_
