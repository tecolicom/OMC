title: 第一回なぐり見聞食ブラさんぽレポート
published: '2017-10-29'
body: |-
  9月24日、名栗地域のイベント「第一回なぐり見聞食ブラさんぽ」の催し物の一つとして、私たち奥武蔵マウンテンバイク友の会も「じてんしゃ広場体験会」を開催させていただきました。


  九月初旬に土が入ったじてんしゃ広場。皆様方の思いと汗で、運び込まれた土の山はあっという間にパンプトラックへと姿を変えました。一つのコースが仕上がって、良く晴れた和やかな秋の日に、じてんしゃ広場はお披露目の日を迎えました。


  イベント当日は、前日の雨の影響もあり、午前中は路面がやや滑りやすかったものの、イベント開始前に到着した会員の皆さんでパンプトラックに手を入れて、また、イベントが始まってからは多くの方に走っていただいたおかげで、午後にはコースはしっかり乾いて固まって走りやすいコンディションとなりました。


  開催した「じてんしゃ広場体験会」には、OMC会員だけでなく、ブラ散歩の参加者やロードライド途中の自転車愛好家、さらには地元の子供たちも遊びに来てくれました。嬉しいことに、中には、「明日も来るよ」と言ってくれた小学生もいました。一日目にして、じてんしゃ広場が地元に定着しつつある感触を掴めたのは、大きな成果だと思います。


  飯能市の公園として、今後も多くの方々が親しんでくれそうな手応えを得て、定期的な整備をしていきたいと思っております。体力自慢の皆様とコース整備も楽しんで、沢山の笑顔があふれるコースを維持していきたいと考えております。

  皆様、ご協力のほどどうぞ宜しくお願いいたします。
