title: じてんしゃ広場新コース造成準備のお知らせ
published: '2017-10-29'
body: |-
  一つ目のコースが仕上がって、地域の子どもたちも楽しんでいるじてんしゃ広場。

  11月6日に再び土を入れていただけることになりました。

  この土を使って、二つ目のパンプコースと、小さめのジャンプレーンを作ります。

  土の受け入れ準備として、11月5日(日)、草刈りや広場の掃除などを行います。
  集合日時・集合場所
  11月5日、9時00分 飯能市役所名栗庁舎駐車場
  汚れてもかまわない格好、長靴、軍手などと、お持ちの方はレーキや熊手などをご用意ください。
  作業の合間は、上の写真のパンプトラックでライドセッション楽しみましょう。
  皆さまのご参加、お待ちしておりまーす。
