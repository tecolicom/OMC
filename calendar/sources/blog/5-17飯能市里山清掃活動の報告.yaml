title: 5/17飯能市里山清掃活動の報告
published: '2026-05-19'
body: 5月17日(日)は、飯能市の市民清掃デーでした。日ごろマウンテンバイカーの集まるこの地域の自治会でも清掃活動が行われ、地域のみなさまが行う活動にOMCも協力させていただきました。前回11/30の活動報告時に、より多くのご協力をお願いしていたところ、今回は16名の会員が集まりました。ご協力ありがとうございました。阿須自治会では、草刈りと道路清掃を行いました。草刈り班は、川沿いの道まわりの草を刈り、綺麗にしました。道路清掃班は、周辺の道路に溜まった土砂や落ち葉などを清掃しました。1時間ほどで無事に作業は終了し、自治会からお茶をいただき、解散しました。解散後はアフターライドを楽しみました。作業に参加されたみなさま、おつかれさまでした。今後も地域のみなさまとの良好な関係を築けるよう、ご協力をよろしくお願いいたします。今後の活動は以下を予定しております。5/31(日)
  日高市ごみゼロの日6/7 (日) 名栗定期整備6/14(日) 2026年度第13回総会
