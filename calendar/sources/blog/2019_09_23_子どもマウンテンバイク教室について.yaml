title: 子どもマウンテンバイク教室について
published: '2019-09-23'
body: 例年だと秋は10月に実施していた子どもマウンテンバイク教室ですが、今年は諸事情により11月17日の日曜日になります。楽しみにしてくださっていたみなさん、ごめんなさい。もうちょっとお待ちください。
  日程が近づいたらまた告知しますので、みなさんお誘いあわせのうえ紅葉真っ只中の名栗にお越しください。
