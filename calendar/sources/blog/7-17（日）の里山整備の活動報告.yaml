title: 7/17（日）の里山整備の活動報告
published: '2022-07-19'
body: |-
  21名の仲間が集まっていつもお世話になっている里山道のゴミ拾いと倒木の撤去を行いました。

  地権者の団体の方達が10数年前に設置し、役割を終えた消火用のポリタンクが里山道の脇の所々に並べられていました。
  ここのところ劣化して割れてしまっているものが目立つようになっている旨を団体の方へ連絡し、撤去の相談を行なって、奧武蔵マウンテンバイク友の会(OMC)で回収させてもらいことになりました。ポリタンクが設置されている箇所は我々の活動エリア全体に散らばっておりましたので、まずは3班に分かれ、MTBの機動力を活かして山中へ移動。
  (でもここ数日の雨の影響を考慮し、途中からは徒歩で移動)前回と今回の2回の活動で全てのポリタンクを回収できたかと思います。
  もしまだ山中に残っているモノを見かけましたらお声がけください。回収がひと段落した後は、日高市のコワークスペースCAWAZ base( https://cawaz.co.jp)に集まる地域活性のボランティア活動チームの方々に私たちの活動を紹介すべく倒木の撤去作業をご一緒いただきました。CAWAZ baseにはOMCの日高市方面の活動の際に集合場所とし
