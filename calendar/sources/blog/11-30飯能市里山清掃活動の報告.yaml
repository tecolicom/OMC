title: 11/30飯能市里山清掃活動の報告
published: '2025-12-04'
body: この日は飯能市の「市民清掃デー」で、自治会の皆さんと協働作業を行いました。主な作業内容は、里山道の入り口の草刈りです。ここ数年、奥武蔵マウンテンバイク友の会が担当させていただいている場所で、住民の皆さんからも私たちの活動に期待を寄せていただいており、連携して作業を続けています。MTBで里山を楽しむためには、まず地域の生活道路を通らせていただくことになります。そのため、市民清掃デーは地域の方々と交流できる非常に貴重な機会です。ただ一点、毎回課題がありまして・・・ローカルライダーである飯能市民のマウンテンバイカーは、自宅周辺の清掃作業に参加する必要があるため、友の会の活動に参加できない状況が続いています。そのため、年2回(5月・11月)の市民清掃デーでは、飯能市外にお住まいの皆さまのお力がとても大きな支えになります。ぜひ来年5月の活動の際には、ご参加・ご協力をいただけましたら幸いです。次回の活動は12/7(日)の名栗ふれあい公園じてんしゃ広場になります。今後ともご協力のほど、よろしくお願いいたします。
