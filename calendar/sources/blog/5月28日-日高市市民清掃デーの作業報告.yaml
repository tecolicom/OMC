title: 5月28日 日高市市民清掃デーの作業報告
published: '2023-05-29'
body: |-
  5月28日(日)は日高市市民清掃デーでした。普段よりも早い7時集合にも関わらず、8名が参加。地域住民とともに、側溝に積もった落ち葉や枝の除去と、道路周辺の草刈りを行いました。

  回を追うごとに住民の方々もOMCのことを認知してくださり、今秋10月の清掃作業への参加も依頼されました。今後も地域と密接な関係を築いていけるよう活動していきますので、皆さんもぜひご参加ください。

  次回の作業は6月4日(日)の名栗じてんしゃ広場定期整備になります。こちらもご参加お待ちしています。
