title: 【ゴールデンウィーク中の名栗ふれあい公園じてんしゃ広場の利用について】
published: '2022-04-28'
body: |-
  GW期間中も名栗ふれあい公園じてんしゃ広場はご利用可能ですが、駐車場が閉鎖になります。
  じてんしゃ広場にお車でお越しの際は名栗地区行政センターの駐車場をご利用ください。
  閉鎖の日時に関してはリンク先にてご確認下さい。https://www.city.hanno.lg.jp/article/detail/5974新型コロナ感染拡大防止への対応のもとご利用ください。
