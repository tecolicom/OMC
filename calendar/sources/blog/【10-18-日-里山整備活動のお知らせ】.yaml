title: 【10/18(日) 里山整備活動のお知らせ】
published: '2020-10-09'
body: |-
  大雨等によって流されて舗装路に溜まった土砂の撤去作業や水切りの整備を行います。
  会員の皆さん、または里山整備活動にご興味をお持ちの皆さんお力添えをいただけたらと思います。
  よろしくお願いします_(._.)_
  集合時間/集合場所
  令和2年10月18日(日) 午前中
  8時00分 飯能市役所駐車場(8:10~あいわ広場にMTBで移動します)
  8時30分 あいわ広場駐車場(お車の駐車可能です)
   あいわ広場に集合し、ミーティング後、MTBで作業箇所に向かいます。 各自で水分補給やおやつの準備をお願いします。
   前日午後5時の気象庁の埼玉県南部の天気予報で、降水確率が50%以上だった場合は中止いたします。(今回は都合により延期はいたしません)
   皆様ご協力をお願いします_(._.)_
   ※阿須公園駐車場が現在、復旧工事中のため集合場所を「あいわ広場」といたします。       地図は下記になります。
