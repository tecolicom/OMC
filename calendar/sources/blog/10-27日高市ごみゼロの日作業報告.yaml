title: 10/27日高市ごみゼロの日作業報告
published: '2024-10-28'
body: 10月27日(日)は日高市ごみゼロの日にともない、地元自治体と協働で林道の清掃を行いました。当会からは10名が参加し、側溝に溜まった土砂や落ち葉を除去したり、道路脇の草を刈ったりしました。年2回のごみゼロの日には毎回活動を行い、今では地域の方に当会を認知してもらえるようになりました。今後も地域との協力関係を築いていきますので、皆さんもぜひご協力ください。
