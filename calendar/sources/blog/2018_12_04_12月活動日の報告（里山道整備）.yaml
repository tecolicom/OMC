title: 12月活動日の報告（里山道整備）
published: '2018-12-04'
body: |-
  2018年12月2日
  先月に引き続き今月も、いつもの里山エリアにある飯能市の市道の整備作業を行いました。

  この里山道整備につきましては、管理者である飯能市と地権者団体からから作業許可をいただいた上で取り組んでおります。
  今回整備したのは、先日に笹薮を刈り、堆積物を除去した舗装路の先にある箇所。

  道が崩れて幅が狭くなり、歩行が難しくなっていました。
  ↑作業前の里山道
  実際の作業としては、まず、作業の効率を上げるため、落ち葉、枝、下草などを道の山側から谷側まで十分な範囲で綺麗にしました。

  土以外のものを取り除くことで、土が固まりやすくもなります。
  次に、山側をなだらかに削り落とし、出た土を谷側に運んで道を拡幅させました。

  この手法はベンチカットと呼ばれています。

  山側をなだらかに削り落とすことで、山側が崩れにくくなり、土が道に溜まって道幅を狭めることはなくなります。
  ↑ツルハシ、鋤簾を振るって道普請
  路肩の補強は、土が乾燥していたので今回は見送り、路肩を踏まないように木を並べるだけに留めました。雨が降って土の水分が増えれば、叩いて締めやすくなるでしょう。また、自重で自然に締まっていくことも考えられます。
  ↑作業後。歩きやすい道となりました。
  今回の作業にあたった会員は5名でしたが、事前に細かく説明し、各自に担当区間を割り当てたこともあり、午前中だけで15mほどの道を拡幅できました。土を削って運ぶという大変な作業でしたが、傾斜した細い道が綺麗で歩きやすい道になったことで、達成感を得られたのではないでしょうか。
  次回は、拡幅作業をさらに続けるとともに、今回の作業区間の路肩補強や細かい木の根の除去を行う予定です
  ↑今回の作業メンバー
  今回の作業現場のすぐ近くでは、ニホンカモシカが姿を現してくれました。
  この豊かな里山環境がいつまでも身近なものでありますようにと願いつつ、私たちの活動が少しでも里山への恩返しとなることを願っています。
