title: 6/2名栗じてんしゃ広場定期作業の報告
published: '2024-06-02'
body: |-
  6月2日は名栗じてんしゃ広場の定期作業日でした。雨天の可能性もありましたが、当日午前中は降らずに済みました。集まった会員は3名。草刈り機2台で広場全体の草を刈りました。人数が少なかったので、すべてを刈れるか不安でしたが、作業を完了できました。次回8月の作業で再び草刈りを行えば、夏場に草が伸びることは少ないと思われます。なお、路面は良いコンディションを保っていたので、補修は次回以降に見送りました。

  今月16日は当会の総会が開催されます。皆さまの元にお知らせのハガキが届いていることと思いますが、総会への参加ならびに会員継続をお願いいたします。

  ビフォー

  アフター
