title: 11月4日名栗じてんしゃ広場整備報告
published: '2019-11-04'
body: |-
  秋の穏やかな日和に急な呼びかけでしたが12名の会員様が集まって頂きました。ほんとうにありがとうございます。
  川の氾濫によりじてんしゃ広場への侵入路に入り込んだ土砂かきに始まり、ゴミや看板の撤去、草刈り、そしてコースの面だしと一気に整備しました。
  おかげさまで17日のじてんしゃ教室を安全に楽しく開催する事ができます。
  重ね重ねありがとうございます。
  本日の頑張りにより予備日としていた10日の整備は取り止めにいたします。
  10日は里山ライドを楽しんでください。
  なお17日の名栗じてんしゃ教室のお手伝いをしてくだる方いらしたら是非参加していただければ幸いです。
