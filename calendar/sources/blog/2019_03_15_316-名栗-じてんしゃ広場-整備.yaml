title: 3/17(日) 名栗 じてんしゃ広場 整備
published: '2019-03-15'
body: |2-
   みなさんのご協力のもと、名栗じてんしゃ広場が完成してから約1年が経ちました。

  コースのレイアウトも少しづつ改良を加えて完成当初より進化し、よりスムースにつながるようになっております。その反面、表面に小石が目立つようにもなってきましたので、このたびコースの表面を滑らかにするべく土を購入いたしました。その土を使って表面を整える作業を行います。

  お時間のある皆さまのご協力をお待ちしております。  日時 3月17日(日)  9:00 ~ 12:00 場所 名栗ふれあい公園 じてんしゃ広場駐車 小殿公衆トイレの先(上流側)の未舗装駐車場または飯能市役所名栗庁舎駐車場 ●土木作業に適した服装でお越しください。

  ●お時間ある方は作業後にライドをお楽しみください!●前日の気象庁発表の天気予報で埼玉県南部の降水確率50%以上の場合は中止といたします。
