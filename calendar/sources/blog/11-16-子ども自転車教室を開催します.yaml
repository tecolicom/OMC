title: 11/16 子ども自転車教室を開催します
published: '2025-10-16'
body: 飯能市広報でお伝えしましたが、11月16日(日)に名栗ふれあい公園じてんしゃ広場で子ども自転車教室を開催します。詳しくは以下のフライヤー、そして質問集をご覧ください。応募フォームはこちらです。ご参加お待ちしています。
