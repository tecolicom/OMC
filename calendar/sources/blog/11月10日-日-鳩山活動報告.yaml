title: 11月10日(日)鳩山活動報告
published: '2024-11-12'
body: |-
  ~11月10日(日)
  鳩山町熊井地区における活動報告。
  今年度も熊井自治会・はとやま環境フォーラム・当会の合同で休耕田の刈払いを行いました。合わせて熊井の森内のトレイルの清掃・倒木の撤去・刈払い、森と農地との緩衝帯の刈払いを行いました。
  当会からは9名が参加。
  今回の作業により休耕田が野生動物の住処になる事が無くなり、緩衝帯を刈る事で往来も減らすことができるそうです。
  トレイルも作業の結果、観察者やマウンテンバイカーの往来がしやすくなり、活用することによって野生動物の移動に制限がかかり棲み分けが進むものと思われます。
  数少ない鳩山での活動ですが、継続していることで保全につながっています。作業時もハイタカやトビ等を観察することが出来ました。少しづつ本来里山に住まう動物たちが戻ってきているようです。
  そんなトレイルも走れて自然観察もできる熊井の森なので、会員の皆様も訪問してみてください。
  追記。里山は言うまでも無く、山から離れた平地の河川敷でもイノシシ等目撃されているそうです。出会いがしら等突然の遭遇ですと襲われてしまう場合もあるのでライドで藪等の近くを走られていく際はお気を付けください。~
