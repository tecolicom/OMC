title: 12月じてんしゃ広場活動日（12月2日、16日）
published: '2018-11-22'
body: |-
  風に舞う紅葉を望むこの頃のじてんしゃ広場。
  12月の活動日は2日と16日の二本立てです。
  12月2日(日) ライド&メンテナンス

  この一年楽しませてくれた感謝を込めて、じてんしゃ広場を綺麗にしましょう。
  12月16日(日) 忘年ライド
  わいわいと乗って笑っておしゃべりして、この年のじてんしゃ広場イベントを締めくくりましょう。「子どもと楽しむ」がコンセプトのじてんしゃ広場、ご家族でのご参加もお待ちしております。
  集合時間・集合場所(2日、16日共通)
  午前9時00分 名栗ふれあい公園内じてんしゃ広場。
  お車は小殿公衆トイレ先(上流側)の未舗装駐車場または飯能市役所名栗庁舎駐車場にお停めください。
  (*公衆トイレ手前の舗装駐車場は公園関連施設ではないので、駐車はご遠慮ください。)
  お昼頃に解散予定です。

  途中からのご参加、途中でのご帰宅もご遠慮なく。


  前日17時の気象庁の天気予報で、当日午前中の埼玉県南部の降水確率が50%以上だった場合は中止といたします。
  平成最後の年送り
  うねりの余韻を味わいながら、笑顔で年を送りましょう。
  皆さんのご参加、お待ちしておりまーす。
