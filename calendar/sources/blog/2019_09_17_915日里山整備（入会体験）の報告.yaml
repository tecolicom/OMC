title: 9/15(日)里山整備（入会体験）の報告
published: '2019-09-17'
body: |-
  今回は奥武蔵マウンテンバイク友の会の体験会として活動に興味を持っていただいているマウンテンバイカーの6名が駆けつけてくれ、日頃の我々の活動を実際に体験していただきました。

  集まった15名が2班に分かれて活動地域の全域を補修して回りました。作業は主に台風15号で発生した倒木をノコギリで切って片づけたり、水切りに積もった堆積物をスコップで撤去するなど誰にでも実践できる手作業で里山道の維持管理の一端をを体験していただきました。
         作業した箇所は長い年月をかけて地元の自治会や、まちづくり推進委員会の方々が守ってこられた道ですが、この台風の影響は里山だけではなく河川敷や市街地にも影響を及ぼしており、地元の自治会や

  まちづくり推進委員会の方々としては里山道まで手が回らないとの事でした。そのため里山の整備の方は我々が担当させて頂く事になりました。

  徐々にではありますが、今回のような台風の通過などで里山への被害が懸念されるときの流れとして、友の会の世話人がいち早く状況を確認すべく里山全体のパトロールを行い被害状況を確認し、各関係先へ報告し相談のうえ指示を仰ぎ、友の会の
