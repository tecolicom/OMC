title: １２月活動日（里山道整備）
published: '2016-12-03'
body: |-
  １２月の活動日は１７日（土曜日）です。

  ＊土曜日にも活動日を割り当ててほしいとの要望がありましたので、１２月活動日は通常の第３日曜日ではなく、第３土曜日に行います。


  雨予報により延期となりました先月の活動予定を引き継ぎ、里山道の整備、おもにぬかるみの改善作業を行う予定です。

  泥に汚れてもかまわない服装、長靴、軍手などと、お持ちの方はスコップや手鋸などをご用意ください。


  集合時間／集合場所

  ８時００分 飯能市役所駐車場（集合後、阿須運動公園に移動）

  ８時３０分 飯能市阿須運動公園駐車場


  前日の１７時時点の気象庁の天気予報で、埼玉県南部の１７日午前中の降水確率が５０％以上だった場合は活動日を延期します。延期の日取りにつきましては、追ってお知らせいたします。
  今月はお天気に恵まれることを祈りつつ、皆さまのご参加、お待ちしておりまーす。
