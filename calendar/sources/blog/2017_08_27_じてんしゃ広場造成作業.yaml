title: じてんしゃ広場造成作業
published: '2017-08-27'
body: |-
  長い長い雨降りの日々が終わるとともに、名栗のじてんしゃ広場予定地に土が搬入されることになりました。
  待ちに待ったコースの造成に取りかかります。
  8月27日の時点て決定している作業予定日は以下の通りです。
  9月3日(日)
  9月10日(日)
  9月17日(日)
  9月18日(月祝)
  集合時間・集合場所
  9時00分 飯能市役所名栗庁舎駐車場
  庁舎駐車場に集合し、ミーティング後、じてんしゃ広場の造成予定地に向かいます。
  作業内容はパンプトラックの造成作業。

  土を盛って固めて、うねりやバームのついた自転車コースを造ります。
  汚れてもかまわない格好、軍手などと、お持ちの方はスコップや熊手などをご用意ください。

  バスタオルやタオルケットも、土を固めるのに重宝します。
  じてんしゃ広場のすぐそばにある星宮神社の例大祭が9月24日(日)にあり、近隣地域では「第一回 なぐり 見・聞・食ブラさんぽ」が開催されます。
  それに合わせて、じてんしゃ広場もプレオープンイベントを行います。

  イベント内容につきましては、追って連絡いたします。
  めったにないコース作りの機会、皆さんとともに存分に楽しんで、素敵な広場を創っていきたいと考えております。
  お力添えのほど、どうぞ宜しくお願いいたします。
