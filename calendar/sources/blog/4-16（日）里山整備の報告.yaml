title: 4/16（日）里山整備の報告
published: '2023-04-17'
body: |-
  4月16日は里山の定期作業日でした。集まった会員は5名。
  飯能市道路美化団体として活動を登録している市道の水切りの清掃を行いました。
  水切りに土砂や枝が堆積していたため、前日に降った雨が道路上を流れた跡を確認。
  堆積物をしっかりと除去し、道路上を流れる雨水の量を減らせるようにしました。
  残り1名はあいわ広場の物置の改修を担当。より広々と使えるようになり、道具が増えても対応できるようになりました。
  参加された皆さん、お疲れ様でした。

  また、北の尾根と南の尾根の注意喚起の看板の付け替えを行いました。
  南の尾根の階段を通行の際は、法面の植栽の保護のため階段脇をタイヤを転がすことなく、MTBを持ち上げての通行をお願いします。
