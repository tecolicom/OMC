title: 2月2日名栗じてんしゃ広場定期整備のお知らせ
published: '2020-01-19'
body: |-
  昨年は名栗じてんしゃ広場の整備にご協力頂きありがとうございます。

  今シーズンも会員の皆さんのお力添えよろしくお願い申し上げます。

  さて今シーズン最初の名栗じてんしゃ広場定期整備を行います。

  昨年の末に新しい土を搬入しています。

  面に適した土ですので走行面の整備を行いたいと思います。

  一年で一番寒い時期ですのでdigで身体を温めその後にrideしましょう!よろしくお願い申し上げます。

  日時  2月2日   9時より

  場所  名栗じてんしゃ広場

  前日の午後5時、気象庁の埼玉県南部の降水確率が50%以上の場合は中止とさせて頂きます。
