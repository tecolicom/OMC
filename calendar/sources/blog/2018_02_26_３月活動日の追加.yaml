title: ３月活動日の追加
published: '2018-02-25'
body: 3月3日土曜日、名栗ふれあい公園内じてんしゃ広場の造成作業を行います。じてんしゃ広場の造成も残すところライン一つ。空撮写真中央の長方形コースに対角線ラインを作ります。
  集合日時・集合場所3月3日、9時00分 名栗ふれあい公園内じてんしゃ広場。お車は小殿公衆トイレ先(上流側)の未舗装駐車場または飯能市役所名栗庁舎駐車場にお停めください。(*公衆トイレ手前の舗装駐車場は公園関連施設ではないので、駐車はご遠慮ください。)
  泥に汚れてもかまわない服装、長靴、軍手などと、お持ちの方はスコップなどをご用意ください。 前日の17時時点の気象庁の天気予報で、埼玉県南部の3日午前中の降水確率が50%以上だった場合は活動日を延期します。延期の日取りにつきましては、追ってお知らせいたします。
  皆さまのご参加、お待ちしております。
