title: 9月の活動日
published: '2016-09-08'
body: |-
  ９月の活動日は１８日（日曜日）です。

  先月、悪天候予報により行えなかった里山道周辺の草刈り、倒木撤去などを行います。

  泥に汚れてもかまわない服装、軍手などと、お持ちの方は手鋸などをご用意ください。


  集合時間／集合場所

  ８時００分 飯能市役所駐車場（集合後、阿須運動公園に移動）

  ８時３０分 飯能市阿須運動公園駐車場


  前日の１７時時点の気象庁の天気予報で、埼玉県南部の１８日午前中の降水確率が５０％以上だった場合は活動日を延期します。延期の日取りにつきましては、追ってお知らせいたします。
  大雨続きの今日この頃、里山の傷みが気になりますね。

  今月の活動日は天候に恵まれることを祈りつつ、皆さまのご参加、お待ちしておりまーす。
