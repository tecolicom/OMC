title: 鳩山班活動報告。
published: '2022-11-01'
body: 10月29日(土) 鳩山町熊井にて、下熊井自治会・はとやま環境フォーラム・当会の共同で谷津田休耕田の刈払いを行いました。茂った草を放っておくと、イノシシの格好の隠れ家となり、近隣の畑が荒らされたり、里山を散策する方々、ひいてはライドに来たマウンテンバイクとも事故を起こしかねないので刈っておく必要があります。
  同時に別グループで森の中のトレイルの掃除、倒木の処理等を行いました。 次いで30日(日)に鳩山NTふれあいセンターにて「熊井の森・保全活用活動の報告会」があり、当会の飯能や日高、名栗での活動の紹介をさせていただきました。
  今後も身近にある自然と親しめる良い里山の保全をしていく中で、自然や地元との良い関係を築いていきたいと思います。
