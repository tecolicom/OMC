title: 5月の活動報告（里山道整備）
published: '2019-05-21'
body: |-
  絶好のMTBライド日和の5月19日に奥武蔵マウンテンバイク友の会の活動を行ってきました。二つの班に分かれて、ひとつの班は地元自治会との協働作業を、もうひとつの班は奥武蔵マウンテンバイク友の会の道路整備活動現場の定期作業を進めました。   【共同作業の報告】 この日は飯能市の市民清掃デー。里山に隣接する自治会では里山道の整備もされており、われわれも参加させていただきました。15年ほど前には深く谷状に掘れてしまっていた道でしたが、自治会の皆さんの手作業でたくさんの水切りを作ることで浸食を止め、これ以上傷まないように維持されている里山道の作業でした。

  当時の道の傷み具合を知っている私としては、ここまでしっかりと作り直し、維持管理されてきた自治会の皆様の行動力に頭が下がるばかりです。これから先は私たち奥武蔵マウンテンバイク友の会も協働させていただけることになり感無量です。この地域をマウンテンバイクで楽しまれている皆さんもこういった活動に参加したくなりましたらご入会いただきご一緒ください。

                   まずは作業箇所まで徒歩で移動        地元の自治会の方たちに混
