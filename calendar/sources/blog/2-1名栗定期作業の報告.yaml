title: 2/1名栗定期作業の報告
published: '2026-02-05'
body: |-
  2/1は名栗じてんしゃ広場の定期作業日でした。晴天の中集まった参加者は6名。
  雨が長期間降っておらず、表土の水分がほとんど無いため、霜柱ができていませんでした。土を新たに盛ってもくっつかないことが多いため、ジャンプレーンの芝生除去をメインに作業しました。
  2時間ほどでジャンプレーン走行面全体の芝生を取り除くことができ、より走りやすくなりました。参加された皆さん、お疲れ様でした。
  次回は2/15に里山整備活動を行います。ご参加お待ちしています。
