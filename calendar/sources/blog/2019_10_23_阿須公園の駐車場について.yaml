title: 阿須公園の駐車場について
published: '2019-10-22'
body: |-
  台風19号の影響により、飯能市阿須公園の駐車場が現在利用できません。
  園内は相当な被害があり、復旧にはしばらく時間がかかりそうですので、お車でお越し方はお気をつけください。
