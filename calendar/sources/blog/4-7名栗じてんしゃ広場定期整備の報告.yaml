title: 4/7名栗じてんしゃ広場定期整備の報告
published: '2024-04-08'
body: |-
  4月7日は、名栗じてんしゃ広場の定期作業日でした。お花見日和の中集まったのは10名。まずは土が流れ出てしまったジャンプレーンに土を入れ、きれいな面を作りました。
  上流側パンプトラックは路面に問題がなかったので、砂利を掃くだけにとどめ、さらにきれいにしました。
  最後に下流側パンプトラックのコブ3つも土が流れ出て小さくなっていたので、こちらにも土を入れて厚みをつけると同時に、砂利を掃いてきれいにしました。
  対岸の桜が見頃を迎えていますので、お花見がてら、きれいになったパンプトラックをぜひご利用ください。
  再来週の4月21日は子ども自転車教室です。まだ空きがありますので、ご参加を希望される方はお申し込みください。
