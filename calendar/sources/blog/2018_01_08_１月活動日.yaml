title: １月活動日
published: '2018-01-08'
body: |-
  今年最初の活動は1月21日(日)。じてんしゃ広場の造成作業を行います。

  2つ目のコースであるジャンプレーンも完成に近づいて、いっぱしのバイクパークの雰囲気すら漂ってきたじてんしゃ広場。

  子どもも大人も楽しめる素敵な広場に育ちつつあります。

  完成にむけて、皆さまお力添えのほど宜しくお願いいたします。 集合日時・集合場所1月21日、9時00分 名栗ふれあい公園内じてんしゃ広場。お車は小殿公衆トイレ先(上流側)の未舗装駐車場または飯能市役所名栗庁舎駐車場にお停めください。(*公衆トイレ手前の舗装駐車場は公園関連施設ではないので、駐車はご遠慮ください。) 泥に汚れてもかまわない服装、長靴、軍手などと、お持ちの方はスコップなどをご用意ください。 前日の17時時点の気象庁の天気予報で、埼玉県南部の21日午前中の降水確率が50%以上だった場合は活動日を延期します。延期の日取りにつきましては、追ってお知らせいたします。 もりもり土を盛り上げて、作業の合間はパンプのライドを楽しみましょう。皆さまのご参加、お待ちしておりまーす。
