title: 12/3名栗定期作業の報告
published: '2023-12-05'
body: |-
  12月3日（日）は名栗じてんしゃ広場の定期作業日でした。10日のじてんしゃ教室に備え、合計5名で草刈りと路面の整備を念入りに行いました。これで公園全体をスムーズに走れるはずです。

  この時期にしてはやや早い霜が懸念されますが、週後半は暖かくなる予報ですので、良い路面状況で子ども教室が行えるよう祈りましょう。皆さんのご参加、お待ちしております。

  ビフォー

  アフター
