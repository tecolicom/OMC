title: 一月の活動報告
published: '2017-02-01'
body: |-
  鳩山町道整備作業　2017年1月21日（土）

  2017年度最初の活動では、鳩山町里山にある町道の整備を行いました。活動には会員/非会員含め21名に参加していただきました。

  最初に鳩山町議員の森氏宅にお邪魔し、挨拶及び今回の作業内容を確認した後、チェーンソーによる倒木除去班と清掃班に分かれて作業に取りかかりました。

  じてんしゃ屋・佳チームライダーに​道案内していただきながら、道路脇の境界を確認できた範囲内で歩行しやすいよう下草や倒木の除去を行いました。

  作業内容によっては刃物を使う場面もありましたが、怪我や事故などの報告は受けておらず、安全に作業を終了できました。
  なお、当日に参加した非会員は、ボランティア保険に未加入であることから、今後の活動の参考を兼ねて見学のみとさせていただきました。
  参加された皆さん、ご協力ありがとうございました。

  昼食を挟み、午後2時より森氏宅にて、鳩山町で活動する環境保護団体と会合を開きました。奥武蔵MTB友の会からは会長三上、副会長北澤、堀内、江下、竹田、西脇の計6名が話を伺いました。
  今後、継続して情報交換することで、保護活動と整備活動を両立し、鳩山町の里山環境を守り、安全に楽しんでいく予定です。
