title: ３月活動日のお知らせ
published: '2017-03-11'
body: |-
  空の色が青から水色へと変わり、奥武蔵の里山には春の香りが漂い始めました。

  今月の活動日は３月２５日（土曜日）。
  活動内容はお掃除ツーリングです。

  集合時間／集合場所
  ８時００分　飯能市役所駐車場（集合後、阿須運動公園に移動）
  ８時３０分　飯能市阿須運動公園駐車場

  上記のいずれかにお集まりください。

  阿須運動公園に集合し、ミーティング後、トレイルのゴミ拾いなどをしつつツーリングします。
  トレイルの痛みの激しい場所のチェックも行い、メンテナンスが必要な箇所は、ハイキング道の管理を行っている加治美杉台まちづくり推進委員会に報告します。

  １１時頃に再集合し、集めたゴミをまとめたあと、解散となります。（集めたゴミは車で飯能市クリーンセンターに持ち込みます）。

  前日の１７時時点の気象庁の天気予報で、埼玉県南部の２５日午前中の降水確率が５０％以上だった場合は活動日を延期します。

  延期の日取りにつきましては、追ってお知らせいたします。

  里山の春の足音を聞きながらの皆さんとの作業、楽しみにしております。
