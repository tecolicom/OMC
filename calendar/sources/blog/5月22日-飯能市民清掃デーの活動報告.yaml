title: 5月22日 飯能市民清掃デーの活動報告
published: '2022-05-23'
body: |-
  5月22日（日）は、飯能市の市民清掃デーでした。
  日ごろマウンテンバイカーの集まるこの地域の2つの自治会でも清掃活動が行われ、奥武蔵マウンテンバイク友の会（OMC）も協力させていただきました。
  1つめの自治会では、住民約15名とOMC会員5名で二手に分かれ、住宅街裏の里山道の除草、ゴミ拾い、水切りに堆積した土砂の除去を行いました。前日の夜に強い雨が降りましたが、大きく作った水切りは機能しているようでした。

  また別の自治会と共に作業した班は里山道に入る手前の舗装路の路肩の雑草刈りを担当し、雑草に覆われていたカーブミラーや、ブラインドになっていた路肩の雑草の刈り払いを行いました。
  見通しを悪くしていた要因を解消したことで通行の安全性を向上させることに貢献できたかと思います。

  こういった地元の皆さんの地域活動にご一緒させていただくことでこの地域を訪れるマウンテンバイカーとの交流の機会を増やしていけたらたと思います。
  会員の皆様のお力添あってこそなのでこれからもよろしくお願いします。

  ちなみに来週29（日)は日高市の「ごみゼロ運動」が行なわれます。
  こちらの活動も地域の皆さんとOMCの協働作業です。
  集合時間が6：45と早い時間になりますが、早起きが得意な皆さんのご参加をお待ちしています。
