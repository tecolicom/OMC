title: ６月の活動予定
published: '2018-05-25'
body: |-
  紫陽花のつぼみに梅雨の季節を思いつつ、MTBingに絶好の日和が続く今日この頃です。
  6月の奥武蔵マウンテンバイク友の会活動は2本だて。
  6月3日 名栗じてんしゃ広場ライド&メンテナンス
  じてんしゃ広場のパンプトラックライドを楽しみつつ、痩せたコブを太らせたり、傷んだ路面をケアしたり。初夏の名栗を楽しみましょう。
  集合日時 6月3日(日)、9時00分
  集合場所 名栗ふれあい公園内じてんしゃ広場
  お車は小殿公衆トイレ先(上流側)の未舗装駐車場または飯能市役所名栗庁舎駐車場にお停めください。(*公衆トイレ手前の舗装駐車場は公園関連施設ではないので、駐車はご遠慮ください。)
  6月17日 第五回定期総会
  会員皆さまのお力添えを頂いて、5年目を迎える奥武蔵マウンテンバイク友の会。
  今までの活動を振り返り、これからの夢と目標について会員皆で考えたいと思います。
  集合日時 6月17日(日)、9時00分
  総会会場 飯能市役所名栗庁舎集会場
  議題終了後は、埼玉県生態系保護協会から講師の方をお招きし、里山の生き物とそれをとりまく環境についてお話いただきます。
  普段とは違った視点で里山について考えて、里山生態系と私たちの活動の関わり方について想いを巡らす機会となればと思います。
  総会終了後は、じてんしゃ広場で懇親ライドを行います。
  皆さまご参集のほど、どうぞ宜しくお願いいたします。
