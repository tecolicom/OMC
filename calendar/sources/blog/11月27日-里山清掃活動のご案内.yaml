title: 11月27日 里山清掃活動のご案内
published: '2022-11-20'
body: ※11/22更新 集合時間を一部変更しました。11月27日は飯能市の市民清掃デーです。地元自治会の皆様の里山清掃作業に奥武蔵マウンテンバイク友の会もご一緒させていただきます。(事前にお知らせしている11月の活動予定には入っていませんでした。失礼いたしました。)今回も岩渕自治会と阿須自治会のみなさまと活動いたします。我々が日々楽しませていただいているトレイルの入り口にお住いのみなさまとの協働作業です。是非ご参加ください。■阿須自治会の作業へご参加いただける方は、開始時間が早いため8:00にあいわ広場にご集合ください。主な作業内容は草刈りなどの予定です。草刈り鎌をお持ちの方はご持参ください。近隣にお住いで、早起きが得意な方は是非8:00にお集まりいただけたらと思います。■岩渕自治会の作業へご参加いただける方は、通常通り8:30にあいわ広場にご集合ください。主な作業内容は水切りの清掃などの予定です。スコップをお持ちの方はご持参ください。現地まではトレーラーでお運びいたします。活動場所が複数になるため、より多くのご協力をお待ちしております。【集合場所は共通です】■集合場所:あいわ広場(お車の駐
