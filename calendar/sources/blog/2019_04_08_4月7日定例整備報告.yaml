title: 4月7日定例整備報告
published: '2019-04-07'
body: |2-
           4月7日
  9時から11時
  参加者7名

  ここ数日の花冷えから一転、暖かく名栗じてんしゃ広場に行く道路にはたくさんのローディが見受けられ、本格的なじてんしゃシーズンを迎えたと感じる本日、会員5名と度々じてんしゃ広場を利用されている2名の方とで定例整備を行いました。
  作業は小石の撤去と、ステップアップになっているセクションのリューアルなどを行いました。
  来週に開催するキッズスクールに安全に楽しめ、もちろん大人も楽しめる様に整備しましま。
  本日も参加して頂きありがとうございます。
  来週の日曜日、4月14日、こちら名栗じてんしゃ広場にてキッズスクールを行います。是非お子様と参加してはいかがでしょうか。
  スクールのヘルプの方も募集中です。
  皆さんでキッズスクールもりあげましょう!
  尚次回の定例整備は6月2日となります。会員の皆さんのお力添えよろしくお願いします!
