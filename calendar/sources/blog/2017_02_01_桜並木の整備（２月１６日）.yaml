title: 桜並木の整備（２月１６日）
published: '2017-02-01'
body: |-
  加治美杉台まちづくり推進委員会のさくら・散策路づくりの活動が2月16日(木)にあります。桜並木の手入れを行います。
  ご一緒いただける方がいましたら無理のない範囲でご参加ください。

  加治美杉台まちづくり推進委員会に参加人数をお伝えしますので、2月12日(日)までに、「お問い合わせ」ページから参加表明をお願いします。
  日時   2月16日(木)am9:00~11:30
  集合場所 あいわ広場
  持ち物  軍手、鎌、手鋸、刈払機(お手持ちの範囲で)
