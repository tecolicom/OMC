title: 4/18 子供じてんしゃ教室を行いました
published: '2021-04-19'
body: |-
  4/18(日)じてんしゃ教室を開催いたしました。
  昨日の本降りの雨の影響を考慮していただいたためか参加者が少なかったのですが、その分、マンツーマンに近い状態でレッスンすることが出来ました。

  子ども教室のベテラン参加者のR君は課題克服に向けたトライを。
  はじめて未舗装路を走った女の子のKちゃんでしたが全コースを足を付かずに回れるようになりました。
  それぞれの成長に合わせて充実した内容で行えたように思います。

  じてんしゃ広場のオープンから3年になりますが、会員の皆さんとの定期的な補修や修正により、より安心して楽しめるようになっています。
  こども教室以外にもいつでもご利用ください。
