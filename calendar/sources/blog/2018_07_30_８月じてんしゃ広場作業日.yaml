title: ８月じてんしゃ広場作業日
published: '2018-07-29'
body: |-
  8月最初の日曜日は名栗ライド&メンテナンスを行います。
  じてんしゃ広場のパンプトラックライドを楽しみつつ、傷んだ路面をケアしたり。

  夏の名栗を楽しみましょう。

  集合日時 8月5日(日)、9時00分
  集合場所 名栗ふれあい公園内じてんしゃ広場
  お車は小殿公衆トイレ先(上流側)の未舗装駐車場または飯能市役所名栗庁舎駐車場にお停めください。(*公衆トイレ手前の舗装駐車場は公園関連施設ではないので、駐車はご遠慮ください。)

  前日の17時時点の気象庁の天気予報で、埼玉県南部の5日午前中の降水確率が50%以上だった場合および予想最高気温が35度以上だった場合は中止いたします。

  お力添えのほど、どうぞ宜しくお願いいたします。
