title: 6/14第13回総会の報告
published: '2026-06-16'
body: |-
  6月14日(日)、奧武蔵マウンテンバイク友の会の第13回総会を、飯能市柳町の「Studio TECOLI」にて開催しました。

  総会では昨年度の活動報告と会計報告、世話人の承認、今年度の活動予定と予算案を説明し、ご理解とご承認をいただきました。
  最後に会長の三上から日頃の活動参加への感謝と今後のより多くの活動参加のお願いをさせていただき、総会は無事に終了しました。

  総会終了後は、会員8名でアフターライド。前々日の雹を伴う大嵐の影響で落葉や落枝が多数でしたが、みなさんで元気に楽しく走れました。

  2014年6月に発足してから13年目となる2026年度も、引き続きご協力をよろしくお願いいたします。

  奥武蔵マウンテンバイク友の会 世話人一同

  次回の活動は7/19の里山整備作業です。
