title: 写真展のお知らせ (OPEN HOUSE in HANNO)
published: '2016-08-03'
body: |-
  8月6日(土)、飯能市青年会議所主催の「OPEN HOUSE in 飯能」のイベントの一つとして、友の会の活動の写真などを展示することになりました。

  あわせて西脇仁哉君、新井俊幸さんの素晴らしい作品群を展示いたします。

  会場は、飯能大通り商店街の神田板金さんの店舗(クリックで地図を表示)をお借りいたします。

  時間は10:00から17:00。

  お時間ございましたら、ぜひお越し下さいませ。
