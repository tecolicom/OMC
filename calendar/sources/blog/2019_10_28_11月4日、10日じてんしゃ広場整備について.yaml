title: 11月4日と10日のじてんしゃ広場整備について
published: '2019-10-28'
body: |-
  このたびの集中豪雨で被害にあわれた方々こころからお見舞い申し上げます。

  今回の大雨により、名栗じてんしゃ広場でも川の氾濫により、パンプ自体には被害が無かったのですが、浸水によりゴミや土砂が公園内に入りこんでいます。

  11月17日に名栗じてんしゃ広場にてじてんしゃ教室をとり行う予定でいます。
  当日こども達が楽しめる様にイレギュラーではありますが、11月4日 と10日に整備を行いたいと思います。
  4日に完了する様でしたら10日は行いません。
  会員の皆さんのお力添えよろしくお願い申し上げます。

  日時         11月4日     9時より
  場所  名栗じてんしゃ広場

  尚前日の気象庁17時の予報で降水確率が50%以上の時は中止とさせて頂きます。
