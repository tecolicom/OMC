title: 2月5日名栗定期整備について
published: '2023-01-23'
body: 今週は最強寒波がやってきて、トレイルは雪化粧になりそう。皆さん待望のスノーライドとなりそうですね。さて2月5日は名栗じてんしゃ広場の定期整備となります。寒いとは思いますが、暖かい装備でご参加頂ければ幸いです。場所:名栗じてんしゃ広場時間:9時より11時頃まで尚、前日17時の気象庁発表による埼玉県南部の天気予報で、当日6時〜12時の降水確率が50%以上だった場合は中止とさせて頂きますのでよろしくお願いします。
