title: 名栗じてんしゃ広場のお知らせ
published: '2021-01-23'
body: |-
  随分と久々の雨で、カサカサのホコリでスリッピーなトレイルの状況もこれで多少は解消される事ではないでしょうか？
  緊急事態宣言により、来月の名栗定期整備の中止をお願いしている名栗じてんしゃ広場ですが、次回の整備に向け、飯能市内の土建会社様にお願いしていた土の搬入を行いました。
  搬入時の土は丁度よい水分量ですぐにでもdigをしたい気持ちになりました。
  次回の定期整備日は4月4日なので今回搬入した土も水分が抜けてカチカチの土になってしまいそうです。
  非常事態宣言により何かと御不自由なマウンテンバイクライフかと思います。
  次回の定期整備には多分あけているでしょう。
  ride&dig楽しみながら活動のご協力よろしくお願い申し上げます。
