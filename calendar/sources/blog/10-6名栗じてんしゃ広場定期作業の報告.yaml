title: 10/6名栗じてんしゃ広場定期作業の報告
published: '2024-10-07'
body: |-
  10月6日(日)は名栗じてんしゃ広場の定期作業日でした。霧雨がパラつく中、14名が集合。草刈り機5台体制で広場全体の草を刈り、一部の路面も補修しました。

  当面の間は草刈りが不要になり、路面の補修に専念できそうです。気温が落ち着いた今、路面が乾き次第、ぜひ遊びに来てください。
