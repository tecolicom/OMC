title: 「はんのう生活祭＆西川材フェアー」が開催されます
published: '2022-11-11'
body: |-
  今週末、11/13(日)9時30分~14時30分、飯能市役所駐車場において、「はんのう生活祭&西川材フェアー」が開催されます。
  西川材フェアーの中の駿河台大学コーナーに、大学での取り組み展示があり、当会がサポートしている「駿大の里山」の活動についてのポスターが展示されます。
  他にも飯能の新鮮な農産物や特産品の販売や、楽しそうなコーナーがあります。
  お近くにお寄りの際はご覧になってみてはいかがでしょう?

  飯能市役所ホームページ
  https://www.city.hanno.lg.jp/article/detail/6315

  飯能商工会議所ホームページ
  それぞれのポスターの画像をクリックすると詳細のPDFが開きます。
  https://www.hanno-cci.or.jp/xo_event/xo_event-1171/
