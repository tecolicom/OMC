title: 【７/２６(日) 里山整備活動のお知らせ】
published: '2020-07-22'
body: "先日予定してた作業は降雨の予報が出ていたため延期となりましたので、予備日のお知らせです\n前回に引き続き、飯能市・道路整備活動団体として管理させていただいている里山にて草刈りや水切りの整備を行います。\n\
  これからの季節は大雨も多くなりますので、今のうちに行いたい作業があります。お力添えよろしくお願いします_(._.)\n軍手などご持参の上、汚れても構わない服装でお集まりください。\
  \ 水切りの清掃やぬかるみの整備といった土方作業や、雑草や伸びた枝の除去が主な作業になります。\nお手持ちの方は、持ち運び可能なノコギリやスコップなど、ご自分で使用する道具があればお持ち込みください)\n\
  集合時間/集合場所\n令和2年7月26日(日)\n8時00分 飯能市役所駐車場\n8時30分 あいわ広場駐車場(お車の駐車可能です)\nあいわ広場に集合し、ミーティング後、MTBで作業箇所に向かいます。\
  \ 各自で水分補給やおやつの準備をお願いします。\n※前日午後5時の気象庁の埼玉県南部の天気予報で降水確率が50%以上、または予想最高気温が35°C以上になった場合は中止いたします。\
  \ \n※阿須公園駐車場が現在、復旧工事中のため集合場所を「あいわ広場」といたします。\n地図はこちら\n奥武蔵のフィールドを楽しんでいるマウンテンバイク愛好家のみなさん、日頃楽しんでいるトレイルを維持する活動です。\n\
  お時間ございました是非ともご協力をお願いします!"
