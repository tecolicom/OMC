title: 【訃報】
published: '2024-06-27'
body: |-
  奧武蔵マウンテンバイク友の会の会員で、数年前まで世話人を務めてくれていた倉上慶大さんがお亡くなりになりました。プロ ロッククライマーとして国内外で活躍し、クロストレニーングの一環としてMTBを取り入れたことから、我々奥武蔵マウンテンバイク友の会の世話人との交流が始まりました。
  やがてマウンテンバイクとロッククライミングのフィールド保全活動に共通点を見出したことから数年間に渡り奥武蔵マウンテンバイク友の会の世話人を務めてくれました。
  特に日高市方面のMTBフィールド周辺の住民の方達とマウンテンバイカーとの交流の橋渡し役としてご尽力を頂きました。
  38歳という若すぎる年齢での他界に言葉になりません。
  心よりご冥福をお祈りいたします。https://www.instagram.com/keitakurakami?igsh=MXBjdml4czdrNDIzaw==
