title: 【2/15(日)の活動報告】
published: '2026-02-20'
body: |-
  1週間前の降雪の影響で、里山道には多くの落ち枝が散乱していると予想されました。

  そこで、3班に分かれて活動地域全体を巡回し、里山道の清掃活動を行いました。
   参加者は16名。初参加や体験参加の方、常連メンバーなど、関わり方もさまざまです。

  バイクも、最新型のフルサスペンションから、リジットフォークにカンチブレーキを装着した26インチ、さらにはeMTBまで、実にバラエティ豊か。

   そんな多様なメンバーが集まり、日頃から親しんでいる里山のフィールドを、ボランティアとして自らの手で整備しています。

  次回は3/15(日)に行います。
  詳細は2週間前を目途にブログとFacebookページにて告知させていただきます。

  会員の皆さん、または新規で活動に興味をお持ちいただいた皆さん、ご参加お待ちしています。

  ブログ | omcweb

  (1) Facebook

  新規入会 | omcweb
