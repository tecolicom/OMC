title: 5/19 里山道清掃活動の報告
published: '2024-05-21'
body: |2-
   5月19日(日)は、飯能市で市民清掃デーが実施されましたこの日、マウンテンバイカーが集まる地域の2つの自治会でも清掃活動が行われ、OMCの会員10名が協力しました。 ご協力いただいた皆様、ありがとうございました。 阿須自治会では、地域を流れる川の脇の草刈りが行われました
  先日の自治会の会合でも「毎回の活動にMTBの人たちが来てくれるから本当に助かる」との声があり、今回の作業場所も事前に指示されました。岩渕自治会では、麓から尾根に続く里山道の整備が行われました
  通行を妨げていた倒木の撤去や、路肩から張り出した小木の刈り取りが行われました。このルートは飯能市によって車両通行止めのゲートが設置されていますが、MTBは車両に含まれないことを示す「自転車の通行は可能です」との表示ステッカーが自治会の方により貼られました。 どちらの自治会の方々からも、周辺地域の環境美化活動にMTBライダーが協働していることが自然なことになってきたとの実感を得ました。 今後も地域住民との良好な関係を続け、快適にMTBで遊ぶ事が出来るよう、会員の皆様のご協力をお願い致します。

  次回の活動は5/26(日)に日高市に
