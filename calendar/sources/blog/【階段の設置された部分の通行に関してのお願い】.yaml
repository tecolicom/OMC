title: 【階段の設置された部分の通行に関してのお願い】
published: '2021-02-15'
body: |-
  昨年、阿須山中活性化推進委員会様による道路開通により、里山道から新設道路を繋ぐ階段が設置されました。
  この階段区間を通行する場合はマウンテンバイクを持ち上げて徒歩にて通行してください。

  数日前、この階段の東側の法面（私有地）の部分を走行したタイヤ痕（オートバイとマウンテンバイク）がありました。
  この行為により法面を覆う芝生が剥がれる被害が発生しております。
  この芝生は法面の崩壊を防ぐために重要な役割を担っています。
  このような破壊行為はあってはなりません。

  会員の皆さんはこのような行動を行わないと思いますが、もしこのような行為を見かけることがありましたら、法面の芝を傷つけることの無いようにマウンテンバイクを持ち上げて歩行するようにお声掛けをお願いします。
  マウンテンバイク愛好家による迷惑行為を無くしていきましょう。
  ご協力お願いします。

  奥武蔵マウンテンバイク友の会
  世話人一同

  側面の斜め横断のタイヤ痕
  側面を斜めに通行することは法面の破壊行為です

  階段脇のタイヤ痕
  階段を歩行し、側面をバイクのブレーキをかけてを押して歩くことも法面の芝を剥がすことになります。必ずMTBを持ち上げて通行してください。
