title: 5/31日高市清掃作業＆6/7名栗定期作業のお知らせ
published: '2026-05-16'
body: |-
  5月31日（日）は日高市ごみゼロの日に伴い、地元自治体と協働で道路の清掃と草刈りを行います。集合時間が普段の活動より早いですが、ご協力よろしくお願いします。

  集合時間：午前7時45分
  集合場所：セブンイレブン日高高麗本郷店（https://goo.gl/maps/5ht4sMVpYWLzYZjZ7）
  作業場所まではMTBで移動します。手鋸や枝切りバサミをお持ちの方はご持参ください。お車でお越しの方は近隣のコインパーキングに駐車してください。

  また、6月7日（日）は名栗じてんしゃ広場の定期整備を行います。草刈りをメインに行いつつ、荒れた路面を補修します。同広場に午前9時にお集まりください。11時頃まで作業を行う予定です。

  なお、いずれの日程も前日17時の気象庁発表による埼玉県南部の天気予報で、当日6時〜12時の降水確率が50%以上およびまたは予想最高気温が35°以上の場合は中止といたしますのでご了承ください。

  皆さんのご参加、お待ちしています。
