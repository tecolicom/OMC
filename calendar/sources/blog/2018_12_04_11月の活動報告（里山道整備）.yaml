title: 11月の活動報告（里山道整備）
published: '2018-11-17'
body: |-
  2018年11月17日(土)晴れ

  <飯能市道の清掃>

  11名の会員の方々が参加くださいました。

  阿須運動公園駐車場に集まり、まず本日の作業内容についてミーティングしました。その後、「公園内では自転車を降りて通行してください」との看板の指示に従い、阿須運動公園内は自転車を押して歩いて作業地に向けて出発。


  今回の作業箇所は、いつもの里山エリアにある飯能市の市道。

  奥武蔵マウンテンバイク友の会が「飯能市道路美化活動団体」として認定され、この市道の整備作業が実現できました。

  この道初めての整備作業となる本日は、里山道入り口部分にあたる舗装区間の清掃作業と、その先の笹に埋もれた山道の草刈りの二手に分かれて行いました。

  舗装区間では、落ち葉をほうきで掃き、さらに路面に溜まった土をスコップで道脇に退けて清掃作業を進めました。
  ↑作業前
  ↑落ち葉を掃き、路面を覆う土砂を避けて
  ↑綺麗な路面となりました。
  山道部分は刈払機で笹退治。

  作業が終わる頃には、本来の舗装路が全て現れ、山道のほうも笹藪が刈り払われて見通しがよくなり、歩きやすい道となりました。


  上記の作業後、片斜面となり狭小化している区間を視察し、道幅の拡幅など今後の作業工程を大まかに打ち合わせしました。

  今回の作業において怪我の報告はありませんでした。


  今後は、山道部分の土を動かす土木作業を予定しています。

  お力添えのほど、どうぞよろしくお願いします。
