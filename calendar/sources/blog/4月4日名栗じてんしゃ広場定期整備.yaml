title: 4月4日名栗じてんしゃ広場定期整備
published: '2021-03-22'
body: |-
  会員の皆さんと活動ができない日々がすぎ、いつの間にか桜がほころぶ良い季節になりました。
  さてやっと非常事態宣言が解除となり、まずは名栗じてんしゃ広場の定期整備から活動を再開したいと思います。
  先日会員の皆さんの会費より赤土を購入し公園に搬入しました。
  赤土はもろくなってきた、バームやコブの路肩の盛り土に使用したいと思います。
  以前購入した脱水土は面の整備に使用します。
  土も整備の使用にあった土がありますね。その辺も整備しながら、体験して頂き土と遊んで頂けたらと思います。
  まずは名栗じてんしゃ広場の整備で皆さんとお会いできれば幸いです。
  会員の皆さんご協力よろしくお願い申し上げます。
  活動はいつでもお一人一度ですが、体験会を行っていますので、会員以外の方も是非体験して頂けたらと思います。
  緊急事態宣言は解除されましたが、ソーシャルディスタンス、手指の消毒などお気をつけて2時間位整備したら、皆さんと春のパンプライド楽しみましょう!

  日時    4月4日 9時より
  場所 名栗じてんしゃ広場

  尚前日の気象庁17時の予報で埼玉県南部の降水確率が50%以上の場合は中止とさせて頂きますのでよろしくお願い申し上げます。
  ￼
