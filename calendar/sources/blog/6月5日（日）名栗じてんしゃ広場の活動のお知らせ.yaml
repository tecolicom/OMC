title: 6月5日（日）名栗じてんしゃ広場の活動のお知らせ
published: '2022-05-31'
body: |-
  6月5日（日）は、名栗じてんしゃ広場の定期活動日です。皆さん、ぜひご協力ください。なお、作業のご連絡が遅れましたこと、お詫びいたします。

  当日は、午前9時から作業を開始いたします。

  【注意事項】
  ●ソーシャルディスタンス、手指の消毒などお気をつけください。
  ●野外での活動ですが、近距離での会話の際にはマスクの着用をお願いします。
  ●各自で水分補給やおやつの準備をお願いします。
  ●前日午後5時の気象庁発表による埼玉県南部の天気予報で、降水確率が50％以上だった場合は作業を中止といたします。
