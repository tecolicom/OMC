title: １１月作業日
published: '2017-11-11'
body: |-
  ようやく秋晴れが続くようになり、ツーリングに最適な季節になりましたね。
  11月の活動日は19日(日)。作業日も天気に恵まれるとイイですね。
  今回の活動エリアは飯能市と鳩山町の2つのエリアに分かれて行います。ご参加いただける方は都合や興味のある方をお選びいただき、ご協力くださいませ。
  1)飯能市での活動
  飯能方面の活動は先日の台風や大雨で傷んだ遊歩道の清掃と整備を行います。いつもの里山道周辺や加治美杉台まちづくり推進委員会の整備されている「真善美の径」を活動エリアといたします。
  泥で汚れてもかまわない服装、軍手などと、お持ちの方は鎌や手鋸などをご用意ください。
  集合時間/集合場所
  8時00分 飯能市役所駐車場(集合後、阿須運動公園に移動)
  8時30分 飯能市阿須運動公園駐車場
  作業は午前中に終了となりますので、午後はツーリングをお楽しみ頂けたらと思います。
  2)鳩山町での活動
  鳩山町での活動は、はとやま環境フォーラムとの共同作業で、今後継続して手入れをして行く山道の調査です。

  今回の調査をもとにして、里山との多様な関わりを末永く持続できるよう、地元の方々、生態系保護協会、はとやま環境フォーラム、奥武蔵マウンテンバイク友の会で話しあい、山道の今後の利用形態、作業方法とプラン、環境への影響の評価法などを考えていきます。

  19日は地図を片手に歩きながら、手を入れるべきポイントをチェックします。
  山道を徒歩で移動しますので、歩きやすい格好でお越し下さい。
  集合時間/集合場所
  9時00分 熊井黒石神社そば(←クリックで神社の地図)、
  はとやま環境フォーラム活動場所(下図参照)
  集合場所にはピザ窯が。
  調査の山歩きは2時間ほどの予定です。
  前日の17時時点の気象庁の天気予報で、埼玉県南部(飯能市活動)または埼玉県北部(鳩山町活動)の19日午前中の降水確率が50%以上だった場合は活動日を延期します。
  延期の日取りにつきましては、追ってお知らせいたします。
  皆さまのご参加、お待ちしておりまーす。
