title: 5/31日高市ごみゼロの日活動報告
published: '2026-06-03'
body: |-
  5/31は日高市ごみゼロの日。道路美化団体として登録する活動区域周辺の自治体と協働で、早朝より作業しました。

  参加者は6名。会費で購入したブロワーも駆使し、道路脇に堆積した土砂や枝葉の除去。本来の道幅を取り戻せました。これから訪れる台風や梅雨でも確実に排水を行ってくれることでしょう。

  次回は6月7日に名栗じてんしゃ広場で草刈りと路面補修を行います。また、6月14日には総会も行われます。活動が連続しますが、皆さんのご参加をお待ちしています。
