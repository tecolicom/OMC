title: 10月3日名栗じてんしゃ広場活動報告
published: '2021-10-04'
body: |-
  気持ちがいい秋晴れの中整備に参加して頂いた会員の皆さんありがとうございました。

  随分と育った雑草の草刈りとパンプの路面の整備とジャンプレーン整備を行いました。

  何度も参加している方々も多くて、アメスコの扱い方も皆さん慣れていらっしゃって、バシバシ叩いて路面を直してくださってました。

  お子さん達も整備を手伝ってくれて、整備後はじてんしゃ乗ったり川で遊んだり、名栗じてんしゃ広場を楽しんでくれた様でした。

  次回は12月5日の予定です。

  会員の皆さんのお力添えよろしくお願い申し上げます。
