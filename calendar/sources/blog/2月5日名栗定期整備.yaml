title: 2月5日名栗定期整備
published: '2023-02-06'
body: 今年初めての名栗定期整備ご参加の皆さま、寒い中ありがとうございました。土は凍ってるようなので、手前側のパンプコースのR改修の前段階としバームに盛り土をしました。次回はRの内側を削りながら、面だしをして、Rをデカくしたいと思います。活動後は、会員でもあり、駿大の活動の発起人である、平井先生から地元のジビエの鹿シチューと自家製パンをご馳走になりました。寒い中での活動なので、暖かいシチューやパンをとても美味しく、最高のご褒美になりました。ご馳走様です。ありがとうございました。
