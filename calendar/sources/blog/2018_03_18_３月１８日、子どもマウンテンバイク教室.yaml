title: ３月１８日、子どもマウンテンバイク教室
published: '2018-03-18'
body: |-
  名栗じてんしゃ広場での子どもマウンテンバイク教室、暖かな春の夢のように過ぎてゆきました。

  奥武蔵マウンテンバイク友の会会員の皆さんの想いを込めた結晶は、子どもたちの笑顔を受けて輝いてました。
  皆で作り上げた広場を体一杯で楽しむ子どもたち、本当に夢のような時間でした。
  そして、多くの会員の方々との広場作りの日々に想いを馳せると、なんと得難く素敵な一年だったのでしょう。
  子どもマウンテンバイク教室にご参加いただいたご家族の方々、そして広場づくりにお力添えを頂いた皆さま方、本当に本当にありがとうございました。
  次回の子どもマウンテンバイク教室は2018年秋を予定しております。

  どうぞお楽しみに。
