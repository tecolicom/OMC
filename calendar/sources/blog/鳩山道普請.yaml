title: 鳩山道普請
published: '2024-02-19'
body: |-
  ２月１７日(土)友の会活動報告。
  鳩山にて大雨の影響の崩落で土をかぶってしまったトレイルの道普請を行いました。
  １１名の会員の方々が集まっていただき、今回だけでは終わらないと思われていた作業を終えることができました。
  また、尾根沿いにあった倒木を撤去し、普通に通れるようにしてきました。
  里山保全を行っている鳩山環境フォーラムや地元の方々も通り易くなったと喜んでもらえたようです。
  今回はほぼ土木のハードな作業でしたが、参加された方々のおかげで良い道にすることができました、ありがとうございます。
