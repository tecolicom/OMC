title: 2/17(土）鳩山地区でのトレイル整備について
published: '2024-02-06'
body: |-
  いつも活動を支えてくださりありがとうございます。2月の会の活動についてお知らせです。

  今月は17日の土曜日に、地元の要請に基づき鳩山地区の崩壊した山道の補修作業を行います。

  以下の場所に8時に集合してください。ここから現場にMTBで移動します。

  https://www.google.com/maps/place/%E3%80%92350-0266+%E5%9F%BC%E7%8E%89%E7%9C%8C%E5%9D%82%E6%88%B8%E5%B8%82%E5%8C%97%E6%B5%85%E7%BE%BD%EF%BC%91%EF%BC%94%EF%BC%99+%E5%8C%97%E6%B5%85%E7%BE%BD%E6%A1%9C%E5%A0%A4%E5%85%AC%E5%9C%92/@35.9714934,139.3499913,15z/data=!4m6!3m5!1s0x60192a0c41f7f88b:0xaa6cb3a14bf74325!8m2!3d35.9717748!4d139.3541985!16s%2Fg%2F11cncwx4f2?hl=ja
