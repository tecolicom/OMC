title: なぐり見聞食ブラさんぽ
published: '2017-09-18'
body: |-
  9月24日(日)、獅子舞で有名な名栗星宮神社の大祭に合わせて「第一回なぐり見聞食ブラさんぽ」が催されます。

  現在コース作製中のじてんしゃ広場でも、プレオープンイベントとしてレンタルバイクを用意しての体験会を開催いたします。
  私たちのじてんしゃ広場は地図のど真ん中に書いていただいてます。
  ぶらりと散歩を楽しんで、ぷらりと広場にお立ち寄りくださいませ。

  なかなか気持ちの良い広場に仕上がりつつあって、当日が楽しみです。
