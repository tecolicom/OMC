title: 第８回奥武蔵マウンテンバイク友の会総会
published: '2021-06-25'
body: |2-
   6月20日10時より今年度の総会を実施いたしました。
  初のオンライン開催とさせていただきましたが、梅雨の晴れ間の日曜日に多くの会員のみなさまにご参加いただき、すべての議案について無事ご承認いただきました。

   その後ディスカッションを実施したところ、日頃親しんでいる里山に、近頃目立つ立入禁止や車両通行禁止の看板への対応についてご質問いただきました。

  立入禁止については、通行していた場所が私有地で、その土地所有者が設置しているもののため、従っていただくほかありません。
  車両通行禁止については、昨今散見される4ＷＤ車やオートバイの道路外の走行に向けたものでマウンテンバイクに向けたものではないとの確認はできた旨ご説明いたしました。

   ボランティア活動を通して、土地所有者や地元住民により一層マウンテンバイクをご理解いただくため、また継続的な里山利用ができるよう、会員のみなさまには今後ともご協力いただきますようよろしくお願い申し上げます。

  奥武蔵マウンテンバイク友の会　世話人一同
