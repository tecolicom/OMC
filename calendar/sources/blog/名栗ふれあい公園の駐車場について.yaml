title: 名栗ふれあい公園の駐車場について
published: '2021-08-11'
body: 名栗ふれあい公園じてんしゃ広場を利用される方にお知らせです。現在、埼玉県には緊急事態宣言が発出されており、その間はJAいるま野斜め向かいの砂利の駐車場が閉鎖されることになりました。理由は同公園にてバーベキューなどが目立つからだそうです。つきましては、同公園じてんしゃ広場をご利用の際は名栗庁舎の駐車場に停めるようにしてください。奥武蔵マウンテンバイク友の会
  世話人一同
