title: ５月活動日
published: '2018-05-07'
body: |-
  風薫る五月、里山の緑は夏の匂いを醸しております。

  5月の活動日は20日(日曜日)。

  里山道整備活動を行います。

  集合時間/集合場所

  8時00分 飯能市役所駐車場(集合後、阿須運動公園に移動)

  8時30分 飯能市阿須運動公園駐車場

  上記のいずれかにお集まりください。

  阿須運動公園に集合し、ミーティング後、MTBで作業箇所に向かいます。

  里山道の補修や周囲の草刈りなどを行う予定です。

  泥に汚れてもかまわない服装、長靴、軍手などと、お持ちの方はスコップや手鋸などをご用意ください。

  前日の17時時点の気象庁の天気予報で、埼玉県南部の20日午前中の降水確率が50%以上だった場合は活動日を延期します。

  延期の日取りにつきましては、追ってお知らせいたします。

  梅雨に備えた里山整備、お力添えのほどどうぞ宜しくお願いいたします。
