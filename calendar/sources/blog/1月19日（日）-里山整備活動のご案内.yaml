title: 1月19日 里山整備活動のご案内
published: '2025-01-03'
body: |-
  2025年もよろしくお願いいたします。新年1回目の活動は、飯能市道路美化活動団体として整備を行っている里山で整備活動を行います。
  軍手などご持参の上、汚れても構わない服装でお集まりください。
  持ち運び可能なノコギリなど、ご自身で使用する道具があればお持ち込みください。
  みなさまのご参加をお待ちしております。

  ■集合日時:1月19日(日)8:30

  ■集合場所:あいわ広場(お車の駐車が可能です)
  あいわ広場に集合し、ミーティング後にMTBで作業箇所に向かいます。

  【注意事項】
  ●各自で水分補給やおやつの準備をお願いします。
  ●前日17時の気象庁発表による埼玉県南部の天気予報で、当日6時~12時の降水確率が50%以上の場合は作業を中止といたします。

  以下、今後の活動予定です。各活動の詳細は、日程が近づき次第ご案内します。
  2月2日 (日) 名栗じてんしゃ広場定期整備
  2月23日(日) 里山整備
