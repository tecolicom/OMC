title: 10月22日 日高市清掃作業の報告
published: '2023-10-23'
body: 10月22日（日）は日高市ごみゼロの日ということで、当会が道路美化団体として登録している地域の自治体と協働で、道路清掃を行いました。朝7時からと普段よりも早い開始時間でしたが、7名が参加。地元の方たちからは当会の協力に対し、感謝の言葉をいただけました。今後も地域に密着し、里山環境を改善していきますので、皆さまのご協力をお願いします。
