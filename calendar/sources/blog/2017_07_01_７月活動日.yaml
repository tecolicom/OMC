title: ７月活動日
published: '2017-07-01'
body: |-
  マウンテンバイカーは干涸びてしまいそうな梅雨空続き。

  里山ライドが恋しくてたまりません。 さて、今月の活動日は7月8日(土曜日)。いつもの里山は目立った荒れもゴミも少ないため、じてんしゃ広場の下準備を行います。 集合時間/場所9時00分 飯能市役所名栗庁舎駐車場 じてんしゃ広場を作る名栗ふれあい公園は名栗庁舎の川向こう。庁舎駐車場に集合し、ミーティング後、じてんしゃ広場の造成予定地に向かいます。主な作業は地面に折り重なっている枯れ草の除去作業になるかと思います。汚れてもかまわない格好、軍手などと、お持ちの方は鎌や熊手などをご用意ください。 作業が一区切りついたところで、副会長北澤さんはいつもの里山に利用者アンケートを取りにいくそうです。よろしければこちらもお手伝いいただけましたら幸いです。 前日の17時時点の気象庁の天気予報で、埼玉県南部の8日午前中の降水確率が50%以上だった場合は活動日を延期します。延期の日取りにつきましては、追ってお知らせいたします。 当日の天気を祈って、広場に夢を描きましょう。皆様お力添えのほど、どうぞよろしくお願いいたします。
