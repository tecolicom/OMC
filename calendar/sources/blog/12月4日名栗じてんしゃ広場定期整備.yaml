title: 12月4日名栗じてんしゃ広場定期整備
published: '2022-11-22'
body: |-
  今年一年名栗じてんしゃ広場の定期整備ありがとうございます。
  12月4日は今年最後のじてんしゃ広場定期整備となります。
  今年のライドの思いで話しなどしながら、路面の整備ゆっくりやれたらと思います。
  会員の皆さんのお力添えよろしくお願い申し上げます。
  場所   名栗じてんしゃ広場
  時間   9時集合
  尚前日、17時気象庁埼玉南部の降水確率が50%以上の場合は中止とさせて頂きます。よろしくお願い申し上げます。
