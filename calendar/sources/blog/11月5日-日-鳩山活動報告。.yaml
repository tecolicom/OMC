title: 11月5日(日)鳩山活動報告。
published: '2023-11-07'
body: ~鳩山作業報告~11月5日(日)、鳩山町熊井にて谷津田の休耕田の刈払いを自治会・はとやま環境フォーラムとの共同で行いました。参加者は7名。2m以上あるススキ等の刈払いは大変ではありましたが、担当の方々が積極的に動き、1時間強で完了しました。休憩の後、熊井の森の越生側からの入り口、石場沼からの入り口周辺の草が茂ってきていたので刈払いを行いました。作業して下さった皆様、ありがとうございました。今後は、落ちた枝や倒木の掃除・撤去、地すべりで埋まってしまった場所の再生等行っていきたいと考えているので、その折は会員の皆様のご協力をお願いします。
