title: 8月2日名栗じてんしゃ広場定期整備
published: '2020-08-02'
body: |-
  名栗じてんしゃ広場定期整備ご参加の皆さんありがとうございました。
  ついにと言うかやっと梅雨明け宣言がでました。
  今回の活動には梅雨明けを待ちわびた会員が23名参加して頂きました。
  朝は涼しめでしたが、どんどん気温は上がり皆さん汗だくで、コースの改修や草刈りを致しました。
  今回はご家族での参加された方が多く見受けられました。
  お子さん達もdigのお手伝いをしてくれました。
  整備後は虫取りしたり川遊びしたり、名栗の夏を、じてんしゃ遊びを楽しんで頂けていたようでした。
  活動に参加された皆さんご協力ありがとうございました。
  次回は10月4日となります。
  皆様のご参加お待ちしています。
