title: 4/5 名栗定期作業のお知らせ
published: '2026-03-18'
body: |-
  4月5日(日)は名栗じてんしゃ広場の定期整備を行います。4月19日に開催の子ども自転車教室を前に、荒れた路面の補修を主に行います。同広場に午前9時にお集まりください。11時頃まで作業を行う予定です。
  なお、前日17時の気象庁発表による埼玉県南部の天気予報で、当日6時〜12時の降水確率が50%以上の場合は中止といたしますのでご了承ください。
