title: ９月活動日
published: '2018-09-01'
body: |-
  里山の空に浮かぶ雲にも初秋の気配が漂い始めました。

  ９月の活動日は１６日（日曜日）。
  里山道整備活動を行います。

  集合時間／集合場所
  ８時００分 飯能市役所駐車場（集合後、阿須運動公園に移動）
  ８時３０分 飯能市阿須運動公園駐車場
  上記のいずれかにお集まりください。
  阿須運動公園に集合し、ミーティング後、MTBで作業箇所に向かいます。

  里山道の草刈りまたはぬかるみ整備を行う予定です。
  汚れてもかまわない服装、長靴、軍手などと、お持ちの方はスコップや手鋸などをご用意ください。
  残暑厳しい可能性もありますので、補給用のドリンクなども多めに用意するなど熱中症対策も各自で十分に行ってください。

  前日の１７時時点の気象庁の天気予報で、埼玉県南部の１６日午前中の降水確率が５０％以上だった場合は活動日を延期します。
  延期の日取りにつきましては、追ってお知らせいたします。

  お力添えのほど、どうぞ宜しくお願いいたします。
