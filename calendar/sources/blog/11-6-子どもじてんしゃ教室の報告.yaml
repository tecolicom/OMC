title: 11/6 子どもじてんしゃ教室の報告
published: '2022-11-14'
body: |-
  飯能市の後援のもと名栗ふれあい公園じてんしゃ広場にて「子どもじてんしゃ教室」を開催しました。

  じてんしゃ教室の常連の子から、初めてじてんしゃ広場に来た子たち、キックバイクに乗った未就学児たちが集まって賑やかな集まりになりました。

  参加者の自転車の安全点検整備と準備体操の後に3つのグループに別れてスタート。
  それぞれのレベルに合うように内容を調整しつつ、上達にあわせて進行しました。

  途中の休憩時間も走り続けてる子や、教室終了後もしばらく走り続けた子たちもいたようです。
  じてんしゃ広場の維持管理をしている我々としても熱中して遊んでいる子供達を見ることで活動の意義を再認識させていただきました。
  日頃のボランティア活動に協力してくれている会員のみなさんのおかげです。
  ご協力に深く感謝いたします。これからもよろしくお願いします。

  次回の子どもじてんしゃ教室は2023年3月26日(日)に開催いたします。
  多くの子供達が集まってくれたら嬉しいです❗️
  よろしくお願いします🙇‍♂️
