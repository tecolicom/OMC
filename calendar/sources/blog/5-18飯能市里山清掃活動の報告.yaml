title: 5/18飯能市里山清掃活動の報告
published: '2025-05-18'
body: 5月18日(日)は、飯能市の市民清掃デーでした。日ごろマウンテンバイカーの集まるこの地域の2つの自治会でも清掃活動が行われ、地域のみなさまが行う活動にOMCも協力させていただきました。4名の会員が集まりました。ご協力ありがとうございました。阿須自治会では、ゴミ拾いと草刈りを行いました。OMCは草刈りを担当し、川沿いの道まわりを綺麗にしました。作業終了後はおみやげをいただき、解散しました。岩渕自治会では、麓から尾根に続く里山道の整備を行いました。2組に分かれ、住民の方々と一緒に里山道を登り、落枝拾いや簡単な倒木処理、水切りに堆積した土砂や落ち葉の除去を行いました。作業終了後はおみやげをいただき、解散しました。作業に参加されたみなさま、おつかれさまでした。今後も地域のみなさまとの良好な関係を築けるよう、ご協力をよろしくお願い致します。今後の活動は以下を予定しております。5/25(日)
  日高市清掃活動6/1 (日) 名栗定期整備6/22(日) 2025年度第12回総会
