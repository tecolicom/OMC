title: 里山道整備延期のお知らせ
published: '2016-02-20'
body: |-
  飯能市内は20日夕方まとまった降水があり、18時現在も降り続いております。

  明日、2月21日に里山道の整備活動を予定しておりましたが、現在までの降水量を考えると、十分な整備が行えないことが予想されますので、明日の整備活動は延期いたします。

  今回予定していた里山道整備は、次回の活動日の3月13日(日曜日)に行います。

  よろしくお願いいたします。
