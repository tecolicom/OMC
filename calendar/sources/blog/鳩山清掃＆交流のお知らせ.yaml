title: 鳩山清掃＆交流のお知らせ
published: '2025-02-13'
body: 2月23日(日)鳩山町活動エリアにおいて、会員の交流を兼ねたゴミ拾いツーリングを行います。毎年休耕田の刈払いをやっていますが、実際そこがどんな場所なのか知らない方も多いと思います。そこで今回は里山ライドを楽しみながらゴミ拾いをしてこようという活動にしました。通常より緩い活動ですが、この地域に興味ありましたら参加ください。集合場所は北浅羽桜堤駐車場。集合時間は8:30です。
