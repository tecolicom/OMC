title: 10月21日（日）鳩山活動報告
published: '2023-10-23'
body: |-
  10月21日（土）
  鳩山熊井の森の谷津にて、鳩山環境フォーラムとの共同作業で、ビオトープ化に向けた灌木の伐採、倒木の撤去作業を行いました。
  今回は人数の制限があり、募集告知はせず、世話人2人と鳩山にかかわりの深い会員3名の計5人での参加とさせていただきました。
  昔田んぼだった谷間が自然林になろうとしているところを湿地帯を住みかとする生物が生息しやすいよう手入れをしてビオトープにし、森に訪れた方が観察できるような場所にするのが目的です。周辺のトレイルはMTBで走れるので里山ライドと自然観察が行える場所になる予定です。
  今回は、鬱蒼と茂ってしまった灌木等を刈り、湿地の為大きくなった針葉樹が耐えられずに倒れてしまったのをチェーンソーで切断し撤去する作業でした。
  今回だけでは予定の半分に届いたかどうか。
  今後は周辺の地すべりで埋まってしまったトレイルの再建と併せ、長期の整備として行っていく計画です。
  今後も会員の皆様のご協力よろしくお願いします。
