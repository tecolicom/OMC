title: 12月14日 里山整備のお知らせ
published: '2019-12-07'
body: |-
  いつもの里山の整備、清掃を行います。
  令和元年最後の整備です。
  作業後に楽しくライドしましょう！
  みなさまふるってご参加お願いいたします。

  集合時間／集合場所

  令和元年１２月１４日（土）

  ８時００分 飯能市役所駐車場

  ８時３０分 飯能市阿須運動公園駐車場

  阿須運動公園に集合し、ミーティング後、MTBで作業箇所に向かいます。

  気温が低いなかでの作業ですので体温調節しやすい服装をおすすめします。また各自で水分補給やおやつの準備をお願いします。

  前日午後5時の気象庁の埼玉県南部の天気予報で、降水確率が５０％以上だった場合は中止いたします。

  皆様ご協力をお願いします_(._.)_
