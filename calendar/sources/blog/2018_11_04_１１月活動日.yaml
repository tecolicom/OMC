title: １１月活動日
published: '2018-11-03'
body: |-
  秋雨の季節が過ぎ、ようやく続く秋空の下、里山の木々の葉も徐々に色づき始めました。

  11月の活動日は17日(土曜日)。

  里山道整備活動を行います。

  集合時間/集合場所

  8時00分 飯能市役所駐車場(集合後、阿須運動公園に移動)

  8時30分 飯能市阿須運動公園駐車場

  上記のいずれかにお集まりください。

  阿須運動公園に集合し、ミーティング後、MTBで作業箇所に向かいます。

  阿須公園内は、自転車に乗車しての通行は出来ません。

  公園を利用される多くの方々や近隣にお住まいの皆さまへのご配慮も忘れないよう、ご協力のほどよろしくお願いいたします。

  当日は、廃道化している飯能市の市道の復旧作業を予定しております。

  作業内容としては、草刈りや路肩補強などを行います。

  上記の整備作業は、飯能市に道路公園活動団体として登録し、正式な整備許可のもと実施いたします。

  汚れてもかまわない服装、長靴、軍手などと、お持ちの方はスコップや鎌、手鋸などをご用意ください。

  前日の17時時点の気象庁の天気予報で、埼玉県南部の17日午前中の降水確率が50%以上だった場合は活動日を延期します。

  延期の日取りにつきましては、追ってお知らせいたします。

  お力添えのほど、どうぞ宜しくお願いいたします。
