title: 10月4日、名栗じてんしゃ広場の整備
published: '2020-10-05'
body: 会員のみなさん、こんにちは。昨日の4日(日)は、名栗じてんしゃ広場パンプトラックの整備日でした。参加者は16名でしたので、2班に分け、冬に向けて気温が低くなるので今季最後となるであろう草刈りを2名で、L字コースの全面的な路面整備を残りの14名で行ないました。路面整備ではコブやバームの路面から石を取り除き、そこに土を入れ、叩いて締めることで、凹凸の少ないスムーズな路面が出来上がりました。次回は下流側のコースとジャンプレーンの路面整備を行ないたいと思います。お集まりいただいたみなさん、ご協力ありがとうございました。
