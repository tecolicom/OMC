title: 12月1日名栗じてんしゃ広場整備報告
published: '2019-12-02'
body: |-
  師走に入りお忙しい所名栗じてんしゃ広場の定期整備にご協力ありがとうございました。
  今週新しい土が搬入予定なので、路面の整備は行わず、手前のコースのコーナーをもう少し曲がりやすいようにコーナーの入り口を広げ、それに伴いコブの位置を外側にずらしました。
  多少曲がり易くなったかと思います。
  次回ももう少しバームの形を手直ししたいと思います。
  先日のじてんしゃ教室に参加して頂いた3組のご家族がじてんしゃ広場に遊びに来てくれました。
  うちの子ども達じてんしゃが好きになりましと親御さんから話しかけられました。整備をしている者としてとても嬉しい言葉でした。
  来年も会員の皆さんのお力添えよろしくお願い申し上げます。
