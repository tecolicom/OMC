title: 子どもマウンテンバイク教室中止のお知らせ
published: '2017-11-22'
body: |-
  明日23日は、初めてのじてんしゃ広場での子どもマウンテンバイク教室。
  待ちに待ってたその日の空は、名栗の龍神様のお散歩予定が入っていたようで、午前の降水確率が50%をこえてしまっておりました。
  大変残念ながら、11月23日の子どもマウンテンバイク教室は中止とさせていただきます。
  次回の子どもマウンテンバイク教室は2018年3月を予定しております。
  少し先にはなりますが、全てのコースが仕上がったじてんしゃ広場で、春の花々とともに咲くたくさんの子どもたちの笑顔に出会えることを楽しみにしております。
  なお、名栗ふれあい公園内のじてんしゃ広場コースはいつでもどなたでも走ることができます(ヘルメットは必要です)。
  今の時期は紅葉に彩られたじてんしゃ広場。
  空の機嫌に恵まれましたら、楽しんでいただけましたら幸いです。
