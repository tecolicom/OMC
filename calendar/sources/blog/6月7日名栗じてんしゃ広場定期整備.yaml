title: 6月7日名栗じてんしゃ広場定期整備
published: '2020-06-08'
body: |-
  名栗じてんしゃ広場の定期整備にご参加の皆さんご協力ありがとうございます。

  コロナ禍により県内の会員限定とさせて頂きました。

  都内、県外の会員の皆さまご理解ありがとうございます。

  土曜日は雷を伴い強い雨が降り日曜日の天気が心配されました。朝はまだ曇りがちでしたが、どんどん晴れ間が広がりいい天気となりました。

  作業はパンプの路面整備を行いました。

  久々の活動なので会話も弾み楽しい活動となりました。

  本日参加された会員の皆さまありがとうございます。

  次回の活動は自粛も解除されていると思います。

  是非たくさん会員の皆さんのご協力よろしくお願い申し上げます。
