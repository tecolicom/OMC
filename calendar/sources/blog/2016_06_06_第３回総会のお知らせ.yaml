title: 第３回総会のお知らせ
published: '2016-06-05'
body: |-
  6月19日(日)、第3回総会を行います。
  議案は、昨年度の活動報告と会計報告、今年度の活動計画と予算案などについてです。
  日時:6月19日(日) 午前9時30分
  場所:飯能市加治東公民館(クリックで地図が開きます) 2階
  ご参集のほど、どうぞ宜しくお願いいたします。
