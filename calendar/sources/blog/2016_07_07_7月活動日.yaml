title: 7月活動日
published: '2016-07-06'
body: |-
  今月の活動日は１７日（日曜日）です。

  里山道の整備、案内看板の補修などを行います。

  泥に汚れてもかまわない服装、軍手などをご用意ください。


  集合時間／集合場所

  ８時００分 飯能市役所駐車場（集合後、阿須運動公園に移動）

  ８時３０分 飯能市阿須運動公園駐車場


  前日の１７時時点の気象庁の天気予報で、埼玉県南部の１７日午前中の降水確率が５０％以上だった場合は活動日を延期します。延期の日取りにつきましては、追ってお知らせいたします。


  皆さまのご参加、お待ちしておりまーす。
