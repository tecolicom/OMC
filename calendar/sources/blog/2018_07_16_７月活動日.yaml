title: ７月活動日（延期）
published: '2018-07-16'
body: |-
  *7月20日追記
  7月21日の予想最高気温が35度を超えたため、予定してました里山道整備は7月21日は実施せず延期といたします。
  延期の日取りなどは追ってお知らせいたします。


  とても短い梅雨が明け、里山は夏真っ盛り。

  蝉の声が元気に響いております。

  7月の活動日は21日(土曜日)。
  里山道整備活動を行います。

  集合時間/集合場所
  8時00分 飯能市役所駐車場(集合後、阿須運動公園に移動)
  8時30分 飯能市阿須運動公園駐車場
  上記のいずれかにお集まりください。
  阿須運動公園に集合し、ミーティング後、MTBで作業箇所に向かいます。

  里山道のぬかるみ整備を行う予定です。
  泥に汚れてもかまわない服装、長靴、軍手などと、お持ちの方はスコップや手鋸などをご用意ください。
  また、補給用のドリンクなども多めに用意するなど熱中症対策も各自で十分に行ってください。

  前日の17時時点の気象庁の天気予報で、埼玉県南部の21日午前中の降水確率が50%以上だった場合および予想最高気温が35度以上だった場合は活動日を延期します。
  延期の日取りにつきましては、追ってお知らせいたします。
