title: 9月活動日
published: '2017-09-18'
body: |-
  だんだんと秋めいてきた奥武蔵の里山。
  今月の活動日は9月23日(土曜日)。
  里山道のぬかるみ整備活動を行います。
  集合時間/集合場所
  8時00分 飯能市役所駐車場(集合後、阿須運動公園に移動)
  8時30分 飯能市阿須運動公園駐車場
  上記のいずれかにお集まりください。
  阿須運動公園に集合し、ミーティング後、MTBで作業箇所に向かいます。
  ぬかるんだ里山道の補修と、降雨時の水の流れをコントロールするための土木作業を行う予定です。

  泥に汚れてもかまわない服装、長靴、軍手などと、お持ちの方はスコップや手鋸などをご用意ください。
  前日の17時時点の気象庁の天気予報で、埼玉県南部の23日午前中の降水確率が50%以上だった場合は活動日を延期します。
  延期の日取りにつきましては、追ってお知らせいたします。
  お力添えのほど、どうぞよろしくお願いいたします。
