title: 6/14第13回総会のお知らせ
published: '2026-06-05'
body: 総会のお知らせと会員継続のお願い奥武蔵マウンテンバイク友の会へのお力添えいつもありがとうございます。下記の要領で会員総会を開催いたします。ぜひご参加ください。総会後にはトレイルライドも予定していますので、参加希望の方はMTBを持参ください。奥武蔵マウンテンバイク友の会
  世話人一同【会員総会】2026年6月14日(日) 9:30  受付開始10:00 総会開会11:00 トレイルライド(15時くらいまで)開催場所:Studio
  TECOLI(飯能市柳町20-20) https://tecoli.com/studio/*車で来られる方は近隣のコインパーキングをご利用ください*人数把握が必要になるため総会に参加される場合は、メールお願いします。
  また会費のお支払いは銀行振込となります。6月30日までに以下までお振り込みくだされば幸いです。年会費:2500円振込先:ゆうちょ銀行(ゆうちょ銀行から)記号10300
  番号82119261 口座名義:オクムサシマウンテンバイクトモノカイ(ゆうちょ銀行以外から)店番 ゼロサンハチ 普通口座番号8211926口座名義:オクムサシマウンテンバイクトモノカイ
