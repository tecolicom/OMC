title: 【年会費のお振り込みについて】
published: '2021-06-27'
body: |-
  先にお知らせしましたとおり、第8回総会をもって2020年度は完了となりました。ありがとうございます。ついては、会員のみなさまにおかれましては、2021年度分の年会費2500円の納入をお願いいたします。

   振込先は以下になります。 会員のみなさまあっての奥武蔵マウンテンバイク友の会です。
  活動に参加できない方、年会費の納入だけでも活動するうえで大変助かっています。ぜひ継続手続き頂ますようよろしくお願い申し上げます。-----------------------------------------------------------------
  (ゆうちょ銀行から)
  記号10300 番号82119261
  口座名義:オクムサシマウンテンバイクトモノカイ
  (ゆうちょ銀行以外から)
  店番 038 (ゼロサンハチ)普通預金
  口座番号8211926
  口座名義:オクムサシマウンテンバイクトモノカイ
  -----------------------------------------------------------------奥武蔵マウンテンバイク友の会 世話人一同
