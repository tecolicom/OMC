title: 【年会費のお振り込みについて】
published: '2021-06-27'
body: "先にお知らせしましたとおり、第8回総会をもって2020年度は完了となりました。ありがとうございます。\nついては、会員のみなさまにおかれましては、2021年度分の年会費2500円の納入をお願いいたします。\n\
  \n 振込先は以下になります。\n会員のみなさまあっての奥武蔵マウンテンバイク友の会です。\n活動に参加できない方、年会費の納入だけでも活動するうえで大変助かっています。\n\
  ぜひ継続手続き頂ますようよろしくお願い申し上げます。\n-----------------------------------------------------------------\n\
  (ゆうちょ銀行から)\n記号10300 番号82119261 \n口座名義:オクムサシマウンテンバイクトモノカイ\n(ゆうちょ銀行以外から)\n店番 038 (ゼロサンハチ)普通預金\n\
  口座番号8211926\n口座名義:オクムサシマウンテンバイクトモノカイ\n-----------------------------------------------------------------\n\
  奥武蔵マウンテンバイク友の会 世話人一同"
