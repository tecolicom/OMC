title: 【6/27(土)里山整備作業の報告】
published: '2020-06-28'
body: |-
  6/27(土) 奥武蔵マウンテンバイク友の会の6月の活動を実施。
  梅雨真っ只中の6月。もともとは先週に作業を予定していたのですが、降雨のため延期とし、6/27に作業を行いました。

  参加者21名が3班(草刈り班、水切り清掃班、ぬかるみ整備班)に分かれて、飯能市道路美化活動団体として認定を受けた市道の清掃美化活動を行いました。私たちが担っている市道は未舗装の里山道です。それぞれの道によって必要になる美化の方法は様々。

  【草刈り班】
  雑草に覆われている里山道では草刈りを。また、道を塞いでいる倒木の撤去を行いました。

  【水切り清掃班】

  大量の降雨の際の雨水によって浸食が懸念される里山道では水切りの設置をしており、この日の活動ではその定期的な清掃を。またその入り口部分の清掃活動も行いました。

  【ぬかるみ整備班】

  常にぬかるんでいる個所では周辺にある倒木や石を材料に木道の整備を行いました。周辺に倒れている木をチェーンソーで切り出して材とします。

  作業に集まってくれた皆さんを適材適所となるよう分散してそれぞれの道で必要とされる作業を行いました。

  現地までの移動にはMTBを使います。スコップの運搬にはロングテールバイクが大活躍し、チェーンソーの運搬には背負子を。

  奥武蔵マウンテンバイク友の会のボランティア活動ではMTBの持つ機動力を活かし広い範囲の作業に対応しています。

  マウンテンバイクを里山で遊ぶことの楽しさの中に里山道の保全活動を加えてみませんか?

  当会の活動地域は飯能市、はとやま町、日高市に広がっています。自らの力を活かして身近な環境を保全し、持続可能なマウンテンバイクライフを楽しんでいきましょう。

  奥武蔵マウンテンバイク友の会では随時入会を募集しています。
