title: 8/3名栗定期作業の報告
published: '2025-08-07'
body: 8月3日は名栗じてんしゃ広場で定期作業を予定していましたが、高温が予測されたため中止といたしました。しかし、夏季は草が盛んに生えることから、有志のみで熱中症に気をつけながら作業を実行。刈払機3台体制で広場の8割ほど草を刈りました。なお、路面は状態が良かったことから整備を見合わせました。暑い中、作業お疲れ様でした。次回の活動は8月24日、日高市の道路整備になります。
