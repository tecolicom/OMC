title: 3月19日じてんしゃ広場整備作業報告
published: '2023-03-20'
body: |-
  3月19日は名栗じてんしゃ広場の定期作業日。6名で流れの悪いコーナーを改修しました。前回はコーナーの外側に土を盛りましたが、今回は内側を削って回転半径を増やし、滞りなくコーナリングできるようにしました。これで来週末の子ども教室でもお子さんたちに楽しんでいただけることでしょう。

  参加された皆様、どうもありがとうございました！
