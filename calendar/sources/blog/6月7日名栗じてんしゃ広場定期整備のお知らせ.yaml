title: 6月7日名栗じてんしゃ広場定期整備のお知らせ
published: '2020-05-29'
body: |-
  長らく活動を休止していましたが、緊急事態宣言の解除を受けまして、6月7日の名栗じてんしゃ広場定期整備より会の活動を再開いたします。
  自粛の日々で会員の皆様辛い日々をお過ごしだったかと思います。
  dig&rideでストレス発散して頂ければと思います。
  ただ、県外への移動はまだ自粛となっていますので、今回は埼玉県在住の会員を対象とさせて頂きます。
  都内、県外の皆様にはご理解の程よろしくお願い申し上げます。
  尚、今回の活動より保険を見直しまして、会員以外の方々にも活動に参加して頂ける様にいたしました。
  会の活動にご興味のおあり方は是非活動に参加してみてください。

     日時  6月7日  9時より
     場所  名栗じてんしゃ広場

  アメスコなど道具をお持ちの方はご持参ください。
  会の道具をお使いの場合は消毒液を用意しますので、手洗いをお願いします。
  いつも飲み物、おやつを用意していましたが、コロナ対策として、今回は用意いたしません。飲み物、おやつ等ご持参をお願い致します。
  土曜日、午後5時の気象庁の予報で、埼玉県南部の降水確率が50%以上の場合は中止とさせて頂きます。
