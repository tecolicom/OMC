title: 11/19 里山道整備の報告
published: '2023-11-19'
body: |-
  飯能市道路美化活動団体として担当している里山道で清掃とぬかるみ区間の手入れを行いました。
  まずは３班に分かれ、里山道全体の路面に落ちている小枝などの清掃を行いつつMTBで移動して、ぬかるみポイントに集合しました。

  周囲の倒木を路面に敷くための長さに切り、その丸太を運び、路面に敷き詰めることで修繕を行いました。
  歩く人もランニングする人もマウンテンバイクで通行する我々も含めて様々な形で共有している飯能市の市道ですが、ここのポイントは山側の斜面から染み出す湧き水のため常にぬかるんでいます。

  今回の作業によってしばらくの期間はぬかるむことなく、気持ちよく通行できることと思います。
  協力してくれた参加者の皆さん、泥で手を汚しながらも笑顔で作業を行ってくれてありがとうございました。
