title: 12月活動日(12月2日 里山道整備)
published: '2018-11-22'
body: |-
  気がつけば年の瀬まであとわずか。

  イノシシの足音に耳をすます季節となりました。

  12月2日(日)、里山道整備活動を行います。

  集合時間/集合場所
  8時00分 飯能市役所駐車場(集合後、阿須運動公園に移動)
  8時30分 飯能市阿須運動公園駐車場
  上記のいずれかにお集まりください。
  阿須運動公園に集合し、ミーティング後、MTBで作業箇所に向かいます。
  11月活動日に続き今回も、廃道化している飯能市の市道の復旧作業を行います。
  上記の整備作業は、飯能市に道路公園活動団体として登録し、正式な整備許可のもと実施いたします。
  土木作業を予定しておりますので、汚れてもかまわない服装、長靴、軍手などと、お持ちの方はスコップや鎌、手鋸などをご用意ください。

  スコップは先の尖ったスコップが使いやすいかと思います。

  手を動かしただけ、どんどんときれいになってゆく山道。

  ついつい作業に熱中して、トレイルメンテナンスでは知らず知らずのうちオーバーワークになりがちかもしれません。

  十分な補給が出来るよう、おやつやお飲物のご用意もお忘れなく。


  前日の17時時点の気象庁の埼玉県南部の天気予報で、当日の午前中の降水確率が50%以上だった場合は活動日を延期といたします。

  延期の日取りにつきましては、追ってお知らせいたします。

  お力添えのほど、どうぞ宜しくお願いいたします。
