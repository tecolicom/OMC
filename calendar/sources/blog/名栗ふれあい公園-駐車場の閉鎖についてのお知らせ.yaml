title: 名栗ふれあい公園 駐車場の閉鎖についてのお知らせ
published: '2020-04-21'
body: |-
  国の緊急事態宣言及び埼玉県の緊急事態措置に伴って飯能市内の公園の駐車場が当面のあいだ閉鎖となりました。
  じてんしゃ広場のある名栗ふれあい公園の駐車場も対象となりましたので、車での移動が必要な地域からのご利用はお控えください。
  新型コロナウイルス感染症の騒ぎが収まり、またみんなでじてんしゃ広場を楽しめる日常が待ち遠しいです。
  感染拡大の防止にご協力をお願いします。
