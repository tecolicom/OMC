title: 7/21(日)の活動予定
published: '2024-07-15'
body: |-
  7/21(日)の活動はライド+プチ整備の日にします!例年、7月と8月の活動日は高温注意情報が発令されることが多く活動中止になりがちです。そこで今月の作業は体力を使わない軽作業(道にはみ出した枝を切るくらい)として、主に活動地域の全体をサイクリングしようと思います。ご参加いただける方は体調が万全で、なおかつ常に自身の体調管理を自己責任で行い、補給水なども十分な備えでお集まりください。また、降水確率が50%を超えた場合でも活動を行います。内容は変更し、トレイル出口の周辺の草刈りなど、トレイルを傷めない場所で作業を行います。以上を踏まえまして、今回は試験的に気象庁発表の予想最高気温が35°C以上でも降水確率50%以上でも活動を決行します。上記の内容をご理解ご協力いただける方のご参加をお待ちしています。汚れても良い服装で、お手持ちがあれば枝切りバサミや携帯ノコギリを持ってお集まりください。みなさまのご参加を心からお待ちしています。■集合日時:7月21日(日曜日) 8:30
  ■集合場所:あいわ広場(お車の駐車が可能です)
