title: 11月20日活動報告
published: '2021-11-22'
body: |-
  ~活動報告~
  11月20日(土)
  鳩山町熊井地区にて熊井自治区・はとやま環境フォーラム・奥武蔵マウンテンバイク友の会の共同で谷津田の耕作放棄地の刈払いとトレイルの整備を行いました。
  世話人を含む会員13人が参加しました。
  放棄地を放っておきますと、イノシシ等の野生動物の住みかとなり、他の農作物が被害を受けてしまうので今回の作業となりました。
  動力を使用できる会員は刈払いを担当し、1時間強をかけて作業をしました。
  その他の会員は2班に分かれ、森の中の倒木の処理、清掃の作業をしました。
  作業後、自分たちで手入れしたトレイルを自ら走っていただきました。
  こういった活動によってトレイルが維持され、楽しむ事が出来ることを実感して頂けたかと思います。
  いつも作業に参加してくだる会員の皆様ありがとうございました。
  今後も里山の保全や、森を上手く活用していこうとする熊井地区の活動に協力していきますので、会員の皆様の御協力をよろしくお願いいたします。
  +3件
  4マツモト アキヒロ、Jinya Nishiwaki、他2人

  コメント6件
  7人が既読

  いいね!



  コメントする
