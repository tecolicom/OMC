title: 3/17 日高市里山道整備の活動報告
published: '2024-03-22'
body: |-
  3月17日は春の陽気の中、日高市道路美化団体として市道の清掃を行いました。日高市ごみゼロの日にも自治体と協働で清掃した市道になります。
  集まったのは総勢20名。MTBで全長2kmの市道を上り、作業区間を特定。4班に分かれて、道路脇に溜まった土砂や枝葉を除去しました。
  4~5名の1班で数百mを担当する大変な作業になりましたが、1時間半ほどで終了し、道がきれいになりました。歩行者や自動車の往来がより楽になることでしょう。ご参加いただきありがとうございました。
  次回は4月7日に名栗じてんしゃ広場で整備作業を行います。ご参加お待ちしています。
