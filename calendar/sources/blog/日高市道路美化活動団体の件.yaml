title: 日高市道路美化活動団体の件
published: '2020-03-15'
body: |-
  会員の皆さんいつも活動へのご尽力ありがとうございます。

  常々当会として日高地域の里山にも何かしら貢献ができないかと思っていまして、このほど日高市に日高市道路美化活動団体として申請し認定して頂きました。

  活動といたしまして年4回里道の清掃活動、整備を行う事となりました。

  これまでの里山整備、名栗のじてんしゃ広場、今回の日高地域と活動が多岐にわたり、活動内容も増えてまいりました。

  会員の皆さんには益々の活動へのご協力よろしくお願いし申し上げます。

  尚日高市より帽子、安全ベスト、ゴミ袋、軍手を頂きました。

  活動日にはご利用させて頂き活動を行いたいと思います。
