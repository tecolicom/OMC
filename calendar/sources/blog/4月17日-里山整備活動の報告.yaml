title: 4月17日 里山整備活動の報告
published: '2022-04-18'
body: |-
  4月17日(日)は、総勢19名で日高市の山道およびその周辺地域の清掃・整備活動を行いました。市役所に道路美化団体として認定されて以来、天候や新型コロナウイルスの影響もあり、この日が2度目の活動となりました。多くの方にご参加いただき、2班に分かれることに。山道の整備では、雨によって浸食が進んだ路面に落ち葉を被せ直し、道に被るように生えた草木を払い、落ちている枝や石をどけました。休憩時には、作業した山道からすぐアクセスできる滝へ。壮観な景色に参加者は皆驚いていました。

  山道出口付近では、生活道に土砂が流出していることからそれらの清掃とあわせて除草を実施しました。

  今後は地域住民とさらなる連携を取り、地域に還元できる活動を行っていきたいと考えています。次回の作業にもぜひご協力ください。活動に参加された皆さん、お疲れ様でした。また、集合場所をご提供いただいたCAWAZ base(カワズベース、https://cawaz.co.jp/)様、どうもありがとうございました。
