title: 5/26日高市ごみゼロの日清掃作業の報告
published: '2024-05-29'
body: |-
  5月26日（日）は日高市ごみゼロの日に伴い、地域住民と共に道路の清掃を行いました。集まった会員は8名、見学は2名でした。
  集落真横の道路の清掃がメインですが、OMCの機動力を活かし、さらに道路を上った場所まで作業範囲を拡大。道脇や排水溝に溜まった落ち葉や土砂を撤去し、草刈りも行いました。
  地域の方から「作業に協力してくれて助かる」との言葉だけでなく、飲み物の差し入れまで頂けました。今後も地域の力になれるよう、会員の皆さんには改めて作業への参加をお願いします。

  次回は今週末6月2日（日）の名栗じてんしゃ広場定期作業になります。天気が心配されますが、皆さんのご参加お待ちしています。
