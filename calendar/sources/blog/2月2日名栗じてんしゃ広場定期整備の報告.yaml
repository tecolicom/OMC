title: 2月2日名栗じてんしゃ広場定期整備の報告
published: '2020-02-03'
body: 2月に入り、一年で一番寒いこの時期にお集まりくださった会員の皆様、名栗じてんしゃ広場の定期整備にご協力頂きましてありがとうございます。当日は放射冷却現象もあいまって、寒さは厳しく、コースは霜柱に覆い尽くされていました。当初去年の暮れに搬入した脱水土を使用し面の整備の予定でしたが、脱水土もカチカチに凍っていたので、あまり凍っていない赤土を使用して、奥のコースの面の整備を行いました。集まってくださった会員の皆さんはdigに精通された方々でしたので、2時間ほどで面の整備の作業を終える事ができました。ただ、今時分は日陰になっているコース部分は凍ったり溶けたりの繰り返しで路面の状況は悪く、滑り易いコース状況なので、じてんしゃ広場をご利用の皆様には十分お気をつけてご利用して頂けたらと思います。次回も会員の皆さんのお力添えよろしくお願い申し上げます。
