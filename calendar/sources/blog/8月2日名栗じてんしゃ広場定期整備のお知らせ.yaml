title: 8月2日名栗じてんしゃ広場定期整備のお知らせ
published: '2020-07-18'
body: |-
  例年より長梅雨で会員の皆さん乗れない日々をお過ごしかと思います。
  偶数月の第一日曜日は名栗じてんしゃ広場の定期整備日となります。
  毎日雨ばかりで、草は生い茂り、パンプの路面は痛んでいると思われます。
  路面の整備やコーナーの改修などを行いたいと思います。
  梅雨があけて気温が高いと思います。
  コロナ禍により会の方で水分などご用意ができかねます。
  熱中症対策を万全してご参加して頂ければと思います。
  尚、会の活動にはどなたでも体験できますのでどしどしご参加ください。
  2時間位整備後、皆さんとパンプライドや川遊びなど出来ればと思います。
  会員の皆さんのお力添えをよろしくお願い申し上げます。

                          日時:8月2日9時より
       場所:名栗じてんしゃ広場

  前日の17時気象庁、埼玉県南部の降水確率が50%以上、予想気温が35度以上の場合は中止とさせて頂きます。
