title: 7/19里山整備活動の報告
published: '2026-07-20'
body: |-
  3連休の中日、晴れて暑い朝から体験入会1名を含む9名が集まり里山整備活動を行いました。

  e-MTBに乗る倒木処理班3名とキッズ2名を含む草刈班6名に分かれ、それぞれの作業場所に向かいました。

  倒木処理班は、里山道に倒れて通行の妨げになっていた倒木を2か所で撤去しました。加えてトゲのある低木を除去しました。あいかわらず倒木も多く発生していますが、立ち枯れた樹木の枝が折れて落下することも増えています。雨が降ったあとや強風の日には落下してくる枝にもご注意ください。

  草刈班は、里山道を走行しながら、道の両脇の雑草、ツル、笹などを除去しました。この季節の雑草の勢いはスゴイので道がふさがりそうだった所もありましたが、作業後は道が見通せるようになり、走行しやすくなりました。

  2班で合流し、全員で雑草を除去しつつ、もう1か所で倒木を撤去。山を下って解散しました。今回は暑い中、短時間で効果的な作業ができたように思います。

  作業に参加されたみなさま、おつかれさまでした。次回の活動は8月2日の名栗じてんしゃ広場の定期整備です。暑い日が続きそうですが、会員のみなさまのご協力をよろしくお願いいたします。
