title: 8/18名栗じてんしゃ広場定期作業の報告
published: '2024-08-19'
body: |-
  8/18(日)は名栗じてんしゃ広場の定期作業を行いました。高温多湿の1日でしたが、13名が参加。草刈り機7台で広場全体の草を刈り、残りの6名で刈った草を運び出しました。また、一部の路面も補修しました。
  十分な水分を取りつつ、全身汗だくになりながらの作業でした。参加された皆さん、お疲れ様でした。暑さが一段落するこれからに向け、良い環境を整えられましたので、じてんしゃ広場をぜひ利用してみてください。
