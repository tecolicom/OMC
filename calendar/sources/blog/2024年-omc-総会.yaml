title: OMC 2024年 総会開催のお知らせ
published: '2024-06-05'
body: |-
  【会員総会】

  2024年6月16日(日)

  9:30  受付開始

  10:00 総会開会

  開催場所:Studio TECOLI(飯能市柳町20-20)

  *車で来られる方は近隣のコインパーキングをご利用ください

  *人数把握が必要になるため総会に参加される場合は、Facebookの
  OMC会員ページのイベントに参加表明、もしくはこちらにメールお願いします。

  https://www.facebook.com/share/f1Cnh59UYVBrEcvR/

  okumusashi.mtb@gmail.com

  また会費のお支払いは銀行振込となります。

  6月30日までに以下までお振り込みくだされば幸いです。

  年会費:2500円

  振込先:ゆうちょ銀行

  (ゆうちょ銀行から)

  記号10300 番号82119261

  口座名義:オクムサシマウンテンバイクトモノカイ

  (ゆうちょ銀行以外から)

  店番 ゼロサンハチ 普通

  口座番号8211926

  口座名義:オクムサシマウンテンバイクトモノカイ
