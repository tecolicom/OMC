title: 2/2名栗定期作業のお知らせ
published: '2025-01-14'
body: |-
  2月2日(日)は名栗じてんしゃ広場の定期作業日です。路面補修を行う予定です。同広場に午前9時にお集まりください。11時頃まで作業を行います。
  なお、前日17時の気象庁発表による埼玉県南部の天気予報で、当日6時〜12時の降水確率が50%以上の場合は中止といたしますのでご了承ください。
