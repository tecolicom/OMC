title: 11 月1日 日高市美化活動
published: '2020-11-02'
body: ' 今年度より日高市の道路美化団体に 登録させていただき、上半期はコロナ感染予防のため活動は自粛しておりましたが、11月1日気持ちのいい秋晴れのなか初の活動を行いました。活動には8名の会員の方に参加いただき、ゴミ拾い、除草、倒木の撤去を行いました。思いのほか空き缶や太い倒木が多く、予定していた半分の工程で本日の活動は終了としました。年度内までにあと数回、実施予定ですので、ぜひご参加ください。'
