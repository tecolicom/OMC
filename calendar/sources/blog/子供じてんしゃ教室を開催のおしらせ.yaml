title: 子供じてんしゃ教室を開催のおしらせ
published: '2022-11-05'
body: |-
  11/6（日)は名栗ふれあい公園じてんしゃ広場にて子供じてんしゃ教室を開催します。
  普段お乗りの自転車をお持ち込みいただき、じてんしゃ広場のコースや公園内のデコボコ道で遊びながらレッスンを行います。
  こちらの申し込みフォームからお申し込みください。
  https://okumusashimtb.wixsite.com/omcweb/form-kidsschool
  ご参加お待ちしております！
