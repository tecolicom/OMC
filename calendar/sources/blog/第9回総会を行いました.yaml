title: 第9回総会を行いました
published: '2022-06-22'
body: 6月19日(日)に、奥武蔵マウンテンバイク友の会第9回総会をオンラインにて実施しました。夜の7時という開始時間でしたが、活動予定や会計報告などに興味を持った会員の方に参加していただきました。総会に参加できなかった方のために、当会ウェブページにて総会資料をアップロードしています。総会の案内でお手元に届いたハガキに記載されているパスワードをご入力の上、ご確認ください。https://okumusashimtb.wixsite.com/omcweb/7th-generalmeeting
