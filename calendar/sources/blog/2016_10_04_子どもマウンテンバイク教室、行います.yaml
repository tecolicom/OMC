title: 子どもマウンテンバイク教室、行います
published: '2016-10-03'
body: |-
  １０月の活動日は１０月１６日（日曜日）。

  子どもマウンテンバイク教室を行います。

  土の広場で自転車遊び。
  自転車好きのお子さまたち、いつもの乗りなれた自転車で気軽に遊びにきてください。
  でこぼこ道も楽しいよ。

  日　時：１０月１６日　８時３０分〜１１時３０分
  会　場：飯能市岩沢運動公園西側広場
  費　用：無料
  持ち物：自転車（補助輪付き、ストライダーは不可）、
  　　　　動きやすい服装（長袖長ズボン推奨）、スニーカー、
  　　　　お持ちの方はヘルメット
  　　　　（数に限りがありますがヘルメットのレンタルあります。）
  対　象：小学生

  前日の１７時時点の気象庁の天気予報で、埼玉県南部の１６日午前中の降水確率が５０％以上だった場合は中止とさせて頂きます。

  問：奥武蔵MTB友の会（okumusashimtb@gmail.com）
  Tel：042-974-4490
