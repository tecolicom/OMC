title: 2022年5月〜7月の活動予定
published: '2022-04-21'
body: |-
  会員の皆さんこんにちは。5月〜7月の活動の予定です。ご都合の良い時にぜひご参加ください。6月19日(日)は総会の予定です。ZOOMでの開催となります。こちらもぜひ参加ください。
  〜〜〜〜〜〜〜〜〜〜〜〜〜〜〜〜〜〜〜〜
  5月22日 里山作業(市民清掃デー、阿須自治会、岩淵自治会と協働)
  5月29日 ゴミゼロ清掃デー(日高地区)
  6月5日 名栗定期作業
  6月19日 総会(ZOOM開催の予定)
  7月17日 活動内容は未定
