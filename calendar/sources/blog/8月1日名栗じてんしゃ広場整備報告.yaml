title: 8月1日名栗じてんしゃ広場整備報告
published: '2021-08-01'
body: |-
  暑い中名栗じてんしゃ広場の整備に参加された皆さんありがとうございました。

  パンプコースの周りの草刈に、梅雨で痛んだ面の整備を行いました。

  気温が高いので早めに整備は切り上げました。

  会員の皆さんは活動後パンプのコースを何周もライドされてました。暑くてもマウンテンバイク好きなのですね。

  自分は川にドボンでした。

  安全にパンプを楽しめる様に整備を行いました夏休みに名栗へ川遊びに来られるご家族の方々にもご利用して頂けたら幸いです。

  次回は10月3日に行います。

  会員の皆さんのお力添えよろしくお願い申し上げます。
