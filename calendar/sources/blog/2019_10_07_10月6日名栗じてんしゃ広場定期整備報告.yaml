title: 10月6日名栗じてんしゃ広場定期整備報告
published: '2019-10-07'
body: |-
  名栗じてんしゃ広場の定期整備、体験会と言う事もあり多数の方に参加して頂きました。ありがとうございます。

  朝から各地雨模様でしたが、名栗じてんしゃ広場付近は雨が降っておらず、体験会参加の方を含め11名で小石の撤去、草刈りをし、お子さん達も元気に土を運び路面を綺麗にしました。

  2時間程作業し整備したコースを皆様でライドを楽しみました。

  体験会に参加された方々は機会があれば整備をしたいと思っていたそうです。

  ありがとうございます。

  次回の定期整備もよろしくお願いします。
