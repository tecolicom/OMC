title: 12月6日名栗じてんしゃ広場定期整備について
published: '2020-11-24'
body: |-
  里山は落ち葉で埋め尽くされ楽しいライドを会員の皆さん過ごされているのではないでしょうか。
  さて12月6日は2021年最後の名栗じんてしゃ広場定期整備を行いたいと思います。
  今回はパンプの面の整備を主に行います。
  整備の前にアメスコの使い方や転圧などをちょっとしたレクチャーで皆さんと共有できればと思います。
  会員の皆さんのお力添えよろしくお願い申し上げます。
  尚、奥武蔵の活動日では毎回活動を体験されたい方を随時募集しております。
  奥武蔵の活動にご興味のある方をお誘いして頂ければ幸いです。

     日時 12月6日 9時より
     場所 名栗じてんしゃ広場

  2時間ほど整備をしたら、皆さんでライドして楽しみましょう!
  尚 土曜日、17時気象庁、埼玉県南部の降水確率が50%以上の場合は中止とさせて頂きます。よろしくお願い申し上げます。
