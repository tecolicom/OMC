title: 第11回総会開催のご報告
published: '2024-07-04'
body: |-
  ご報告がたいへん遅くなりました。
  6月16日(日)、奧武蔵マウンテンバイク友の会の第11回総会を、飯能市柳町の「Studio TECOLI」にて開催しました。
  総会では昨年度の活動報告と会計報告、世話人の承認、今年度の活動予定と予算案を説明し、ご理解とご承認をいただき終了しました。
  12年目となる今年度も引き続きご協力をよろしくお願いします。

  奥武蔵マウンテンバイク友の会 世話人一同
