title: 里山道整備活動
published: '2018-09-27'
body: |-
  はとやま環境フォーラムと地域の方との協働で里山道整備を行います。  作業日:9月30日(日)、10月14日(日)、10月21日(日)時間:午前9時集合、12時終了予定集合場所:埼玉県鳩山町熊井黒石神社そば はとやま環境フォーラム活動地 (下図参照)   路面改修や水切り整備などの土木作業を行う予定です。

  泥に汚れても構わない服装、長靴、軍手などをお持ちください。

  前日17時時点の気象庁の天気予報で、該当地区の当日午前中の降水確率が50%以上の場合は中止となります。 お力添えのほど、どうぞ宜しくお願いいたします。
