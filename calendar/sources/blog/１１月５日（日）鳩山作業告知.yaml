title: １１月５日（日）鳩山作業告知
published: '2023-10-28'
body: |-
  ~鳩山活動の告知。

  11月5日(日)鳩山町熊井にて谷津田の休耕田の刈払いおよびトレイルの清掃と刈払いを行います。

  作業時間は9時~11時位。

  刈払い機は休耕田の作業がメインです。

  使われる方は後任の教習所で講習を受けた方に限ります。

  トレイル作業の方は、鎌や手鋸があると良いです。

  会の方でも用意するので、お持ちでない方は当日お声がけください。

  当日現地で車止められるところが少ないので、8時に坂戸市北浅羽桜堤公園の駐車場に集合。

  道具は2台ほどにまとめて運ぶ予定です。

  参加者はそこからMTBで移動になります。

  会員の皆様のご協力よろしくお願いします。~
