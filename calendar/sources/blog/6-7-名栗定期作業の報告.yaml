title: 6/7 名栗定期作業の報告
published: '2026-06-11'
body: 6/7は名栗じてんしゃ広場の定期作業日でした。集まったのは5名。草刈り機4台とブロワー1台で、しっかりと草刈りを行いました。これで次回8月の活動日までは、草が伸びすぎることもないでしょう。14日の日曜日はOMC総会です。天気によりますが、総会後はライドも計画しています。ご参加お待ちしています。
