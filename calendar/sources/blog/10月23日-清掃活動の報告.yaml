title: 10月23日 清掃活動の報告
published: '2022-10-24'
body: 10月23日(日)は、日高市の山間地区で行われた清掃活動に参加しました。集合時間が朝7時前と普段の活動よりも早かったですが、6名の会員が集まり、舗装路周辺の草刈りや土砂の撤去、さらにはゴミ拾いを行いました。その後、同地区に供給する水道タンクの清掃にも参加しました。沢の岩盤の上に60年ほど前に建てられたこの水道タンクは、地域住民の方々が年に一度、清掃しているようで、めったに見ることのできない作業はとても興味深かったです。この地域での活動は今回で3回目となり、住民の方々との交流やOMCの認知が深まりつつあります。今後も地域に根ざした活動を末長く行なっていきますので、会員みなさんのご参加、お待ちしています。
