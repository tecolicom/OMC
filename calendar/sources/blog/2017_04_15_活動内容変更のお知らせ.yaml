title: 活動内容変更のお知らせ
published: '2017-04-14'
body: |-
  からからに乾いた冬が終わって、水が動く季節がやってきました。

  先々月に整備した、いつもの里山の入り口にも大きな水溜まりが出来ています。
  4月16日の活動内容を「お掃除ツーリング」から里山道整備に変更し、水溜まり対策をしようと思います。(4月16日活動日の告知ページはこちら)


  活動にご参加いただく方は、汚れても良い格好でお越し下さい。

  軍手や長靴などもあると良いかと思います。
  水対策は里山道整備の肝。

  皆さまお力添えのほど、どうぞよろしくお願いいたします。
