title: 台風19号の被害に伴う里山、真善美での作業報告
published: '2019-11-13'
body: |-
  報告が遅くなってしまいましたが、先月10月20日に行った台風19号の被害に伴う作業の報告です。


  定期整備では、里山の倒木処理及び水切りの確認と、真善美の小径での堆積物の処理の2班に別れて行いました。前者の里山整備ですが、飯能市より整備許可を得ている市道を倒木が塞いでいたため、ノコギリで切断後、道脇に移動させました。年間降雨量の3~4割が1日で降ったとされる台風19号ですが、最も新しく作った水切りには、雨水を道からしっかりと排出した跡が見られました。しかし、排出路には土砂や枝が溜まっており、排水機能がおそらく低下しているため、今後の活動でこれを除去する予定です。


  今回の台風19号による入間川の氾濫で、秋の曼珠沙華で有名な真善美の小道が大きな被害を受けていました。真善美の整備にはまちづくり推進委員会の要請で定期的に関わっていますが、今回も要請があったので里山での作業を振り替えて作業を行いました。川のちょうど湾曲部になった箇所では流されてきた倒木と草木が絡まり、大きな山ができていました。また小道の杭とロープにも草木が大量に絡まり、ほかの箇所にも大量の流木や枝があり、それらを撤去を行い
