title: 名栗じてんしゃ広場整備Day
published: '2022-10-11'
body: |-
  10月2日（日）
  この日は名栗ふれあい公園じてんしゃ広場の刈払い、奥のパンプトラックの面の整備を行いました。
  参加者は10名。
  この日も暑い作業日でした。
  8月下旬に刈払いしたにもかかわらずかなり茂ってしまっていたので人通りのある所を中心に刈払いました。
  トラックは8月に整備したL字トラックとジャンプレーンの状態が良かったので、しばらく手を入れてなかった奥のO字トラックの面を全体的に整備しました。
  来る10月16日に東京都自転車競技連盟がおこなうパンプトラック講習会で使われる予定です。
  このイベントは参加無料なので、興味ある方は是非参加してください。
  https://sites.google.com/view/tcf-fukyu/event/2022/013
