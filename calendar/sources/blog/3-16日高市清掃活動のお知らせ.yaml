title: ＊中止＊ 3/16日高市清掃活動のお知らせ
published: '2025-02-28'
body: |-
  **雨予報のため中止になりました**

  3月16日(日)は日高市の里山道で清掃と草刈りを行います。午前8時30分にセブンイレブン日高高麗本郷店にお集まりください。作業場所まではMTBで移動します。手鋸や枝切りバサミをお持ちの方はご持参ください。

  なお、前日午後5時の気象庁発表による埼玉県南部の天気予報で、降水確率が50%以上だった場合は作業を中止といたします。
