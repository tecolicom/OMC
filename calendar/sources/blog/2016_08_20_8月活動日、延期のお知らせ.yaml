title: 8月活動日、延期のお知らせ
published: '2016-08-20'
body: |-
  本日17時の時点の天気予報で、明日21日の埼玉県南部午前中の降水確率が50%となっておりますので、予定しておりました里山道の整備活動は延期とさせていただきます。

  活動日、皆様と一緒にワイワイと作業するのを楽しみにしておりましたが、残念ながら台風来てしまいました。
  延期の日取りにつきましては、おって告知いたします。
  宜しくお願いいたします。
