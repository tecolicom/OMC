title: 鳩山SATOYAMA写真展開催中
published: '2022-10-08'
body: |-
  ~はとやまSATOYAMA写真展にてOMCの活動紹介展示~
  今週末、8日~10日に鳩山NTふれあいセンター3Fにて上記写真展が行われます。
  その中の協力団体紹介コーナーで当会の紹介もされています。
  鳩山の自然や、昔の風景まで、今まで知らなかった鳩山町が見えてくる写真展です。
  3連休のサイクリング途中に寄ってみてはいかがでしょうか?
  https://hatoyama.info/2022/09/07/6451/
