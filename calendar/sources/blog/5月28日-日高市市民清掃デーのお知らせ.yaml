title: 5月28日 日高市市民清掃デーのお知らせ
published: '2023-05-13'
body: 5月28日(日)は日高市の市民清掃デーです。道路美化団体として作業を担当する市道付近の自治体の清掃作業に、奥武蔵マウンテンバイク友の会も協力します。主な作業内容は草刈りと清掃です。草刈り鎌をお持ちの方はご持参ください。集合時間が早いですが、皆さまのご参加をお待ちしています。■集合日時:5月28日(日)午前6時45分■集合場所:セブンイレブン日高高麗本郷店(https://goo.gl/maps/iKPAM4oJZ3c1S3Q49)【注意事項】●お車でお越しの方は、上記の集合場所までお越しください。無料駐車場を用意しましたので、到着後にそちらへ案内いたします。作業場所まではMTBで移動します。●各自で水分補給やおやつの準備をお願いします。●前日午後5時の気象庁発表による埼玉県南部の天気予報で、降水確率が50%以上だった場合は作業を中止といたします。
