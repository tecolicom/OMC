title: リモートによる会員総会のお知らせ
published: '2021-06-11'
body: |-
  *日時に誤りがありました。正しく6月20日(日)AM10時からとなります。ご迷惑をおかけしました。



  いつも会へのご協力ありがとうございます。以前お知らせしましたように、2021年度の総会は新型コロナ感染対策および会員の参加の利便性を鑑みZOOMによるリモートで開催いたします。
  ZOOMは無料でダウンロードでき、PC、タブレット、スマホで使用可能です。
  日時:2021年6月20日(日)AM10時〜
  会員の皆さまにはメールにてURLやパスワードをお送りしています。万一送られていない場合は、お手数ですがFacebookの会員専用ページで確認するか、下記アドレスまでお名前をご記入の上、メール送信をいただきますようよろしくお願いします。
  okumusashi.mtb@gmail.com
