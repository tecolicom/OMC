title: 第12回総会開催のご報告
published: '2025-06-24'
body: |-
  6月22日（日）、奧武蔵マウンテンバイク友の会の第12回総会を、飯能市柳町の「Studio TECOLI」にて開催しました。

  総会では昨年度の活動報告と会計報告、世話人の承認、今年度の活動予定と予算案（一部間違いがあり、その場で修正）を説明し、ご理解とご承認をいただきました。

  最後の質疑応答では以下のような話題がありました。

  ・刈払いとチェーンソー講習代を会費で補助します→会員の方1名がチェーンソー講習受講を検討

  ・他団体にも所属されている会員の方より当会の保険についてご質問をいただく→当会の保険について説明→参考にしたいとのこと

  最後に会長の三上から日頃の活動参加への感謝と今後のより多くの活動参加のお願いをさせていただき、総会は無事に終了しました。

  総会終了後は、会員7名でアフターライド。今年一番の暑さだったと思いますが、みなさん元気に楽しく走りました。

  13年目となる今年度も引き続きご協力をよろしくお願いします。

  奥武蔵マウンテンバイク友の会 世話人一同
