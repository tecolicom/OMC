title: 1月活動日
published: '2017-01-14'
body: |-
  2017年最初の活動日、1月の活動日は21日(土)。

  鳩山町の里山道整備を行う予定です。

  鳩山町での活動は今年からスタートする新しい活動で、今後の展開が大変楽しみです。

  活動内容は、里山道の倒木撤去、落ち枝拾いやゴミ拾いなどの清掃活動を行います。

  泥に汚れてもかまわない服装や軍手などと、お持ちの方は手鋸、鎌、ナタなどをご用意ください。

  10時半頃で作業は終了、活動場所周辺を散策ツーリングする予定です。

  集合時間:8時30分

  集合場所:鳩山町北浅羽桜堤公園駐車場(クリックで地図を表示)

  駐車場で集合後、MTBで活動場所に向かいます。

  前日の17時時点の気象庁の天気予報で、埼玉県南部の21日午前中の降水確率が50%以上だった場合は活動日を延期します。延期の日取りにつきましては、追ってお知らせいたします。

  2017年も楽しくパワフルに活動していきましょう。

  本年もお力添えのほど、宜しくお願いいたします。
