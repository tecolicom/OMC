title: 11月28日活動報告
published: '2021-11-30'
body: |-
  今日は、里山最寄りの自治体2箇所で計画された集団清掃に、7名と8名の2班に分かれて参加してきました。なお、どちらの自治体も普段からMTB走行を楽しんでいる里山の麓にあります。

  会員7名の班は、沢沿いの道路でゴミ拾いと草刈りを行いました。落ちているゴミは少なかったものの、道脇には雑草が生い茂っており、1時間ほどの作業で軽トラ2台分の草を刈り取りました。

  一方、会員8名の班はさらに2班に分かれ、11名の住民と協力して、2本の山道の水切りに堆積した土砂や落ち葉を取り除き、通行の邪魔になる枝をはらいました。

  また、清掃活動と並行して、山林内の車両止めが破損していたため、そちらの修復作業も行いました。

  今回が初めての協働作業となる自治会の会長さんからは、「住民の高齢化ゆえに助かりました。今後も協力をお願いします」とのお言葉をいただきました。

  作業に参加された皆さま、お疲れ様でした。今後も地元自治体との良好な関係を築けるよう、皆さまのご協力をお願いします。
