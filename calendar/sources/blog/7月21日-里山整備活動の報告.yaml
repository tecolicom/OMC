title: 7月21日 里山整備活動の報告
published: '2024-07-22'
body: |-
  7月21日（日）は、里山の定期作業日でした。
  予定ではライド＋プチ整備でしたが、前日夜に豪雨が降ってしまいました。よってトレイル保護の観点からライドは控え、トレイルを傷めない場所で軽作業を行うことにしました。

  朝から予報通りの猛暑でしたが、8名の会員が集まりました。集合場所からMTBに乗って出発、途中で3班に分かれ、トレイル入口からは徒歩で現場に向かいます。

  第1班は飯能市の道路委美化活動団体として手入れをしている市道を塞ぐ倒木を2本撤去しました。チェーンソーを使う作業は大きな危険を伴うので慎重に作業を行いました。

  第2班は落下して散らばった枯れ枝や細めな倒木の撤去、片付けを行いました。川沿いのトレイルでは、恒例の小虫の襲撃に遭ったものの思いの外涼しく作業が捗りました。

  第3班はトレイル入口とその上部の草刈、落枝撤去を行いました。この時期の雑草の勢いは凄まじいものがありますが、通行に支障がないレベルにはできました。予想通りトレイルは水気をたっぷり含んでいてツルツルでした。

  作業に参加されたみなさま、暑い中おつかれさまでした。今後もご協力をよろしくお願いいたします。
  次回の活動は8月4日（日）の名栗じてんしゃ広場定期作業です。みなさまのご参加をお待ちしています。
