title: ８月２４日 第７回総会実施報告
published: '2020-08-25'
body: |-
  8月23日、例年より2か月遅れの第7回奥武蔵マウンテンバイク友の会総会を行いました。
  まず、総会の開催告知が不十分であったこと、お詫び申し上げます。
  晴れた週末にもかかわらず、会員の皆さまにお集まりいただき、無事総会を終えることができました。ありがとうございました。
  当日すべての議案にご賛同いただけましたが、そのうち年会費の値上げについて、ここで補足説明させていただきます。
  年会費を今年度より2000円から2500円へ500円の値上げとさせていただきましたが、そのすべては、活動にかける保険料に充てます。
  従来の保険は、各会員様名義で加入するため、加入手続きに時間を要するばかりか、動力(主にチェーンソー)の使用をカバーできでいませんでした。
  そのため今年度よりNPO法人森づくりフォーラム様のグリーンボランティア保険に加入いたします。
  この保険の利点として、チェーンソー利用もカバーはもちろんのこと、被保険者を予め登録する必要がなく、活動実施前に参加予定人数を通知することで活動実施後の(参加人数分のみ)保険料を納付することで保険適用となるため、当会に非会員の方の体験活動参加にも無駄なく保険に加入できます。
  会員の皆さまにおかれましては、ボランティア活動にご興味をお持ちでも未入会のお仲間にも、安心して活動体験していただけますので、ぜひお誘いあわせの上、ご参加ください。
  2020年度も引き続き奥武蔵マウンテンバイク友の会にご理解、ご協力いただきますようよろしくお願い申し上げます。
  奥武蔵マウンテンバイク友の会 世話人一同
