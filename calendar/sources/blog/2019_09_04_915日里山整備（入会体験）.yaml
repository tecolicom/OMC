title: 9/15(日)里山整備（入会体験）
published: '2019-09-04'
body: いつもの里山の南北尾根の水きりの清掃、補修を行います。また今回の活動は、入会体験会です。入会を検討している方、ボランティア活動に興味のある方、作業保険にも加入しますので安心してご参加ください。集合時間/集合場所令和元年9月15日(日)8時00分
  飯能市役所駐車場8時30分 飯能市阿須運動公園駐車場阿須運動公園に集合し、ミーティング後、MTBで作業箇所に向かいます。また、気温の高い中での作業や里山道の移動となりますので、各自で水分補給やおやつの準備をお願いします。前日9/14(土)午後5時の気象庁の埼玉県南部の天気予報で、降水確率が50%以上だった場合および予想最高気温が35度以上だった場合は中止いたします。皆様ご協力をお願いします_(._.)_
