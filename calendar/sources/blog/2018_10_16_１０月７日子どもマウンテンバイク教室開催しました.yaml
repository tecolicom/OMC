title: １０月７日子どもマウンテンバイク教室開催しました
published: '2018-10-16'
body: |-
  前日の秋雨が空気を洗い、澄み渡った晴れた空。

  私たちと子どもたちの願いに、お日様は快く答えてくれました。

  20人弱の子どもたちと、うねりを楽しみ盛り上がり

  子ども同士は仲良くなって、いつかの再会を約束し

  楽しむ声は広場の土に染み込んで

  また次の幸せな日につながることでしょう

  次回の子ども自転車教室は2019年春を予定しています。

  どうぞお楽しみに。
