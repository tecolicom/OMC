title: 名栗じてんしゃ広場の案内看板について
published: '2019-09-25'
body: |-
  名栗じてんしゃ広場は道路や駐車場から公園が見えず、場所がわかりにくいとのご意見をいただきましたので、案内看板を設置しました。

  看板の製作にあたり、当会会員の関さん（株式会社セキメイバン様）には多大なるご協力をいただきましたので、この場を借りてお礼申し上げます。
  ありがとうございました！

  看板、銘板なら県道３０号上鹿山交差点そばの株式会社セキメイバンをどうぞよろしく。
