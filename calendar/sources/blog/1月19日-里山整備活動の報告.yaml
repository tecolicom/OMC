title: 1月19日 里山整備活動の報告
published: '2025-01-20'
body: 新年1回目の活動は、飯能市道路美化活動団体として整備を行っている里山で、12名の会員により整備活動を行いました。今回のメイン作業は2018年の11月から整備を開始した市道の整備作業。この作業は管理者である飯能市と地権者団体からから作業許可をいただいた上で取り組んでいます。過去のブログを振り返ってみると懐かしいですね。https://okumusashimtb.wixsite.com/omcweb/post/2018/12/04/12%E6%9C%88%E6%B4%BB%E5%8B%95%E6%97%A5%E3%81%AE%E5%A0%B1%E5%91%8A%EF%BC%88%E9%87%8C%E5%B1%B1%E9%81%93%E6%95%B4%E5%82%99%EF%BC%89集合場所のあいわ広場から現場に向かいます。途中のゴミが気になったのでゴミ拾い。道端の目立ったものだけを回収しましたがそれなりの量がありました。現場に到着後、グループに分かれ、水切りの補修と狭くなってしまった箇所の拡幅を行います。水切りの補修では、雨水が流れ下って道を侵食しないようにするため、埋まってしまった水切
