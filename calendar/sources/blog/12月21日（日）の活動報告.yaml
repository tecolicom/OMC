title: 12月21日（日）の活動報告
published: '2025-12-23'
body: |-
  奥武蔵マウンテンバイク友の会の12月活動を14名で行いました!
  当日は3班に分かれて、活動エリアをぐるっと見回りながら、里山道に散らばった落ち枝をみんなで清掃しつつ忘年ライドも楽しみました。
  現在、この地域の森ではナラ枯れの影響で、たくさんのナラの木が枯れており、里山道には枝が落ちやすい状態が続いています。
  今後もしばらくは枯れ枝の落下が続くと予想されますので、特に強風の日のライドでは、頭上からの落下物に十分ご注意ください。
  次回の活動は、2026年1月18日(日)。
  日高市方面で清掃作業を行う予定です。
  会員のみなさんのご参加をお待ちしています!
  なお、新規会員も随時募集中です。
  入会方法 | omcweb
