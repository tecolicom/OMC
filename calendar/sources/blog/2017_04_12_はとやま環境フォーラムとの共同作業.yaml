title: はとやま環境フォーラムとの共同作業
published: '2017-04-11'
body: |-
  はとやま環境フォーラムから作業お手伝いの依頼がありました。

  鳩山町の里山にピザ釜を作る予定があり、その材料とする大谷石の運搬に力を貸してほしいとのことです。

  日時は以下の通りです。

  作業日:4月16日(日)

  集合時間:13時30分

  集合場所:熊井黒石神社(クリックで地図を表示)

  駐車スペースに限りがありますので、集合場所には徒歩または自転車でお集まりください。

  1Kmほど離れておりますが、利用可能な駐車場として「高野倉ふれあい自然公園」をご紹介いただきました。

  こちらに車を停める止めさせていただき、集合場所まで春の山辺のサイクリングも楽しそうです。

  この時期は、こちらの里山に渡ってくる夏鳥が巣作りを行う時期だそうで、生態系への影響を考えて山林内のツーリングは行いません。

  当日の作業は、まず集合場所周囲の里山整備を行いながら大谷石の到着を待ち、大谷石が到着しましたらピザ釜設置場所まで運搬するそうです。

  ピザ釜作りは4月(今回)、6月、7月で作業を行い、8月にピザ焼きと里山体験会を行う予定だそうです。

  前日の17時時点の気象庁の天気予報で、埼玉県北部の16日午後の降水確率が50%以上だった場合は活動日を延期します。

  力を合わせてピザ釜つくリ、整備した里山で焼くピザはなんとも美味しそうです。

  皆さまのご参加、お待ちしておりまーす。
