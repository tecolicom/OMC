title: 総会と継続のお知らせです。
published: '2019-04-12'
body: |-
  奥武蔵マウンテンバイク友の会総会のお知らせと会員継続のお願い

  奥武蔵マウンテンバイク友の会へのお力添えいつもありがとうございます。

  発足から早や5年「健全なフィールドの維持と地域コミュニティが蓄積してきたノウハウの継承」を理念として約120名の方々に会に名を連ねてきていただきました。

  昨年度​​は飯能市の​​​道路整備団体にも登録をし、​里山の整備、また​​​​​名栗じてんしゃ広場での子ども教室、はとやま環境フォーラムさんとの協働など​​​様々な活動を行ってきました。

  今後も更に活動を発展させていくために、皆さんの積極的なご参加をお待ちしています。総会への出席、また会員の更新もぜひともよろしくお願いします。

  尚、会則に基づき、会費を2年以上納付されていないわ場合は会を退会したこととなりますので、ご留意ください。

  奥武蔵マウンテンバイク友の会 世話人一同

  総会日時：6月16日（日）9:00~12:00
         場所：飯能市加治東公民館

  ＊今後、会費のお支払いは総会で、もしくは銀行振込のみとなり、ショップでのお支払いはできなくなります。総会に来られない場合は、6月30日までに以下までお振り込みください。

  年会費：2000円
  振込先：飯能信用金庫 飯能中央支店 普通　2086565
                奥武蔵マウンテンバイク友の会
