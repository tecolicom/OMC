title: 11月27日 里山清掃活動の報告
published: '2022-12-01'
body: 11月27日(日)は、飯能市の市民清掃デーでした。日ごろマウンテンバイカーの集まるこの地域の2つの自治会でも清掃活動が行われ、奥武蔵マウンテンバイク友の会も協力させていただきました。朝早い集合でしたが、8名の会員が集まりました。ご協力ありがとうございました。1つめの地域では、自治会の方からご指示をいただき、山中へ向かう川沿いの道に沿ってゴミ拾いを行いました。普段MTBで走行しているときは綺麗に見える道でしたが、歩いてみると思いのほかゴミがあり、PET容器など数袋分のゴミを回収しました。2つめの地域では、住民の方々約15名と会員で二手に分かれ、住宅地裏の里山道の水切りに堆積した土砂や落ち葉の除去、通行の邪魔になる枝の除去などを行いました。住民の方のお話によると、台風などの豪雨の際は里山道が川のようになり、ふもとの住宅地の舗装道路まで土砂が流れ出るそうです。そのような被害を少しでも軽減するため、里山道の定期的な維持管理はとても大切です。作業に参加されたみなさま、おつかれさまでした。今後も地域のみなさまとの良好な関係を築けるよう、ご協力をよろしくお願い致します。
