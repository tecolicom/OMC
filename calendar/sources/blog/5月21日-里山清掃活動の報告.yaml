title: 5月21日 里山清掃活動の報告
published: '2023-05-30'
body: 5月21日(日)は、飯能市の市民清掃デーでした。日ごろマウンテンバイカーの集まるこの地域の2つの自治会でも清掃活動が行われ、地域のみなさまが行う活動にOMCも協力させていただきました。10名の会員が集まりました。ご協力ありがとうございました。1つめの自治会では、地域を流れる川の脇の草刈りを行いました。ここの草刈りは10年ぶりとのことで、地元の方が何人も見えて御礼を頂いたり、お茶の差し入れを頂き、大変感謝されました。2つめの自治会では、麓から尾根に続く里山道の整備を行いました。地域の近況や、過去からの状況などについてコミュニケーションをしながら、ゴミ拾い、水切りに堆積した土砂や落ち葉の除去を行いました。以前OMCで補修協力したバリケードの件など大変喜んでいただいており、改めて御礼を頂きました。作業終了後にはお茶の差し入れも頂きました。作業に参加されたみなさま、おつかれさまでした。今後も地域のみなさまとの良好な関係を築けるよう、ご協力をよろしくお願い致します。
