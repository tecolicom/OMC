title: 消防署より感謝状をいただきました
published: '2022-03-07'
body: |-
  昨年11月の救命活動に対して埼玉西武消防組合の岸消防長様から奥武蔵マウンテンバイク友の会に対して感謝状をいただくことができました。
  この栄えある感謝状をいただくことが出来ましたのは、あの日の活動に参加して現場に居合わせた皆さんが協力してくれた結果であります。
  ご協力いただいた皆さん、あらためて感謝いたします。
  また、救命の対象者となられました倉上さんも同席いただき、無事の回復に至った事を報告されました。

  このような対応が行うことが出来ましたのは、数年前の総会時に稲荷分署の救急隊の方々に講習会を行っていただいた救命救急の内容を活かせたことでもあります。引き続き会として救命救急講習を受講させていただこうと思います。
  (現在、コロナ禍での対応であるため講習会の予定が立ちませんが、再開された際にはお知らせいたします。)
  今後ともよろしくお願いします。
