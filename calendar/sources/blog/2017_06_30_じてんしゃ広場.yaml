title: じてんしゃ広場
published: '2017-06-30'
body: |-
  　ついに公認のオフロード自転車コース（パンプトラック）を奥武蔵エリア内に作ることが出来るようになりました。
  　平成２９年度飯能市市民活動支援事業として「名栗ふれあい公園の有効活用案」の公募があり、「子どもと楽しむじてんしゃ広場」と題してパンプトラックの開設を提言いたしました。
  　市関係部署による書類審査と市民代表に対するプレゼンテーションをクリアして、私たちの提言は無事採択となりました。

  　「じてんしゃ広場」は名栗ふれあい公園の一部をお借りして開設します。名栗ふれあい公園は飯能市名栗地域の里山の麓、清流の傍らに位置する緑豊かな気持ちの良い公園です。近くにはそれぞれの個性が光るレストランがあり、少し足を伸ばせば温泉や釣り堀など楽しみ多い名栗地域。名栗ふれあい公園も名栗の魅力となるように、親しみやすく楽しいじてんしゃ広場を作っていきます。

  じてんしゃ広場作りのスケジュールとしては７月から作業を開始して１０月上旬までにコース一部のオープンを目指します。そして１０月には完成したコース一部を利用して「子どもマウンテンバイク教室」を開催いたします。

  　作業日程が決まりましたら、こちらのホームページや会員向けFacebookページで告知いたします。また、飯能市のメディアを利用して広く市民の方々のご参加も呼びかける予定でおります。
  素敵な広場の完成を楽しみに、皆様お力添えのほど、どうぞよろしくお願いいたします。
