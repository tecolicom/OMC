title: 4/5 名栗定期作業のご報告
published: '2026-04-16'
body: |-
  4月5日は、名栗ふれあい公園・じてんしゃ広場の定期作業日でした。

  当日は大人から小学生まで、計12名のMTBライダーが参加。
  前日からの雨が朝まで残っていたこともあり、トレイルライドを控えたメンバーも作業に駆けつけてくれました。

  作業は、
  ・路面に出てきた石を撤去する班
  ・ジャンプラインのリップを整備する班
  の2グループに分かれて実施。

  約1時間半で作業は無事完了しました。
  今週末4月19日（日）に開催予定の「じてんしゃ教室」では、小学生を対象にこの広場で自転車の楽しみ方をレッスンします。
  今回の作業によって、安全性の向上はもちろん、より楽しく走れる環境が整いました。

  ご参加いただいた皆さま、ありがとうございました！

  じてんしゃ教室 参加者募集中！
  ご興味のある方は、ぜひ下記URLよりお申し込みください。

  https://okumusashimtb.wixsite.com/omcweb/form-kidsschool
  また、この「じてんしゃ広場」は、どなたでも自由に利用できる公園です。
  ぜひ気軽に遊びに来てください！
