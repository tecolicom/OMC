title: 4月17日 里山整備作業のご案内
published: '2022-04-07'
body: |-
  4月17日（日）は、前回中止したエリアで清掃・整備活動を行います。皆さんのご参加をお待ちしています。
  集合日時：4月17日（日曜）午前8時30分
  集合場所：カワズベース（https://g.page/cawazbase?share）
  カワズベースには、ランチまたはワンドリンクを利用される方のみ、上の集合場所または第三駐車場（ https://goo.gl/maps/aCjjLVGebw5mUEsS7）にお車を駐車できます。利用されない方は、巾着田の駐車場（https://goo.gl/maps/rXSUjB5wUtjPeC736 ）など、近隣のコインパーキングをご利用ください。
  作業場所まではMTBで移動します。
  手鋸や枝切りバサミをお持ちの方はご持参ください。
  【注意事項】
  ●ソーシャルディスタンス、手指の消毒などお気をつけください。
  ●各自で水分補給やおやつの準備をお願いします。
  ●前日午後5時の気象庁発表による埼玉県南部の天気予報で、降水確率が50％以上だった場合は作業を中止といたします。
  ●まん延防止等重点措置または緊急事態宣言が発出された際は作業を中止といたします。
