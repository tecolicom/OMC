title: 【1月19日(日)の作業について】
published: '2020-01-06'
body: |-
  明けましておめでとうございます!

  2020年最初の活動についてお知らせです。今回は鳩山地区で作業を行います。弊会とパートナーシップを持つ鳩山環境フォーラムさんからの依頼で、谷津の田んぼの刈払い作業を行います。どうぞご参加ください。

  【集合時間】 8:30

  【集合場所】北浅羽桜堤公園

  〒350-0266 埼玉県坂戸市大字北浅羽914

  https://goo.gl/maps/MAWnEfBpMRLSS7mB8

  北浅羽桜堤公園に集合し、ミーティング後、MTBで作業箇所に向かいます。

  気温が低いなかでの作業ですので体温調節しやすい服装をおすすめします。また各自で水分補給やおやつの準備をお願いします。

  前日午後5時の気象庁の埼玉県南部の天気予報で、降水確率が50%以上だった場合は中止いたします。
