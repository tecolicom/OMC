title: 【12 月13日 交流活動報告】
published: '2020-12-13'
body: |-
  　お隣東京都西多摩地区で私達より古くから活動されている、西多摩マウンテンバイク友の会代表の中沢さんに無理を言って、世話人5名で活動日を視察させていただきました。

  　西多摩マウンテンバイク友の会は、国内でのマウンテンバイカーによるボランティア活動の第一人者的存在で、市町をまたいだ広範囲な里山を複数活動エリアとして抱え、その活動手法は組織的で効率的に行われており、私達には学ぶべき箇所が多くありました。
  　特に安全への配慮は手厚く、今後活動に活かしていきたいと思いました。
  　また活動エリアの住民や行政との関わりもかなり深い様で、中沢さんが会う人会う人と親密に挨拶されている様子が印象的でした。

  　今回をきっかけに、会同士の交流が活性化できるよう、今後機会を設けお知らせいたしますので、会員の皆様もご興味をお持ちの方はぜひご参加ください。

  　最後に、中沢さんはじめ西多摩マウンテンバイク友の会の皆様、この場を借りてお礼申し上げます。おじゃまさせていただきありがとうございました。奥武蔵にもぜひお越しください。
