title: 11月1日（日）日高市の活動のお知らせ
published: '2020-10-17'
body: 会員のみなさん、こんにちは。11月1日(日)は初の日高市での作業日となります。山道へと続く市道の清掃活動を行ないます。ぜひ、ご参加ください。【日時】11月1日(日)8:30~12:00【集合場所】セブンイレブン日高高麗本郷店【雨の場合】前日の19時までにFacebookの会員ページにて開催の可否をお知らせします。【持ち物】特になし集合場所から活動場所までは自転車で移動します。お車でお越しの方は、巾着田有料駐車場(500円)や西武秩父線高麗駅周辺のコインパーキングをご利用ください。セブンイレブンには買い物以外の駐車はできません。
