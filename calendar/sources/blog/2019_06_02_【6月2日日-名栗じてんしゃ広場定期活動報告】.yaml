title: 【6月2日(日) 名栗じてんしゃ広場定期活動報告】
published: '2019-06-02'
body: |2-
   梅雨入り前の貴重な日曜日でしたが作業に集まってくれた皆さんありがとうございました!今日は偶数月の第1日曜日という事で名栗ふれあい公園じてんしゃ広場の定期作業日でした。

  3班に分かれて作業を進めました。コース整備班はコース表面を滑らかにする作業。グリップ力の向上と共に、転んでしまった際の怪我を最小限にするための作業でもあります。 草刈り班は勢いよく草が伸び始めた今のうちにやっつけてしまおうという事でみっちり刈り込みました。     そして子ども班は川遊びを楽しんでいました、まだ6月になったばかりで水温は高くないのに全身水に浸かって遊んでました。ここに遊びに来る子供たちがこの公園を好きでいてくれることが奥武蔵マウンテンバイク友の会の活動の原動力の一つであります。    そして今日の作業の様子を「フカマル」というフリーペーパーに取材をして頂きました。飯能市、日高市、毛呂山町、坂戸といった地域に配布されていて、その地域で活動しているサークルやボランティア団体や地元密着型のお店などを紹介しています。

  自転車乗りではないフリーペーパーのライターさんの視点から我々の活動がどのように紹
