title: 7/18 里山整備作業の報告
published: '2021-07-20'
body: |-
  梅雨が明けて本格的な真夏の一日になりました!
  酷暑の中の作業となりましたが、お集まりいただいた皆さんお疲れさまでした。
  日頃MTBで遊ぶことで身体が鍛えられているためでしょうか、予定していた作業もグングン進ませることが出来ました。
  ご協力に感謝いたします_(._.)_



  この日の主な作業は水切りに溜まった堆積物の除去を2か所で行いました。
  以前に設置した水切りが今後の台風などの大雨の際にも十分に機能するように、堆積した土砂を取り除きました。

  別な作業として、この時期勢いのある雑草の除草作業を。
  これも2か所で行いました。

  また別の里山道ですが、長らく整備されていなかった市道の一本。
  今後、作業をするための事前の調査を行いました。
  登り口から尾根までの約半分の区間が大雨の後などは川のようになっております。
  このルートにたくさんの水切りを設置していく予定でいます。
  多くの労力が必要になりますので、会員の皆さんのお力添えを期待しています_(._.)_

  ~~お知らせ~~
  北側の尾根の出口付近にあった看板を新しくしました。
  墓地の横に下りないようにしてください。
  次回の活動は8/1(日)の名栗ふれあい公園・じてんしゃ広場の整備になります。
  前日の17時、気象庁の埼玉県南部の降水確定が50%以上、もしくは最高気温が35度以上の場合は中止とさせて頂きます。
  熱中症予防として、水分は多めに持参して頂けると幸いです。
  みなさまのご協力をよろしくお願いいたします_(._.)_
