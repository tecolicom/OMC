title: 3月活動日のお知らせ
published: '2016-03-01'
body: |-
  ３月の活動日は１３日（第２日曜日）です。

  先月、延期しました里山道の整備を行います。

  ぬかるみの整備を行う予定ですので、泥に汚れてもかまわない服装、軍手などをご用意ください。


  集合時間／集合場所

  ８時００分 飯能市役所駐車場（集合後、阿須運動公園に移動）

  ８時３０分 飯能市阿須運動公園駐車場


  前日の１７時時点の気象庁の天気予報で、埼玉県南部の１３日午前中の降水確率が５０％以上だった場合は活動日を延期します。

  延期の日取りにつきましては、追ってお知らせいたします。


  今回は天候に恵まれますように。

  皆様のご参加、お待ちしております。
