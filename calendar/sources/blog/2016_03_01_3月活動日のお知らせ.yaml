title: 3月活動日のお知らせ
published: '2016-03-01'
body: |-
  3月の活動日は13日(第2日曜日)です。

  先月、延期しました里山道の整備を行います。

  ぬかるみの整備を行う予定ですので、泥に汚れてもかまわない服装、軍手などをご用意ください。


  集合時間/集合場所

  8時00分 飯能市役所駐車場(集合後、阿須運動公園に移動)

  8時30分 飯能市阿須運動公園駐車場


  前日の17時時点の気象庁の天気予報で、埼玉県南部の13日午前中の降水確率が50%以上だった場合は活動日を延期します。

  延期の日取りにつきましては、追ってお知らせいたします。


  今回は天候に恵まれますように。

  皆様のご参加、お待ちしております。
