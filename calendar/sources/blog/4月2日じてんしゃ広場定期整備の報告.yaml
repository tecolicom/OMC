title: 4月2日じてんしゃ広場定期整備の報告
published: '2023-04-03'
body: |-
  4月2日は名栗じてんしゃ広場の定期作業日でした。参加者は4名と少なかったので、下流側パンプトラックのバーム3個の路面を整えました。より曲がりやすくなったのではないでしょうか? 作業へのご参加、ありがとうございました。
  しばらくは好天が続きそうですので、ぜひ遊んでみてください。次回の作業への参加もよろしくお願いいたします。
