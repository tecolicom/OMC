title: ４月活動日
published: '2018-03-31'
body: |-
  奥武蔵の里山は春爛漫。桜と萌黄と杉檜のパッチワークが見事です。4月の活動日は21日(土曜日)。里山道整備活動を行います。 集合時間/集合場所8時00分 飯能市役所駐車場(集合後、阿須運動公園に移動)8時30分 飯能市阿須運動公園駐車場 上記のいずれかにお集まりください。 阿須運動公園に集合し、ミーティング後、MTBで作業箇所に向かいます。里山道の補修などの土木作業を行う予定です。

  泥に汚れてもかまわない服装、長靴、軍手などと、お持ちの方はスコップや手鋸などをご用意ください。 前日の17時時点の気象庁の天気予報で、埼玉県南部の21日午前中の降水確率が50%以上だった場合は活動日を延期します。延期の日取りにつきましては、追ってお知らせいたします。 お力添えのほど、どうぞよろしくお願いいたします。
