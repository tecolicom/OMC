title: 12/18(土) 里山整備活動のご案内
published: '2021-12-15'
body: |-
  飯能市・道路整備活動団体として管理させていただいている里山道の草刈りや水切りの整備を行います。
  軍手などご持参の上、汚れても構わない服装でお集まり12/18(土) 里山整備活動のご案内
  飯能市・道路整備活動団体として管理させていただいている里山道の草刈りや水切りの整備を行います。
  軍手などご持参の上、汚れても構わない服装でお集まりください。 (持ち運び可能なノコギリ、スコップ等、ご自分で使用する道具があればお持ち込みください)
  作業日  /  令和3年18日(土)
  集合時間 / 8時30分 終了時間 / 11時頃
  集合場所  / あいわ広場駐車場(お車の駐車可能です)
  あいわ広場に集合し、ミーティング後、MTBで作業箇所に向かいます。 各自で水分補給やおやつの準備をお願いします。 前日午後5時の気象庁の埼玉県南部の天気予報で、降水確率が50%以上願いします_(._.)_
  集合場所のあいわ広場にお車の駐車可能です。 作業個所まではMTBで移動します。
  【注意事項】
  ●ソーシャルディスタンス、手指の消毒などお気を付けください。
  ●各自で水分補給やおやつの準備をお願いします。
  ●前日午後5時の気象庁発表による埼玉県南部の天気予報で、降水確率が50%以上だった場合は中止いたします。
