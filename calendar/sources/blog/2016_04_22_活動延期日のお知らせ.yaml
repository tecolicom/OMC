title: 活動延期日のお知らせ
published: '2016-04-21'
body: |-
  悪天候により延期となりましたお掃除ツーリングですが、日取りが決まりました。
  ４月３０日（土）にお掃除ツーリングを行います。

  集合時間／集合場所
  ８時００分　飯能市役所駐車場（集合後、阿須運動公園に移動）
  ８時３０分　飯能市阿須運動公園駐車場

  上記のいずれかにお集まりください。


  前日の１７時時点の気象庁の天気予報で、埼玉県南部の３０日午前中の降水確率が５０％以上だった場合は活動日を延期します。

  今回は天気に恵まれることを祈りつつ、皆さまのご参加、お待ちしております。
