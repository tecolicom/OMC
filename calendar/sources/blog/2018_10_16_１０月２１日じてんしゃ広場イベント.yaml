title: １０月２１日じてんしゃ広場イベント
published: '2018-10-16'
body: |-
  10月21日、名栗ふるさと祭りとあわせて、じてんしゃ広場で体験イベントを行います。

  参加費、レンタル代などは無料。
  じてんしゃ広場を楽しむ皆さんの笑顔が参加費です。
  ブルータープさんからレンタルMTBを、インターテックさんからレンタル用ヘルメットをお貸ししていただきました。

  数に限りが在りますが、大人も子どももレンタルMTBでじてんしゃ広場をお楽しみいただけます。

  もちろん、持ち込み自転車でも走れます。
  紅葉の始まりつつある名栗の里山のふもと、楽しい秋の一日をお過ごしください。
  でこぼこ道も楽しいよ。
  日時:2018年10月21日、9時30分から15時
  場所:飯能市名栗ふれあい公園内じてんしゃ広場(クリックで地図が開きます)
  長袖・長ズボン・スニーカーといった服装を推奨いたします。
  転んで怪我することを防ぐ意味に加えて、秋はダニが卵から孵るシーズン。
  虫刺されを防ぐ意味でも、秋の野山では肌を出さない服装をお勧めします。
  前日の17時時点の気象庁の天気予報で、埼玉県南部の21日午前中の降水確率が50%以上だった場合は中止とさせて頂きます。
  問合せ:奥武蔵MTB友の会(okumusashi.mtb@gmail.com)
  電 話:042-974-4490
