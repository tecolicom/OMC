title: 12月14日(土)の里山整備活動＆ライドの報告
published: '2024-12-19'
body: |-
  12月の活動はディグ&ライドという事で、前半は里山道の整備(ディグ)をして、昼食後に活動地域でのMTBライドを楽しみました。
  18名の会員が集まったことで、4班に分かれて広範囲を巡ることが出来ました。

  ナラ枯れの影響で強風が吹いた後はいたるところで太めの枝が落下しているのでその撤去や、日当たりの良い場所の生い茂った雑草の刈り取りを行うなど、各班ごとにそのルートに必要な作業を行いました。
  また、倒木は5か所で発生しており、2か所は撤去出来ましたが、3か所は次回以降に持ち越しました。
  次回、2025年1月の活動は19日(日)に行います。
  みなさまのご協力をお待ちしています。
