title: 2022年も大変お世話になりました。
published: '2022-12-31'
body: |-
  この一年も奧武蔵マウンテンバイク友の会の活動へのご理解とご協力ありがとうございました!!


  これからもマウンテンバイクがこの地域で楽しみ続けられるよう様々な活動に取り組んで参ります。

  一層のご協力をお願いいたします。 〜ご注意〜
  この年末年始に里山ライドをお楽しみにされている方もいらっしゃるかと思いますが、注意喚起をさせていただきます。何を意図しての行為か不明ですが、里山道に張り出した木の根に、飛び出す形で5cm程の釘が刺さっている事が2ヶ所で確認されました。見つけた物は撤去し、周辺にも残っていないか見回りましたが、まだ見落とした物が無いとも限りませんので通行の際はご注意ください。地権者の方達と共に現場の確認を行い、警察署と行政にも相談しております。
