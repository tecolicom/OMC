title: 子どもマウンテンバイク教室の延期について
published: '2017-10-14'
body: |-
  ここしばらく降り続いている少し遅めの秋の長雨。
  奥武蔵の里山は秋霖にけぶり、じてんしゃ広場の楽しみは柔らかいぬかるみの中、休んでいることでしょう。

  10月15日の予定でした子どもたちとの自転車遊び、残念ながら下記の日取りに延期いたします。


  日 時:11月23日(木祝) 8時30分〜11時30分
  会 場:飯能市岩沢名栗ふれあい公園じてんしゃ広場
  レストラン ターニップの向かい、小殿公衆トイレのあたりに駐車場の案内を出します。
  駐車は小殿公衆トイレ上流側未舗装駐車場または飯能市役所名栗庁舎駐車場をご利用くださ

      い。
  費 用:無料
  持ち物:自転車(補助輪付きは不可)、 動きやすい服装(長袖長ズボン推奨)、スニーカー、
  お持ちの方はヘルメット (数に限りがありますがヘルメットのレンタルあります。)
  対 象:小学生
  前日の17時時点の気象庁の天気予報で、埼玉県南部の23日午前中の降水確率が50%以上だった場合は中止とさせて頂きます。
  問:奥武蔵MTB友の会(okumusashimtb@gmail.com)Tel:042-974-4490
