title: 『トーベ・ヤンソン（ムーミンの作者）あけぼの子どもの森公園』につながる阿須山中の自然を未来の子どもたちに残したい ― メガソーラーを中止にしてください
  ―』
published: '2020-03-21'
body: |-
  私たち「奥武蔵マウンテンバイク友の会」が保全活動をしている加治丘陵・阿須里山(通称7トレ)にメガソーラーとサッカー場建設の計画が持ち上がっています。

  この里山は貴重な生態系を持つため多くの地元民や子ども達の貴重な遊びの場/学びの場となっており、また首都圏からアクセスも良いので多くのマウンテンバイカーが利用する大切なエリアです。

  阿須里山とアウトドア、マウンテンバイクを愛するわたし達に出来る事として、今回この「加治丘陵の自然を考える会・飯能」さんのキャンペーンに賛同し、協力する事となりました。ぜひ署名とシェアにご協力ください。

  「奥武蔵マウンテンバイク友の会」世話人一同

  署名はこちらのサイトから

  http://chng.it/vNNWRhh7X8
