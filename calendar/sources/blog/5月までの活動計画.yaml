title: 5月までの活動計画
published: '2023-02-02'
body: 会員のみなさま、こんにちは。いつも活動へのご協力ありがとうございます。年度途中から入会された会員さんも増えてきましたので、総会資料の2022年度活動計画から今後の分を転載しておきます。ご活用ください。追加や変更がある場合は、決まり次第お知らせいたします。2/5
  (日) 名栗整備2/18(土) 里山整備3/19(日) 里山整備3/26(日) 子どもじてんしゃ教室4/2 (日) 名栗整備4/16(日) 里山整備5/21(日)
  里山整備
