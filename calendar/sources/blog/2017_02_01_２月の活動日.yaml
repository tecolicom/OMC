title: ２月の活動日
published: '2017-02-01'
body: |-
  2月の活動は26日(日)、いつもの里山道の整備を行います。

  予定している内容は、ぬかるみ箇所の改善作業です。

  泥に汚れてもかまわない服装、長靴、軍手などと、お持ちの方はスコップや手鋸などをご用意ください。

  集合時間/集合場所

  8時00分 飯能市役所駐車場(集合後、阿須運動公園に移動)

  8時30分 飯能市阿須運動公園駐車場

  前日の17時時点の気象庁の天気予報で、埼玉県南部の26日午前中の降水確率が50%以上だった場合は活動日を延期します。延期の日取りにつきましては、追ってお知らせいたします。

  お天気に恵まれることを祈りつつ、皆さまのご参加、お待ちしておりまーす。
