title: 12/10子ども自転車教室を開催しました
published: '2023-12-13'
body: |-
  12月10日(日)は、この時期にしては暖かい晴天のもと、子ども自転車教室を行いました。総勢18名の未就学児・小学生が参加し、大賑わいとなりました。

  人数が多かったため、キックバイクの未就学児8名、でこぼこ道に不慣れな小学生3名、オフロード走行に慣れている小学生7名の3グループに分け、教師役の当会会員が2名ずつで対応しました。

  未就学児のグループは、遊びを取り入れながら、自転車広場のでこぼこ道で乗り方を学びました。小学生3名のグループは、初めてでこぼこ道を走る子だけでなく、過去の自転車教室への参加経験がある子もいて、楽しんでもらえました。パンプトラック特有の自転車の操作方法をだいぶ掴めたのではないでしょうか。小学生7名のグループは、ペダルを漕がずにパンプトラックを回るという目標を全員が早々と達成。個別にさらなる上達を目指し、指導しました。残りの時間に木製の移動式ランプを使い、レイアウトを変えながらゲーム感覚でレベルアップを目指しました。

  2時間程度の開催でしたが、自転車広場には終始笑い声が聞こえてきました。たっぷり楽しんでもらえたら幸いです。

  次回の開催は4月を予定しています。なお、今後の参加対象者は「補助輪なしの自転車を自力で漕げる小学6年生までの子ども」となります。キックバイクに乗る未就学児も来園していただけますが、当日は多数の参加者が自転車で走り回っていますので、保護者は常にお子さんから目を離さず、接触事故が起こらぬよう徹底をお願いします。
