title: 【5月21日 里山清掃活動のお誘い】
published: '2023-05-15'
body: |-
  5月21日は飯能市の市民清掃デーです。地元自治会の皆様の里山清掃作業に奥武蔵マウンテンバイク友の会もご一緒させていただきます。前回に引き続き、岩渕自治会と阿須自治会の皆さんともに活動いたします。我々が日々楽しませていただいているトレイルの入り口にお住いの皆さんとの協働作業になります。是非ご一緒ください!主な作業内容は草刈りと水切りの清掃になります。草刈り鎌や枝切りバサミ、スコップがありましたらご持参ください。現地まではトレーラーでお運びいたします。活動場所が複数になるため、より多くのご協力をお心からお待ちいたしております。【集合場所】■集合場所:あいわ広場(お車の駐車が可能です)■集合日時:5月21日(日曜日) 8:00
  作業場所まではMTBで移動します。
  ●各自で水分補給やおやつの準備をお願いします。●前日午後5時の気象庁発表による埼玉県南部の天気予報で、降水確率が50%以上だった場合は作業を中止といたします。

  よろしくお願いします_(._.)_
