title: 第４回総会
published: '2017-06-19'
body: |-
  至る６月１８日(日)に平成２９年度総会を開催いたしました。

  ご参加くださった皆さま、朝早くからお付き合いいただきありがとうございました。

  おかげさまで平成２９年度の活動案、予算案ともに承認を得ることが出来ました。

  活動をはじめて3年、これまで毎月欠かすことなく続けてきたことが実を結び、より活動の幅を広げることが出来た２８年度になりました。

  これまで活動にご協力くださったすべての皆様に感謝いたします。

  ２９年度はこれまでの整備活動の場に加え、新たに「じてんしゃ広場」というパンプトラックを飯能市に提案し、設計、製作からメンテナンスまでを担わせていただくこととなりました。公共の場でMTBを思いっきり楽しめる公園の誕生です！
  総会終了後は飯能消防署稲荷分署の救急救命士の方たちのご協力の下『心肺蘇生法』と、マウンテンバイカー向けにアレンジしてくださった『山での怪我の対処法』の講習をいたしました。

  「怪我しないように遊びたい」と、誰もが思っていますがアクシデントは不意に起こります。

  いざという時のため、自分のため仲間のためにも身に付けておきたいと世話人のみんなで話し合い、稲荷分署様に相談し開催実現に至りました。

  丁寧なご対応をいただき感謝です！

  これからも会員皆さまからの変わらぬご協力をいただけるよう、世話人一同尽力していきます。

  今年度も引き続きよろしくお願いいたします。
