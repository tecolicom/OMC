title: 11/20 里山整備活動の報告
published: '2022-11-21'
body: OMC会員のみんなと共に里山道の整備を行ってきました。ご参加の皆さん、お疲れ様でした❗️2組に分かれてそれぞれの場所にMTBで移動し、堆積物で機能不全になってた排水路の清掃と、舗装路に徐々に流れ出て堆積している土砂の撤去を行いました。どちらの箇所も里山道の出口でしたので、ワイワイとおしゃべりしながら作業を行なっていたところ、近所にお住まいの方が見に来られて我々の活動に感謝の言葉をいただきました。参加してくれた小学生の2人はこの春から里山道でMTB遊びを始めた兄弟で、同時期からOMCの活動にも積極的に参加してくれています。父上が都合が悪くても来てくれています。いつもありがとう!また別の参加者の方は2年ぶりに休日の都合がついて参加してくれました。「普段から親しんでいる里山道がOMCのボランティア活動による作業で整備されていることを知りつつも、なかなか作業に参加できなので申し訳ないと思っている」とおっしゃっていただきました。作業に来られないことを申し訳ないと思わせてしまうことは、こちらとしても申し訳ないのですが、どうぞお気になさらずに。参加してくれたこととても嬉しく思います。会員登録してくれ
