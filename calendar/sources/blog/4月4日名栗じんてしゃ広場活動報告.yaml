title: 4月4日名栗じんてしゃ広場活動報告
published: '2021-04-05'
body: |-
  桜も葉桜になりかけた名栗じてんしゃ広場に活動を心まちにしていた、沢山の子供達やライダーやワンちゃんが集まりました。
  ありがとうございます。
  今回の活動では手前側コースのコブのレイアウトの変更を行いました。
  まずはツルハシ部隊がパンプを壊して、アメスコ部隊が土を動かし、レーキでパンプを整えて、再びアメスコ部隊が転圧しより加速しやすいコースレイアウトに変更しました。
  2時間くらい作業をして、皆んなでライドし、楽しみながらタイヤで転圧し固めました。
  どんどん楽しいじんてしゃ広場になってきています。
  活動に参加して頂いた皆さんありがとうございます。
  次回は6月6日の予定です。
  会員の皆さんお力添えよろしくお願い申し上げます。
