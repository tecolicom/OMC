title: 第6回 奥武蔵マウンテンバイク友の会 総会開催のお知らせ
published: '2019-06-14'
body: |2-
    先日もお知らせいたしましたが、今週末(6/16(日))は総会を開催します。

  会員の皆さまと共にこれまでの活動を振り返り、この先の活動について考えていきたいと思います。

  前半は総会資料を基に進め、後半は話し合いの時間が持てたらと思います。


  会場:加治東公民館 (阿須運動公園から入間川を渡った対岸です)  時間:9:00~12:00 そしてこのたび奥武蔵マウンテンバイク友の会のステッカーを制作しました。作業道具やバイクにお貼りいただけたらと思います。今回の総会受付時や活動にご参加くださった際にお渡しいたします。

  各世話人にお声掛け下さい。 また、ご参加の都合がつかない方で2019年度も会員を継続していただける方は年会費のお振込みをお願いします。


  年会費:2000円

  振込先:飯能信用金庫 飯能中央支店 普通 2086565

  奥武蔵マウンテンバイク友の会   *今後、会費のお支払いは総会、もしくは銀行振込のみとなりショップでのお支払いはできなくなります。ご了承ください_(._.)_
