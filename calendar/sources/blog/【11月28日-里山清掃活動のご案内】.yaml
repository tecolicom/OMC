title: 【11月28日 里山清掃活動のご案内】
published: '2021-11-21'
body: |-
  11月28日は飯能市の市民清掃デーです。地元自治会の皆様の里山清掃作業に奥武蔵マウンテンバイク友の会もご一緒させていただきます。
  今回は今までもご一緒してきた岩渕自治会に加え、新たに阿須自治会の皆さんとも一緒に活動できることになりました。我々が日々楽しませていただいているトレイルの入り口にお住いの皆さんとの協働作業になります。■阿須自治会の皆さんは作業開始時間が早いため、あいわ広場への集合時間を7:30とさせていただきます。主な作業内容は草刈りになる予定です。草刈り鎌をお持ちの方はご持参いただけたらと思います。近隣にお住いで、早起きが得意な方は是非7:30にお集まりいただけたらと思います。■岩渕自治会の作業へご参加いただける方は通常通り8:30にあいわ広場にご集合ください。こちらの主な作業は水切りの清掃などになります。お手持ちのスコップがありましたらご持参ください。現地まではトレーラーでお運びいたします。活動場所が複数になるため、より多くのご協力をお心からお待ちいたしております。【集合場所は共通です】■集合場所:あいわ広場(お車の駐車が可能です)■集合日時:11月28日(日曜日)午前7
