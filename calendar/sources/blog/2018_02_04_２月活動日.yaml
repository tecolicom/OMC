title: ２月活動日
published: '2018-02-04'
body: 今月の活動日は2月18日(日)。先月に引き続き、今月もじてんしゃ広場の造成作業を行います。 集合日時・集合場所2月18日、9時00分 名栗ふれあい公園内じてんしゃ広場。お車は小殿公衆トイレ先(上流側)の未舗装駐車場または飯能市役所名栗庁舎駐車場にお停めください。(*公衆トイレ手前の舗装駐車場は公園関連施設ではないので、駐車はご遠慮ください。)
  泥に汚れてもかまわない服装、長靴、軍手などと、お持ちの方はスコップなどをご用意ください。 前日の17時時点の気象庁の天気予報で、埼玉県南部の18日午前中の降水確率が50%以上だった場合は活動日を延期します。延期の日取りにつきましては、追ってお知らせいたします。
  いよいよ完成のときが近づいてきたじてんしゃ広場。皆さまの力の結晶に、子どもも大人も笑顔が輝くことでしょう。お日様に恵まれることを祈りつつ、皆さまのご参加、お待ちしておりまーす。
