title: ４月の活動日
published: '2016-04-06'
body: |-
  冬が明け、奥武蔵の里山は春爛漫となりました。
  今月の活動日は4月17日(日曜日)。
  活動内容はお掃除ツーリングです。
  集合時間/集合場所
  8時00分 飯能市役所駐車場(集合後、阿須運動公園に移動)
  8時30分 飯能市阿須運動公園駐車場
  上記のいずれかにお集まりください。
  阿須運動公園に集合し、ミーティング後、トレイルのゴミ拾いなどをしつつツーリングします。
  トレイルの痛みの激しい場所のチェックも行い、メンテナンスが必要な箇所は、ハイキング道の管理を行っている加治美杉台まちづくり推進委員会に報告します。
  11時頃に再集合し、各班の集めたゴミを回収し、解散となります。(集めたゴミは車で飯能市クリーンセンターに持ち込みます)。
  前日の17時時点の気象庁の天気予報で、埼玉県南部の18日午前中の降水確率が50%以上だった場合は活動日を延期します。
  延期の日取りにつきましては、追ってお知らせいたします。
  春の里山、満喫しましょう。
