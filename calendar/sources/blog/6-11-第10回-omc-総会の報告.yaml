title: 6/11 第10回 OMC 総会の報告
published: '2023-06-12'
body: |-
  奧武蔵マウンテンバイク友の会の第10回目の総会を22名の参加で行いました。
  今回は3年ぶりとなる対面形式での開催で、飯能日高消防署・稲荷分署のご協力のもと救命救急講習と山での怪我人の搬送方法などのレクチャーを受けさせていただきました。
  総会では昨年度の活動報告と会計報告、世話人の承認、今年度の活動予定と予算案を説明しご理解とご承認をいただき終了しました。
  11年目となる今年度も引き続きご協力のほどよろしくお願いします。
