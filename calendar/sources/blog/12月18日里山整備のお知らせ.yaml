title: 12月18日（日）里山整備のお知らせ
published: '2022-12-14'
body: "冬本番、トレイルは落ち葉のカサカサで寒いけど楽しいライドですね。\nさて告知が直前になってしまいましたが、日曜日は里山整備となっております。\n水切りなど、道の維持整備活動を行いたいと思います。\n\
  日にち:  12月18日 \n集合場所:  あいわ広場\n集合時間:8時30分\nアメスコ、バチズル、など会の方である程度はご用意いたします。\n前日 17時、気象庁の埼玉南部地域の降水確率が50%以上の場所は中止とさせて頂きますのでよろしくお願いします。"
