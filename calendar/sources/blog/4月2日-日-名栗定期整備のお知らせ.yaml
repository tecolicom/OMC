title: 4月2日(日) 名栗定期整備のお知らせ
published: '2023-03-18'
body: 4月2日は名栗じてんしゃ広場の定期整備を行います。名栗じてんしゃ広場に午前9時にお集まりください。11時頃まで作業を行う予定です。翌日19日の臨時整備、翌週26日の子ども自転車教室と、活動が3週連続となりますが、ご都合よろしければご参加ください。なお、前日17時の気象庁発表による埼玉県南部の天気予報で、当日6時〜12時の降水確率が50%以上だった場合は中止といたしますのでご了承ください。
