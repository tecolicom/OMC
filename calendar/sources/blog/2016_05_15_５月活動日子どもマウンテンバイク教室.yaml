title: ５月活動日(子どもマウンテンバイク教室)
published: '2016-05-15'
body: |2-
   5月の活動日は5月22日。

  子どもMTB体験教室を行います。

  土の広場で自転車遊び。自転車好きのお子さまたち、いつもの乗りなれた自転車で気軽に遊びにきてください。でこぼこ道も楽しいよ。 日時:5月22日 8時30分〜11時会場:飯能市岩沢運動公園多目的広場費用:無料持ち物:自転車(補助輪付き、ストライダーは不可)、    動きやすい服装(長袖長ズボン推奨)、スニーカー、    お持ちの方はヘルメット    (数に限りがありますがヘルメットのレンタルあります。)対象:小学生 前日の17時時点の気象庁の天気予報で、埼玉県南部の22日午前中の降水確率が50%以上だった場合は中止とさせて頂きます。 主催:加治美杉台まちづくり推進委員会問:奥武蔵MTB友の会(okumusashimtb@gmail.com)Tel:042-974-4490
