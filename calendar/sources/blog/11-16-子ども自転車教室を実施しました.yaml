title: 11/16 子ども自転車教室を実施しました
published: '2025-11-23'
body: |-
  11月16日は紅葉が進む中、子ども自転車教室を開催しました。集まった子どもたちは8名。年齢や経験に基づき、3班に分けました。最年少グループは名栗じてんしゃ広場の内外をぐるぐる走るツーリングへ。凸凹道をたくさん走れましたね。
  中学年グループはパンプトラックを走り、オフロード走行を楽しみながら操作の基本を学びました。
  高学年グループはパンプトラックの走りがバッチリだったので、ジャンプやトリックにチャレンジ。新たな技を習得できましたね。
  次回の子ども自転車教室は4月中旬を予定しています。お楽しみに! また、次回の活動は11月30日(日)、飯能市の市民清掃デーとなります。皆さんのご参加お待ちしています。
