title: 5/18飯能市里山清掃活動のお知らせ
published: '2025-05-08'
body: |-
  5月18日(日)は飯能市の市民清掃デーです。
  地元自治会の皆様の里山清掃作業に奥武蔵マウンテンバイク友の会もご一緒させていただきます。
  我々マウンテンバイカーが日々楽しませていただいているトレイルの入り口にお住いの皆さんとの協働作業です。
  是非ご一緒ください。
  ■阿須自治会の皆さんは作業開始時間が早いため、阿須自治会の作業へご参加いただける方は7:30にあいわ広場にご集合ください。
  主な作業は草刈りの予定です。草刈り鎌をお持ちの方はご持参ください。
  近隣にお住いで、早起きが得意な方は是非7:30にお集まりいただけたらと思います。
  ■岩渕自治会の作業へご参加いただける方は8:30にあいわ広場にご集合ください。
  主な作業は水切りの清掃などの予定です。スコップをお持ちの方はご持参ください。現地までお運びいたします。
  活動場所が複数になるため、より多くのご協力をお待ちしております。
  【集合場所は共通です】
  ■集合場所:あいわ広場(お車の駐車が可能です)
  ■集合日時:5月18日(日) 7:30 または 8:30
  作業場所まではMTBで移動します。
  ●各自で水分補給やおやつの準備をお願いします。
  ●前日17時の気象庁発表による埼玉県南部の天気予報で、当日6時~12時の降水確率が50%以上の場合は作業を中止といたします。
  ご協力よろしくお願いいたします。
