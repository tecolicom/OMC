    title: ４月８日じてんしゃ広場体験会
    published: '2018-03-31'
    body: ' 4月8日(日)、第3回なぐりブラさんぽの共催イベントとして「じてんしゃ広場体験会」を行います。午前9時から午後3時の間、レンタルMTBを子供用と大人用、それぞれ数台用意してお待ちしております。もちろんご自身のMTBでお楽しみいただくことも可能です。
      お車でお越しの方は、上の地図の県道53号線を北進し、「ブラさんぽ」本部を通過してすぐに左折いただくと名栗ふれあい公園内に入ることができます(公園内へのお車の乗り入れは4月8日のみ可能です)。
      じてんしゃ広場の対岸にある桜並木はちょうど見頃の時期でしょう。花咲く春のじてんしゃ広場、どうぞお楽しみください。'
