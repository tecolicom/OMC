    title: 子どもマウンテンバイク教室（3月18日）
    published: '2018-02-04'
    body: 2018年3月18日(日曜日)、名栗ふれあい公園じてんしゃ広場にて、子どもマウンテンバイク教室を行います。 じてんしゃ広場は、市民活動支援事業として飯能市の支援のもと、子どもも大人も一緒になって自転車遊びを楽しめる広場を目指して、有志が手作業で作り上げた広場です。
      桜のつぼみもふくらんだ、気持ちの良い早春の里山の懐で、自転車遊びを楽しみましょう。うねった土の凸凹道も楽しいよ。自転車好きのお子さまたち、いつもの乗りなれた自転車で気軽に遊びにきてください。  日
      時:3月18日 8時30分〜11時30分会 場:飯能市名栗ふれあい公園じてんしゃ広場(←クリックで地図が開きます)    レストラン ターニップの向かい、小殿公衆トイレのあたりに駐車場の案内を出します。    駐車は飯能市役所名栗庁舎駐車場をご利用ください費
      用:無料持ち物:自転車(補助輪付きは不可)、    動きやすい服装(長袖長ズボン推奨)、スニーカー、    お持ちの方はヘルメット    (数に限りがありますがヘルメットのレンタルあります。)対
      象:小学生  前日の17時時点の気象庁の天気予報で、埼玉県南部の18日午前中の降
