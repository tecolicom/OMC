    title: 4月7日名栗じてんしゃ広場定例整備
    published: '2019-03-26'
    body: |-
      こちら翔んで埼玉でも各地で桜の便りが聞こえる今日この頃、会員の皆さんいかがお過ごしでしょうか。
      偶数月第1日曜日は名栗じてんしゃ広場の定例整備です。
      翌週にじてんしゃ広場にてキッズスクールを開催しますので、子供達に安全に乗って貰える様整備したいと思います。
      いつもの様に2時間整備して後はライド楽しみたいと思います。
      会員の皆さんのお力添え宜しくお願いします。

      日時      4月7日(日曜日)9時より
      場所      名栗じてんしゃ広場

      土曜日の午後5時の予報で降水確率50%以上の場合は中止とさせて頂きます。
