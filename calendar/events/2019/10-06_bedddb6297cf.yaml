    title: 10月6日名栗じてんしゃ広場定期整備（入会体験）のお知らせ
    published: '2019-09-13'
    body: |-
      猛暑続きだった夏から秋に季節は変わりやっと心地よい気温となってきました。そろそろシーズンオフを迎えるゲレンデライドを楽しまれてる所でしょうか。
      さて偶数月第1日曜日の10月6日、名栗じてんしゃ広場の定期整備を行います。草刈り、路面の整備などを予定しています。2時間位行い後は皆さんとパンプライド楽しみましょう！

      会員の皆さんお力添えよろしくお願いします。

      尚今回の名栗じてんしゃ広場の整備は奥武蔵マウンテンバイク友の会を知ってもらうため、誰でも参加できる体験会となっています。 是非入会を考えてる方もマウンテンバイクをはじめたばかりの方も活動を体験してパンプライドも体験してもらえれば幸いです。

      日時 10月6日

      時間 9時より

      場所 名栗じてんしゃ広場

      ※前日(土曜日)17時の埼玉県南部の予報で降水確率が50%以上の場合は中止となります。よろしくお願い申し上げます。
