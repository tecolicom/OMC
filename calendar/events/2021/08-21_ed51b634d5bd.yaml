    body: |-
      8/21(土)に予定していた里山整備活動ですが、埼玉県全域に緊急事態宣言が発令中であるため中止とさせていただきます。
      皆様におかれましてもコロナ対策万全にお過ごしいただき、宣言が解除された後にはまたご協力いただけたらと思います。

      よろしくお願いします。
