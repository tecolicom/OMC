    title: 12月5日名栗じてんしゃ広場ライドディ
    published: '2021-11-24'
    body: いつも名栗定期整備のご協力ありがとうございます。今年最後の名栗定期整備はライドディといたしまして整備はなしで忘年ライドと称し皆さまとライドを楽しみたいと思います。プチライド講習やタイムトライアルなどを予定してます。プチライド講習ではライテクの疑問をじてんしゃ佳の竹田店長に一問一答をお願いしたいと思います。皆さん質問考えてきてくださいね。今年最後の名栗での活動皆さんのご参加お待ちしております。日時:12月5日
      9時より場所:名栗じてんしゃ広場前日気象庁17時、埼玉県南部の降水確率が50%場合は中止とさせて頂きます。
