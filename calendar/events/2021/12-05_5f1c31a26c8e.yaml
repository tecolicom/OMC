    title: 12月5日名栗じてんしゃ広場ライドディ
    published: '2021-12-06'
    body: 名栗じてんしゃ広場の今シーズン最後の活動は忘年ライドと称し、コース整備などは行わず、ひたすらライドにおしゃべりに楽しく過ごさせて頂きました。1年間名栗じてんしゃ広場の整備にお力添えありがとうございました。お陰様で、一般のライダーも沢山ライドに来てくださってて、地域に根付いたて来たと感じる1日でした。来年もじてんしゃ広場の整備を行い、多くの方々に安全にパンプをライドして貰いそして名栗地域の自然に触れ合って頂けたらと思います。来年も名栗じてんしゃ広場への活動参加よろしくお願い申し上げます。
    images:
    - https://static.wixstatic.com/media/c3395c_d0de509d786244cfa279c5508dffb918~mv2.png
