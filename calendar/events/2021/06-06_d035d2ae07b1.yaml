    title: 6月6日名栗じてんしゃ広場定期整備のお知らせ
    published: '2021-05-24'
    body: 雨が多い数日です。なかなかトレイルライドができにくい週末でしたね。さて6月6日は名栗定期整備となっています。ここの所の雨で雑草が元気に育ってパンプに押し迫っていると思います。草刈りに雨で流れた路面整備を行いたいと思います。2時間くらい整備して、後は皆さんで楽しくパンプはしりましょう。会員さん皆さんのお力添えよろしくお願い申し上げます。日時   6月6日
      9時より場所   名栗じてんしゃ広場なお前日土曜日、17時の気象庁の埼玉県南部の降水確率が50%以上の場合は中止となりますのでよろしくお願い申し上げます。
