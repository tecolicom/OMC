    title: 6月6日名栗じてんしゃ広場定期作業
    published: '2021-06-06'
    body: 本日の名栗の定期作業日では、じてんしゃ広場全体の草刈り、コースアウトにより削れて低くなっていたバームとコブの補修、そして流れが悪くなっていたコブの形状見直しを16名で行いました。2時間ほどの作業で、草に埋もれていたコースが顔を出し、より安全に走行を楽しめるようになりました。たくさんの方に利用していただいていることもあり、現在の路面はとてもスムーズです。梅雨時期は天気を予想しにくいかもしれませんが、路面が滑りやすくなる雨の直後を避け、晴れが数日続いたあとにライドをお楽しみください。また、隣の川で体を冷やすのにも絶好の季節です。次回の名栗作業は8月を予定しています。
