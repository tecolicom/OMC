    title: 11月20日（土）里山整備作業
    published: '2021-11-15'
    body: 鳩山町熊井にて熊井自治会・はとやま環境フォーラムと合同で谷津田の刈払いを行います。当日集合場所は坂戸市北浅羽桜堤公園駐車場8:15集合。(お車の方はこちらにお願いします。)道具は数台にまとめて運びます。場所を知ってらっしゃる方で自身のMTBで行かれるのでしたら現地9時集合になります。降水確率50%以上で中止とさせていただきます。刈払い機の方は谷津田の刈払いを中心に手伝っていただきます。刈払機は、取扱作業者安全衛生教育を受講済で、刈払機をご用意いただける方のみ使用可とさせていただきます。その他の方は熊井のトレイルの掃除・簡単な刈り払い・倒木の撤去を行いますので、手鋸・剪定ばさみ等をお持ちください。当日は御協力よろしくお願いいたします。
