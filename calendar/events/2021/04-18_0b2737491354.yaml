    body: |-
      告知が遅くなりましたが、緊急事態宣言も明け、一年以上ぶりの開催です。
      ふるってご参加ください。

      日時：4月18日(日)9時〜11時30分
      場所：名栗ふれあい公園内じてんしゃ広場
      費用：無料
      定員：20人
      持ち物：自転車、動きやすい服装、ヘルメット
      ※一般的な子ども用自転車で可。補助輪つきは不可。
      ※貸し出し用ヘルメット準備あり(数量限定)。
      申し込み：下記フォームでお申し込みください。
      https://okumusashimtb.wixsite.com/omcweb/form-kidsschool
  - kind: other
