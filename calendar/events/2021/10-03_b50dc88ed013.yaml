    title: 10月3日名栗じてんしゃ広場定期整備
    published: '2021-09-20'
    body: |-
      ここ1ヶ月の天候不順でライドもままならず、緊急事態宣言も重なり、ライダーの皆さんはヤキモキした日々だったのではないしでしょうか。
      10月3日は名栗じてんしゃ広場の定期となっております。
      緊急事態宣言もあける予定ですので、久々にライダー仲間で顔を合わせ、整備にライドにおしゃべりに楽しめればと思います。
      元気に育った雑草や雨で痛んだパンプの面の整備に今回ももりだくさんな整備となりそうです。
      会員の皆さんのお力添えよろしくお願い申し上げます。

      　　　日時　10月3日 9時より
      　　　場所　名栗じてんしゃ広場

      尚、前日土曜日、午後5時の気象庁の埼玉県南部の天気予報で、降水確率が５０％以上だった場合は中止とさせて頂きますのでよろしくお願い申し上げます。
  - kind: other
    url: https://okumusashimtb.wixsite.com/omcweb/post/10-3-日-の名栗じてんしゃ広場の定期整備作業にご参加くださる皆様へ
    title: 10/3(日)の名栗じてんしゃ広場の定期整備作業にご参加くださる皆様へ
    published: '2021-10-01'
    body: |-
      10/3(日)の名栗じてんしゃ広場の定期整備作業にお車でお越しの方は名栗庁舎前の駐車場をご利用ください。

      緊急事態宣言は解除とはなりましたが、段階的な緩和措置といたしまして名栗じてんしゃ広場の駐車場の開放は10/6(水)からになります。
      みなさまのご参加よろしくお願いします。
