    title: 【３月１５日（日）里山清掃のお知らせ】
    published: '2020-03-10'
    body: |-
      いつもの里山にて清掃を行います。
      今回の活動は2月の活動の続きで、消火用として設置されて経年劣化によって役目を終えたポリタンクの回収を行います。
      軍手などご持参の上、汚れても構わない服装でお集まりください。
      集合時間／集合場所
      令和２年３月１５日（日）
      ８時００分 飯能市役所駐車場
      ８時３０分 飯能市阿須運動公園駐車場
      阿須運動公園に集合し、ミーティング後、MTBで作業箇所に向かいます。
      各自で水分補給やおやつの準備をお願いします。
      前日午後5時の気象庁の埼玉県南部の天気予報で、降水確率が５０％以上だった場合は中止いたします。
      皆様ご協力をお願いします_(._.)_
