    title: 4月19日子どもじてんしゃ教室中止の件
    published: '2020-04-05'
    body: |-
      4月19日名栗じてんしゃ広場で開催予定でした、子どもじてんしゃ教室ですが、県並びに飯能市において、イベントや施設の休止をしています。
      現在の状況なども鑑み、大変残念ではありますが、今回の子どもじてんしゃ教室は中止とさせて頂きます。
      折角楽しみにして頂いてた所誠に申し訳ございません。
      秋に子どもじてんしゃ教室を予定しております。
      是非次回にご参加していただけますようよろしくお願いします。
