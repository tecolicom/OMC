    url: https://okumusashimtb.wixsite.com/omcweb/post/12月6日名栗じてんしゃ広場定期整備
    title: 12月6日名栗じてんしゃ広場定期整備
    published: '2020-12-07'
    body: 今季最後の名栗じてんしゃ広場の定期整備に参加ありがとうございます。本日はジャンプレーンの整備を会員の皆さんと行いました。整備前にアメスコの使い方、面の整備の仕方、土の練り方などを、ベテランの経験者より、プチ講習会を行い各セクションごとに別れて整備を行いました。レクチャーの甲斐もあり皆さん綺麗に面の整備を行えたようでした。面の整備も大事ですが、ベテランの経験者が会員の皆さんに1番知って欲しかったのは何処のコースにも管理者がいて、そちらの管理者がコースの設定や面の整備を行っております。他団体やローカルコースなど整備に参加する場合は管理者の意図を理解して面の整備などを行って欲しいと言う事でした。当会でも現在鳩山にトレイルコースの整備が始まっています。コースの設定でライダーのスピードをコントロールし安全性を考えてコース作りをしているそうです。ついよこしまな自分はジャンプレーンなどを作りたくなりますが、本日の話しを聞いて、きちんと管理者の意図を理解し整備を行いたいと思った次第です。本日のレクチャーは今後の鳩山のコース作りにも生かされる事と思いました。今回参加出来なかったら会員の皆さんもお声かけし
