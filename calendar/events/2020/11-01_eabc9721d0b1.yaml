    title: 11月1日（日）日高市の活動のお知らせ
    published: '2020-10-17'
    body: |-
      会員のみなさん、こんにちは。11月1日（日）は初の日高市での作業日となります。山道へと続く市道の清掃活動を行ないます。ぜひ、ご参加ください。
      【日時】11月1日（日）8:30～12:00
      【集合場所】セブンイレブン日高高麗本郷店
      【雨の場合】前日の19時までにFacebookの会員ページにて開催の可否をお知らせします。
      【持ち物】特になし
      集合場所から活動場所までは自転車で移動します。お車でお越しの方は、巾着田有料駐車場（500円）や西武秩父線高麗駅周辺のコインパーキングをご利用ください。セブンイレブンには買い物以外の駐車はできません。
  - kind: other
    url: https://okumusashimtb.wixsite.com/omcweb/post/11-月1日-日高市美化活動
    title: 11 月1日 日高市美化活動
    published: '2020-11-02'
    body: |-
      　今年度より日高市の道路美化団体に 登録させていただき、上半期はコロナ感染予防のため活動は自粛しておりましたが、１１月１日気持ちのいい秋晴れのなか初の活動を行いました。
      活動には８名の会員の方に参加いただき、ゴミ拾い、除草、倒木の撤去を行いました。
      思いのほか空き缶や太い倒木が多く、予定していた半分の工程で本日の活動は終了としました。
      年度内までにあと数回、実施予定ですので、ぜひご参加ください。
