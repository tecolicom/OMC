    title: 8/2名栗定期作業のお知らせ
    published: '2026-07-14'
    body: |-
      8月2日（日）は名栗じてんしゃ広場の定期整備を行います。草刈りをメインに行いつつ、荒れた路面を補修します。同広場に午前9時にお集まりください。11時頃まで作業を行う予定です。

      なお、前日午後5時の気象庁発表による埼玉県南部の天気予報で降水確率が50％以上の場合は中止といたしますのでご了承ください。
