    body: 飯能市道路美化活動団体として整備を行っている里山道で活動を行います。主には落枝等を片付けながら活動エリア全体の里山道を見回ります。みなさまのご参加をお待ちしております。■集合日時:2月15日(日)8:30■集合場所:あいわ広場(お車の駐車が可能です)【注意事項】●各自で水分補給やおやつの準備をお願いします。●前日17時の気象庁発表による埼玉県南部の天気予報で、当日6時~12時の降水確率が50%以上の場合は活動を中止といたします。
