    title: 5/17飯能市里山清掃活動のお知らせ
    published: '2026-05-02'
    body: 5月17日(日)は飯能市の市民清掃デーです。地元自治会の皆様の里山清掃作業に奥武蔵マウンテンバイク友の会もご一緒させていただきます。我々マウンテンバイカーが日々楽しませていただいているトレイルの入り口にお住まいの皆さんとの協働作業です。ぜひご一緒にいかがでしょうか?
      ■阿須自治会の作業へご参加いただける方は7:30にあいわ広場にご集合ください。主な作業は草刈りの予定です。草刈り鎌をお持ちの方はご持参ください。■岩渕自治会の作業は自治会からクマ出没情報があるため今回は里山内での作業は中止しますというお知らせがあったため、今回はありません。■集合場所:あいわ広場(お車の駐車が可能です)■集合日時:5月17日(日)
      7:30作業場所まではMTBで移動します。●各自で水分補給やおやつの準備をお願いします。●前日17時の気象庁発表による埼玉県南部の天気予報で、当日6時~12時の降水確率が50%以上の場合は作業を中止といたします。ご協力よろしくお願いいたします。
