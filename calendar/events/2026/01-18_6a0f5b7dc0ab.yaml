    title: 1/18日高市道路清掃
    published: '2026-01-20'
    body: 1月18日は日高市の清掃作業日でした。集まったのは8名。2班に分かれ、道路美化団体として登録する市道を約2kmにわたり作業しました。主に道路上に堆積した枝葉を集めては、ブロワー4台で掃き出す作業を繰り返し、さらには大型ブロワー持参の地域住民の協力もあり、わずか1時間で本来の道幅が復活。MTBはもちろん、歩行者も自動車も安全に通行できるようになりました。作業後はグループライドへ。初めて活動に来られる方もいたため、良い交流となりました。参加された皆さん、お疲れ様でした。次回の活動は2/1の名栗じてんしゃ広場定期作業になります。こちらもご参加お待ちしています。
