    title: 9月17日 里山整備活動のご案内
    published: '2023-09-10'
    body: 加治・美杉台まちづくり推進委員会との協働作業で、里山道の見回り、看板の補修などを行います。軍手などご持参の上、汚れても構わない服装でお集まりください。持ち運び可能なノコギリ、スコップなど、ご自身で使用する道具があればお持ち込みください。長年、地元で活動されている方々と交流ができる良い機会です。みなさまのご参加をお待ちしております。■集合日時:9月17日(日)8:30■集合場所:あいわ広場(お車の駐車が可能です)あいわ広場に集合し、ミーティング後にMTBで作業箇所に向かいます。【注意事項】●各自で水分補給やおやつの準備をお願いします。●前日17時の気象庁発表による埼玉県南部の天気予報で、当日6時~12時の降水確率が50%以上、または予想最高気温が35度以上の場合は作業を中止といたします。
