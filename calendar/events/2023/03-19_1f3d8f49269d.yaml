    body: 3月19日(日)は、翌週26日(日)の子どもじてんしゃ教室の開催を控え、臨時で整備作業を行います。名栗じてんしゃ広場に午前9時にお集まりください。11時頃まで作業を行う予定です。3月26日(日)は、子どもじてんしゃ教室を開催いたします。詳しくはこちらをご覧ください。申し込みはこちらです。皆さまのご参加、お待ちしています。なお、どちらも前日17時の気象庁発表による埼玉県南部の天気予報で、当日6時~12時の降水確率が50%以上だった場合は、中止といたします。
