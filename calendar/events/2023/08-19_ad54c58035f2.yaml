    title: 8月19日 里山整備活動のご案内
    published: '2023-08-11'
    body: |-
      総会資料の活動計画では名栗整備の予定でしたが、今回は予定を変更して、飯能市道路美化活動団体として整備を行っている里山道の草刈りや水切り整備などを行います。
      軍手などご持参の上、汚れても構わない服装でお集まりください。
      持ち運び可能なノコギリ、スコップなど、ご自身で使用する道具があればお持ち込みください。
      みなさまのご参加をお待ちしております。

      ※台風7号の影響によっては作業内容の変更等の可能性があることをご了承ください。

      ■集合日時：8月19日（土）8:30

      ■集合場所：あいわ広場（お車の駐車が可能です）
      あいわ広場に集合し、ミーティング後にMTBで作業箇所に向かいます。

      【注意事項】
      ●各自で水分補給やおやつの準備をお願いします。
      ●前日17時の気象庁発表による埼玉県南部の天気予報で、当日6時～12時の降水確率が50％以上、または予想最高気温が35度以上の場合は作業を中止といたします。
