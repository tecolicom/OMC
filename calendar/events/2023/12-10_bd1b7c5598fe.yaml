    title: 12/10（日）子どもじてんしゃ教室開催のお知らせ
    published: '2023-11-28'
    body: |-
      12月10日(日)はお待ちかね、子どもじてんしゃ教室を開催いたします。詳しくはこちらをご覧ください。申し込みはこちらです。飯能市の広報に「会費3000円」の表記がありますが、正しくは「無料」です。今まで通りですのでご安心ください。
      皆さまのご参加、お待ちしています。なお、どちらも前日17時の気象庁発表による埼玉県南部の天気予報で、当日6時~12時の降水確率が50%以上だった場合は、中止といたします。晴天を祈りましょう!
