    published: '2023-05-23'
    body: |-
      6月4日（日）は名栗じてんしゃ広場の定期整備となります。ご都合よろしい方はご参加ください。
      集合場所:名栗じてんしゃ広場
      作業時間:9時から11時頃まで
      なお、前日17時の気象庁発表による埼玉県南部の天気予報で、当日6時～12時の降水確率が50%以上だった場合は中止といたします。
