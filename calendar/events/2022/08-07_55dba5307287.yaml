    title: ８月７日名栗じてんしゃ広場定期整備について
    published: '2022-07-28'
    body: 夏本番、暑さも本番ですね。皆さん暑さを逃れて県外のパークライドなど楽しんでおられる所でしょうか?さて8月7日は名栗じてんしゃ広場定期整備となります。雑草も元気に生えていると思われますので、皆さんと草刈りに路面整備に、汗をかいて、家に帰ってビールなど楽しめたらと思います。暑くなったら、川でクールダウンしましょう。皆さんのお力添えよろしくお願い申し上げます。日時   8月7日  9時より場所   名栗じてんしゃ広場前日の午後5時、気象庁、埼玉県南部の降水確率が50%以上、予想気温が35°C以上の場合は中止といたしますのでよろしくお願い申し上げます。
  - kind: other
    url: https://okumusashimtb.wixsite.com/omcweb/post/8月7日名栗じてんしゃ広場定期整備
    title: 8月7日名栗じてんしゃ広場定期整備
    published: '2022-08-08'
    body: ずっと暑かった日々が一休みの日曜日、会員の皆さんと名栗定期整備を行いました。多少気温は低いのですが、湿度が高く、動くと汗だらけになりながら、お子さん達も大人も草刈にdigにいそしみました。お陰様でだいぶ綺麗になりました。ありがとうございます。20日の土曜日も名栗での作業となりますので、是非またご参加よろしくお願い申し上げます。
