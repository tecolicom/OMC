    title: 1月15日（日）里山整備のお知らせ
    published: '2022-12-28'
    body: |-
      1月15日は日高市で整備を行います。道路の清掃と水切りの造成を予定しています。新年最初となるこちらの活動、皆さんのご参加をお待ちしています。それでは、良いお年を！
      集合日時：1月15日（日）午前9時
      集合場所：セブンイレブン日高高麗本郷店（https://goo.gl/maps/5ht4sMVpYWLzYZjZ7）

      作業場所まではMTBで移動します。手鋸や枝切りバサミをお持ちの方はご持参ください。お車でお越しの方は近隣のコインパーキングに駐車してください。なお、前日午後5時の気象庁発表による埼玉県南部の天気予報で、降水確率が50％以上だった場合は作業を中止といたします。
