    body: いつも名栗じてんしゃ広場の定期整備にご協力ありがとうございます。2月6日は定期整備となっておりましたが、オミクロン株の急激な広がりの影響により今回の活動は中止とさせて頂きたいと思います。次回は4月3日となっております。皆さんのご参加お待ちしております。
