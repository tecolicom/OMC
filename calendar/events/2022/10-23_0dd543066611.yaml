    title: 10月23日 日高市清掃作業のお知らせ
    published: '2022-10-10'
    body: |-
      10月23日（日）は日高市ごみゼロの日に伴い、地元自治体と協働で道路の清掃と草刈りを行います。集合時間が普段の活動より早いですが、ご協力よろしくおねがいします。
      集合日時：10月23日（日）午前6時45分
      集合場所：セブンイレブン日高高麗本郷店（https://goo.gl/maps/5ht4sMVpYWLzYZjZ7）
      作業場所まではMTBで移動します。
      手鋸や枝切りバサミをお持ちの方はご持参ください。
      お車でお越しの方は近隣のコインパーキングに駐車してください。
      【注意事項】
      ●ソーシャルディスタンス、手指の消毒などお気をつけください。
      ●各自で水分補給やおやつの準備をお願いします。
      ●前日午後5時の気象庁発表による埼玉県南部の天気予報で、降水確率が50％以上だった場合は作業を中止といたします。
