    title: 10月29日(土)鳩山での活動のお知らせ。
    published: '2022-10-20'
    body: |-
      10月29日（土）鳩山町熊井谷津田の休耕田の刈払い、熊井の森のトレイル清掃を行います。
      集合場所・時間は坂戸市北浅羽・桜堤公園駐車場に８時集合。道具は担当の世話人の車に預け、運びます。
      会員の皆様はご自身のBikeでの移動になります。
      現地に直接向かわれる方は９時集合です。その際駐車場等ありませんので、自動車で向かうのはご遠慮ください。
      なお、刈払いをされる方は認定教習機関での講習を受けた方に限定させていただきます。
      会員の皆様のご協力、よろしくお願いします。
