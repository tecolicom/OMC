    published: '2022-03-22'
    body: |-
      気温も暖かくなり、花が咲き乱れ春爛漫となってきました。
      ライドするにもいい気候ですね。
      さて4月3日は名栗じてんしゃ広場の定期整備となっています。
      前回の整備日はコロナ禍の影響により中止で、4ヶ月間整備をしていなく、路面は凍結などでだいぶ傷んでいるかと思います。
      春を感じながら会員の皆さまと路面の整備をご一緒できればと思います。
      お力添えよろしくお願い申し上げます。

      日時　　　4月3日  9時より
      場所　　　名栗じてんしゃ広場

      尚前日の気象庁17時発表、埼玉県南部の降水確率が50%以上の場合は中止とさせて頂きますのでよろしくお願い申し上げます。
