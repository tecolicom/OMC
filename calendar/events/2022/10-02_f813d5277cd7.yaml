    title: 10月2日名栗じてんしゃ広場定期整備について
    published: '2022-09-21'
    body: 秋風が吹いて来て、虫も少なくなり、トレイルにベストなシーズンとなってきました。さて10月2日は名栗じてんしゃ広場の定期整備となります。いつも通り、草刈に路面整備を行いたいと思います。会員の皆さまのお力添えよろしくお願い申し上げます。尚、前日午後5時、気象庁の埼玉県南部の降水確率が50%以上の予報場合は中止とさせて頂きますので、よろしくお願い申し上げます。
