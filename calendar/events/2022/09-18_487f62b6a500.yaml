    title: 9/18(日）里山整備活動の中止のお知らせ
    published: '2022-09-17'
    body: 気象庁による明日の天気予報の降水確率が70%と発表されました。残念ですが明日の作業は中止とさせていただきます。ご予定していただけた皆様には申し訳ありません。またの機会にお願いします。
