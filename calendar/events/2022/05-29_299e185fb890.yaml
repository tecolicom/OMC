    title: 5月29日 日高市清掃活動のお知らせ
    published: '2022-05-19'
    body: 5月29日(日)は日高市のゴミゼロの日です。道路美化団体として作業を担当する市道付近の自治体の清掃作業に、奥武蔵マウンテンバイク友の会もご一緒させていただきます。主な作業内容は草刈りと清掃です。草刈り鎌をお持ちの方はご持参ください。22日には飯能市でも清掃作業があり、2週連続の作業となる上、集合時間がいつになく早いですが、ご都合よろしい方はぜひご参加ください。■集合場所:セブンイレブン日高高麗本郷店■集合日時:5月29日(日)午前6時45分作業場所まではMTBで移動します。【注意事項】●お車でお越しの方は近隣のコインパーキングに駐車の上、集合場所にお集まりください。●ソーシャルディスタンス、手指の消毒などお気をつけください。●野外での活動ですが、近距離での会話の際にはマスクの着用をお願いします。●各自で水分補給やおやつの準備をお願いします。●前日午後5時の気象庁発表による埼玉県南部の天気予報で、降水確率が50%以上だった場合は作業を中止といたします。
  - kind: other
    url: https://okumusashimtb.wixsite.com/omcweb/post/5月29日-日高市ゴミゼロの日
    title: 5月29日 日高市ゴミゼロの日
    published: '2022-05-30'
    body: 5月29日(日)は日高市のゴミゼロの日ということで、道路美化団体として登録している地域にて、自治体の清掃活動に参加してきました。集合時間はいつもより2時間ほど早かったものの、9名が集まり、500mほどの舗装路区間の草刈りと側溝に溜まった土砂の除去を行いました。住民の方も多く参加していたため、作業は2時間もかからずに終了。OMCに対して労いの言葉をいただき、また一つ、地域への還元ができたように思えます。今後の活動も皆さまのご参加をお待ちしています。
