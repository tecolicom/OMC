    published: '2024-05-26'
    body: 6月2日(日)は名栗じてんしゃ広場の定期整備を行います。草刈りと路面の整備を予定しています。同広場に午前9時にお集まりください。11時頃まで作業を行う予定です。ご参加お待ちしています。なお、前日17時の気象庁発表による埼玉県南部の天気予報で、当日6時〜12時の降水確率が50%以上の場合は中止といたしますのでご了承ください。
