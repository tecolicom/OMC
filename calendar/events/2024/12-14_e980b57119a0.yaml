    body: 12月の活動は里山整備&ライドで行います!里山道整備ののち、みんなでMTBライドを楽しみましょう。里山整備活動の主な内容は倒木の撤去や、水切りの清掃です。ノコギリや枝切りバサミがをお持ちでしたらご持参ください。作業が終わった後でお時間ある方は世話人と共に活動地域内でMTBライドを楽しみましょう。是非ご一緒ください。【集合場所】■集合場所:あいわ広場(お車の駐車が可能です)■集合日時:12月14日(土曜日)
      8:30作業場所まではMTBで移動します。●各自で水分補給やおやつの準備をお願いします。●前日午後5時の気象庁発表による埼玉県南部の天気予報で、降水確率が50%以上だった場合は作業を中止といたします。●各自で水分補給やおやつの準備をお願いします。●前日午後5時の気象庁発表による埼玉県南部の天気予報で、降水確率が50%以上だった場合は作業を中止といたします。ご協力よろしくお願いします_(._.)_
