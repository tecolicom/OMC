    published: '2024-08-08'
    body: 8月18日(日)は名栗じてんしゃ広場の定期整備を臨時で行います。前回8月4日に予定していた作業は高温予報により中止となりました。今回も草刈りをメインに行う予定です。同広場に午前9時にお集まりください。11時頃まで作業を行う予定です。なお、前日17時の気象庁発表による埼玉県南部の天気予報で、当日6時〜12時の降水確率が50%以上およびまたは予想最高気温が35°以上の場合は中止といたしますのでご了承ください。
