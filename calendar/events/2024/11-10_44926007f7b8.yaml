    title: 11/10 鳩山での活動についてのお知らせ
    published: '2024-10-29'
    body: |-
      11月10日(日)鳩山町熊井地区にて地区の方々及び、はとやま環境フォーラムさんと共同で環境保全活動を行います。
      内容。
      谷津田休耕田の刈払い。
      熊井の森内のトレイルの清掃。
      熊井の森内トレイルの刈払い。※刈払い人員に余裕がある場合。
      熊井の森内倒木の撤去。※チェーンソー使用有資格者がいらっしゃる場合。
      日程。
      8:00　坂戸市北浅羽桜堤駐車場集合。
      　　　道具は現地駐車に限度がある為、2台位の車に纏める予定です。
      9:00　熊井地区にて作業開始。
      　　　直接来られる方はこちらに。
      11:00頃迄作業予定。
      その後解散。トレイル走られる方は楽しんでください。
      トレイルの清掃と刈払いが時間が足らず終わらなかった場合はまた後日の活動で作業できるよう進める予定です。
      では当日、会員皆様の参加ご協力、よろしくお願いします。
