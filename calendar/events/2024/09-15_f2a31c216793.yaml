    title: 9/15 里山整備活動のお知らせ
    published: '2024-09-10'
    body: |-
      お知らせが直前になってしまいました。総会の活動計画にはありませんでしたが、加治・美杉台まちづくり推進委員会との協働作業で、里山道の見回り、看板の補修、倒木や落枝の撤去などを行います。
      軍手などご持参の上、汚れても構わない服装でお集まりください。
      持ち運び可能なノコギリなど、ご自身で使用する道具があればお持ち込みください。
      長年、地元で活動されている方々と交流ができる良い機会です。直前のお知らせで申し訳ありませんが、みなさまのご参加をお待ちしております。

      ■集合日時：9月15日（日）8:45
      ■集合場所：あいわ広場（お車の駐車が可能です）

      あいわ広場に集合し、ミーティング後にMTBで作業箇所に向かいます。

      【注意事項】
      ●各自で水分補給やおやつの準備をお願いします。
      ●前日17時の気象庁発表による埼玉県南部の天気予報で、当日6時～12時の降水確率が50％以上、または予想最高気温が35度以上の場合は作業を中止といたします。
