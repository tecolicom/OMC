    title: 10/6 名栗定期作業のお知らせ
    published: '2024-09-15'
    body: |-
      10月6日（日）は名栗じてんしゃ広場の定期作業日です。草刈りと路面補修を行う予定です。同広場に午前9時にお集まりください。11時頃まで作業を行います。

      なお、前日17時の気象庁発表による埼玉県南部の天気予報で、当日6時〜12時の降水確率が50%以上の場合は中止といたしますのでご了承ください。
