    title: 4/20子ども自転車教室のお知らせ
    published: '2025-04-06'
    body: 4月20日は子ども自転車教室を開催します。コチラからご応募ください。一般的な質問はコチラをお読みください。教室の開催を前に、4月6日に自転車広場の定期作業を行いました。会員9名で、土が流出してしまったコースを改修。新たに土を入れ、路面を整えました。当日は良いコンディションで教室を行えるはずです。皆さんのご応募お待ちしています!
