    published: '2025-01-14'
    body: 2月2日(日)は名栗じてんしゃ広場の定期作業日です。路面補修を行う予定です。同広場に午前9時にお集まりください。11時頃まで作業を行います。なお、前日17時の気象庁発表による埼玉県南部の天気予報で、当日6時〜12時の降水確率が50%以上の場合は中止といたしますのでご了承ください。
  - kind: announce
    url: https://okumusashimtb.wixsite.com/omcweb/post/2-2名栗整備作業中止のお知らせ
    title: 2/2名栗整備作業中止のお知らせ
    published: '2025-02-01'
    body: 2/2(日)の名栗じてんしゃ広場の整備作業は、気象庁の天気予報により、作業時間帯の降水確率が50%を超えたため中止といたします。寒い一日となりそうですので、暖かくお過ごしください。次回は2/23に鳩山での作業を予定しています。
