    title: 8/24日高市道路清掃作業のお知らせ
    published: '2025-08-08'
    body: 8月24日(日)は日高市の里山道で清掃と草刈りを行います。午前8時30分にセブンイレブン日高高麗本郷店にお集まりください。作業場所まではMTBで移動します。手鋸や枝切りバサミをお持ちの方はご持参ください。なお、前日午後5時の気象庁発表による埼玉県南部の天気予報で降水確率が50%以上、およびまたは環境省発表の暑さ指数(WBGT)予測が作業時間帯で31°以上の場合は中止といたしますのでご了承ください。
  - kind: announce
    url: https://okumusashimtb.wixsite.com/omcweb/post/8-24日高市作業-中止のお知らせ
    title: 8/24日高市作業 中止のお知らせ
    published: '2025-08-23'
    body: 8/24の日高市の清掃作業ですが、作業時間帯の暑さ指数が31度を超えましたので中止といたします。
